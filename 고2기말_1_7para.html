<title>고2기말_1_7para</title>

<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%}
body{font-family:"Noto Sans KR",sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);min-height:100vh;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom));display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
.container{max-width:720px;width:100%;background:#f8fafc;border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden}
.header{background:linear-gradient(150deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);padding:26px 24px 20px;color:#fff;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header h1{font-size:1.3rem;font-weight:800;margin-bottom:4px;letter-spacing:-.02em}
.header p{opacity:.75;font-size:.82rem}
.content{padding:22px 20px}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.set-list{display:grid;gap:12px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:18px;padding:18px 22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 5px rgba(15,23,42,.07)}
.set-card:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-3px);box-shadow:0 6px 20px rgba(59,130,246,.18)}
.set-card.done{border-color:#34d399;background:linear-gradient(135deg,#ecfdf5,#d1fae5);box-shadow:0 2px 8px rgba(52,211,153,.15)}
.q-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 0}
.q-chip{width:46px;height:46px;border-radius:13px;border:2px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#374151;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.q-chip:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-1px)}
.q-chip.correct{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46}
.q-chip.wrong{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337}
.progress-bar{height:8px;background:#e5e7eb;border-radius:4px;margin-bottom:16px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d5a87,#60a5fa);border-radius:4px;transition:width .4s}
.q-counter{text-align:center;font-size:.82rem;color:#6b7280;margin-bottom:8px;font-weight:500}
.key-box{text-align:center;margin:16px 0;padding:20px 18px;background:linear-gradient(135deg,#f0f7ff,#e8f0fe);border-radius:20px;border:2px solid #bfdbfe;box-shadow:0 3px 12px rgba(59,130,246,.1)}
.key-box .expr{font-size:1.45rem;font-weight:800;color:#1e3a5f;margin-bottom:8px;line-height:1.4;letter-spacing:-.02em}
.key-box .qtext{font-size:.95rem;color:#374151;font-weight:500}
.key-box .qtext .hl{color:#e11d48;font-weight:800}
.passage-box{margin:12px 0;padding:14px 18px;background:#fff;border-left:4px solid #3b82f6;border-radius:0 14px 14px 0;font-size:.88rem;color:#4b5563;line-height:1.75;font-style:italic;box-shadow:0 1px 4px rgba(59,130,246,.08)}
.show-passage-btn{margin:4px auto 10px;display:block;padding:7px 16px;background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe;border-radius:10px;font-size:.8rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.options{display:grid;gap:10px;margin-top:16px}
.option-btn{padding:15px 18px;background:#fff;border:2px solid #e8ecf1;border-radius:16px;font-size:1rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;color:#1f2937;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(15,23,42,.07)}
.option-btn .num{width:34px;height:34px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#6b7280;flex-shrink:0;transition:all .2s}
.option-btn:hover:not(:disabled){border-color:#3b82f6;background:#f0f7ff;box-shadow:0 3px 10px rgba(59,130,246,.12)}
.option-btn.correct{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;animation:pop .3s;box-shadow:0 2px 10px rgba(16,185,129,.18)}
.option-btn.correct .num{background:#10b981;color:#fff}
.option-btn.wrong{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;animation:shake .4s;box-shadow:0 2px 10px rgba(244,63,94,.15)}
.option-btn.wrong .num{background:#f43f5e;color:#fff}
.option-btn.reveal{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46}
.option-btn.reveal .num{background:#10b981;color:#fff}
.option-btn:disabled{cursor:default;opacity:.85}
.feedback{text-align:center;padding:14px 16px;border-radius:16px;margin-top:14px;font-weight:700;font-size:.95rem;line-height:1.5}
.feedback.correct-fb{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;border:1.5px solid #6ee7b7;box-shadow:0 2px 8px rgba(16,185,129,.15)}
.feedback.wrong-fb{background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;border:1.5px solid #fda4af;box-shadow:0 2px 8px rgba(244,63,94,.12)}
.explain-box{margin-top:12px;padding:14px 16px;background:#fff;border-radius:14px;border:1.5px solid #e8ecf1;box-shadow:0 1px 5px rgba(15,23,42,.06)}
.ex-title{font-size:.92rem;font-weight:700;color:#374151;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #f1f5f9}
.ex-item{padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:.9rem;line-height:1.75}
.ex-item:last-child{border-bottom:none}
.tag-w{color:#e11d48;font-weight:700;font-size:.8rem}
.tag-o{color:#059669;font-weight:600;font-size:.8rem}
.trans{color:#6b7280;font-size:.88rem}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1.5px solid #e8ecf1;gap:8px}
.nav-btn{padding:10px 18px;border:none;border-radius:12px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.nav-btn:active{transform:scale(.97);opacity:.9}
.nav-btn:disabled{opacity:.3;cursor:default;transform:none}
.nav-btn.prev{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.nav-btn.next{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;box-shadow:0 2px 10px rgba(45,90,135,.28)}
.nav-btn.home,.nav-btn.back{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:18px auto;font-size:2rem;font-weight:800;border:6px solid;box-shadow:0 6px 20px rgba(0,0,0,.12)}
.score-circle.pass{border-color:#10b981;color:#059669;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.score-circle.fail{border-color:#f43f5e;color:#e11d48;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border:none;border-radius:14px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;box-shadow:0 3px 12px rgba(45,90,135,.3)}
.btn-block{width:100%}
.opt-list{margin:16px 0}
.opt-item{display:flex;align-items:flex-start;gap:12px;padding:15px 18px;border-radius:14px;border:2px solid #e8ecf1;margin-bottom:8px;font-size:1rem;line-height:1.65;color:#1f2937;background:#fff;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.opt-item .onum{width:32px;height:32px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:#6b7280;flex-shrink:0}
.opt-item.correct{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
.opt-item.correct .onum{background:#f43f5e;color:#fff}
.opt-item.wrong{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.opt-item.wrong .onum{background:#10b981;color:#fff}
.answer-section{margin:16px 0;padding:20px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:16px;border:1.5px solid #6ee7b7;box-shadow:0 2px 8px rgba(16,185,129,.1)}
.ans-label{font-size:.85rem;font-weight:700;color:#065f46;margin-bottom:10px}
.ans-correct{font-size:1.1rem;font-weight:800;color:#dc2626;margin-bottom:12px}
.explain-item{padding:9px 0;border-bottom:1px solid #d1fae5;font-size:.92rem;line-height:1.75}
.explain-item:last-child{border-bottom:none}
.tag-wrong{color:#e11d48;font-weight:700;font-size:.8rem}

var CONFIG={"title":"고2기말_1_7para","passThreshold":90,"questions":[{"questionNumber":1,"sourceQuestion":"1번 지문","keyExpression":"compensate you generously for any risks you face by waiting the extra few weeks","questionText":"'compensate you generously for any risks you face by waiting the extra few weeks'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"make up for the potential downsides you take on by choosing to wait a little while longer","isCorrect":false,"explanation":"올바름: 'make up for'는 'compensate for'를, 'potential downsides'는 'risks'를, 'choosing to wait a little while longer'는 'waiting the extra few weeks'를 적절히 환언함","translation":"조금 더 기다리기로 선택함으로써 감수하는 잠재적 불이익을 보충해 준다","enText":""},{"text":"eliminate all financial risks associated with the decision to delay receiving your money","isCorrect":true,"explanation":"잘못됨: 원문은 이자가 위험을 '보상(compensate)'한다고 했을 뿐, 위험을 '제거(eliminate)'한다고 하지 않았음. 의미를 과도하게 왜곡한 잘못된 환언임","translation":"돈 수령을 미루는 결정과 관련된 모든 금융 위험을 제거해 준다","enText":""},{"text":"reward you handsomely enough to offset the uncertainty of holding out a bit longer","isCorrect":false,"explanation":"올바름: 'reward handsomely'는 'compensate generously'를, 'offset the uncertainty'는 'compensate for risks'를, 'holding out a bit longer'는 'waiting the extra few weeks'를 정확히 환언함","translation":"조금 더 기다리는 불확실성을 상쇄할 만큼 충분히 후하게 보상해 준다","enText":""},{"text":"more than adequately cover the hazards you accept in exchange for deferring payment","isCorrect":false,"explanation":"올바름: 'more than adequately cover'는 'compensate generously'를, 'hazards you accept'는 'risks you face'를, 'deferring payment'는 'waiting the extra few weeks'를 충실히 반영함","translation":"지불을 연기하는 대가로 감수하는 위험을 충분히도 남을 만큼 커버해 준다","enText":""},{"text":"give you ample return to justify the exposure to risk that comes with waiting a few more weeks","isCorrect":false,"explanation":"올바름: 'ample return'은 'generous compensation'을, 'justify the exposure to risk'는 'compensate for risks'를, 'waiting a few more weeks'는 원문 표현을 자연스럽게 환언함","translation":"몇 주 더 기다리는 데 따르는 위험 노출을 정당화할 만한 충분한 수익을 제공해 준다","enText":""}],"passage":"A wise choice, since the interest will compensate you generously for any risks you face by waiting the extra few weeks.","passageTranslation":"이자가 몇 주를 더 기다리는 데 따르는 어떤 위험에 대해서도 충분히 보상해 줄 것이기 때문에 현명한 선택이다."},{"questionNumber":2,"sourceQuestion":"1번 지문","keyExpression":"hold out for just a month longer","questionText":"'hold out for just a month longer'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"resist the temptation to accept early and wait out one extra month","isCorrect":false,"explanation":"올바름: 'resist the temptation to accept early'는 'hold out'의 함의인 즉각 수령의 유혹을 견디는 것을, 'wait out one extra month'는 'just a month longer'를 충실히 반영함","translation":"일찍 받으려는 유혹을 이겨내고 한 달을 더 기다리다","enText":""},{"text":"refuse the immediate offer and instead negotiate for a higher amount over several months","isCorrect":true,"explanation":"잘못됨: 원문은 단순히 '한 달을 더 기다리다'를 의미할 뿐이며, '협상(negotiate)'이나 '여러 달(several months)'의 개념은 원문에 전혀 없음. 의미를 임의로 추가하여 왜곡한 잘못된 환언임","translation":"즉각적인 제안을 거절하고 여러 달에 걸쳐 더 높은 금액을 협상하다","enText":""},{"text":"persist in waiting for only one additional month before claiming the reward","isCorrect":false,"explanation":"올바름: 'persist in waiting'은 'hold out'의 핵심 의미인 '버티며 기다리다'를, 'one additional month'는 'just a month longer'를 정확히 환언함","translation":"보상을 받기 전에 딱 한 달을 더 기다리며 버티다","enText":""},{"text":"endure waiting one more month in order to receive the greater sum","isCorrect":false,"explanation":"올바름: 'endure waiting'은 'hold out'의 의미인 '참고 기다리다'를, 'one more month'는 'just a month longer'를 자연스럽게 환언함","translation":"더 많은 금액을 받기 위해 한 달을 더 참고 기다리다","enText":""},{"text":"delay accepting the reward by a single month more than originally planned","isCorrect":false,"explanation":"올바름: 'delay accepting'은 'hold out'을, 'a single month more'는 'just a month longer'를 명확하고 적절하게 환언함","translation":"원래 계획보다 딱 한 달 더 보상 수령을 미루다","enText":""}],"passage":"In both cases, if you hold out for just a month longer, you get $100 more.","passageTranslation":"두 경우 모두, 딱 한 달만 더 버티면 100달러를 더 받게 된다."},{"questionNumber":3,"sourceQuestion":"1번 지문","keyExpression":"The introduction of 'now' causes us to make inconsistent decisions","questionText":"'The introduction of \"now\" causes us to make inconsistent decisions'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"bringing an instant option into play triggers illogical and self-contradictory choices in people","isCorrect":false,"explanation":"올바름: 'bringing an instant option into play'는 'the introduction of now'를, 'illogical and self-contradictory choices'는 'inconsistent decisions'를 충실히 환언함","translation":"즉각적인 선택지를 도입하면 사람들에게 비논리적이고 자기모순적인 선택을 촉발한다","enText":""},{"text":"the availability of an immediate gain makes people more cautious and deliberate in their choices","isCorrect":true,"explanation":"잘못됨: 원문은 '지금'의 도입이 '일관성 없는 결정'을 유발한다고 했으나, 이 보기는 오히려 사람들을 '더 신중하고 심사숙고하게(more cautious and deliberate)' 만든다고 서술하여 의미를 정반대로 왜곡함","translation":"즉각적인 이득의 가용성이 사람들을 선택에 있어 더 신중하고 심사숙고하게 만든다","enText":""},{"text":"the mere presence of an immediate option leads people to choose in contradictory ways","isCorrect":false,"explanation":"올바름: 'the mere presence of an immediate option'은 'the introduction of now'를, 'choose in contradictory ways'는 'make inconsistent decisions'를 정확히 환언함","translation":"즉각적인 선택지가 존재한다는 것만으로도 사람들이 모순된 방식으로 선택하게 된다","enText":""},{"text":"introducing the possibility of an instant reward disrupts the consistency of our judgment","isCorrect":false,"explanation":"올바름: 'introducing the possibility of an instant reward'는 'the introduction of now'를, 'disrupts the consistency of our judgment'는 'inconsistent decisions'를 적절히 환언함","translation":"즉각적인 보상의 가능성을 도입하면 우리 판단의 일관성이 무너진다","enText":""},{"text":"when an immediate reward enters the picture, people's decision-making becomes incoherent","isCorrect":false,"explanation":"올바름: 'when an immediate reward enters the picture'는 'the introduction of now'를, 'decision-making becomes incoherent'는 'make inconsistent decisions'를 자연스럽게 환언함","translation":"즉각적인 보상이 그림 속에 들어오면 사람들의 의사결정이 일관성을 잃게 된다","enText":""}],"passage":"Not in the second case. The introduction of 'now' causes us to make inconsistent decisions.","passageTranslation":"두 번째 경우는 그렇지 않다. '지금'의 등장이 우리로 하여금 일관성 없는 결정을 내리게 만든다."},{"questionNumber":4,"sourceQuestion":"1번 지문","keyExpression":"the higher our 'emotional interest rate' rises and the more we are willing to give up in exchange for it","questionText":"'the higher our \"emotional interest rate\" rises and the more we are willing to give up in exchange for it'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"as the subjective value of the reward climbs in our minds, so does the amount we are willing to trade away for it","isCorrect":false,"explanation":"올바름: 'subjective value climbs in our minds'는 'emotional interest rate rises'를, 'amount we are willing to trade away'는 'willing to give up'을 자연스럽게 환언함","translation":"우리 마음속에서 보상의 주관적 가치가 높아질수록, 그것을 위해 기꺼이 포기하려는 양도 함께 커진다","enText":""},{"text":"the more urgently we desire it, the more rational and calculated our trade-off decisions become","isCorrect":true,"explanation":"잘못됨: 원문은 감정적 이자율이 높아질수록 더 많은 것을 포기하려 한다는, 즉 비이성적 충동이 커지는 상황을 설명하는데, 이 보기는 '더 합리적이고 계산적(rational and calculated)'이 된다고 서술하여 원문의 핵심 의미를 정반대로 왜곡함","translation":"그것을 더 간절히 원할수록 우리의 상충 결정이 더 합리적이고 계산적이 된다","enText":""},{"text":"the greater the psychological premium we place on it and the larger the sacrifice we are prepared to make to obtain it","isCorrect":false,"explanation":"올바름: 'psychological premium we place on it'은 'emotional interest rate rises'를, 'sacrifice we are prepared to make'는 'willing to give up'을 정확히 환언함","translation":"우리가 그것에 부여하는 심리적 프리미엄이 커질수록, 그것을 얻기 위해 기꺼이 치르려는 희생도 커진다","enText":""},{"text":"the stronger our emotional pull toward it becomes, the more we are ready to forgo in order to have it now","isCorrect":false,"explanation":"올바름: 'stronger emotional pull'은 'higher emotional interest rate'를, 'forgo in order to have it now'는 'give up in exchange for it'을 충실히 환언함","translation":"그것에 대한 감정적 끌림이 강해질수록, 지금 그것을 갖기 위해 포기할 준비가 더 되어 있다","enText":""},{"text":"the more intensely we crave it, the greater the cost we are willing to bear to secure it immediately","isCorrect":false,"explanation":"올바름: 'more intensely we crave it'은 'higher emotional interest rate'를, 'greater the cost we are willing to bear'는 'more we are willing to give up'을 적절히 환언함","translation":"그것을 더 강렬하게 갈망할수록, 즉시 그것을 얻기 위해 기꺼이 감당하려는 비용도 커진다","enText":""}],"passage":"The closer a reward is, the higher our 'emotional interest rate' rises and the more we are willing to give up in exchange for it.","passageTranslation":"보상이 가까울수록 우리의 '감정적 이자율'은 높아지고, 그것을 얻는 대가로 기꺼이 포기하려는 것도 많아진다."},{"questionNumber":5,"sourceQuestion":"1번 지문","keyExpression":"opt for the larger sum in thirteen months","questionText":"'opt for the larger sum in thirteen months'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"decide in favor of the bigger reward available at the end of thirteen months","isCorrect":false,"explanation":"올바름: 'decide in favor of'는 'opt for'를, 'the bigger reward'는 'the larger sum'을, 'at the end of thirteen months'는 'in thirteen months'를 충실히 환언함","translation":"13개월이 끝날 때 받을 수 있는 더 큰 보상을 선호하여 선택하다","enText":""},{"text":"immediately demand the full sum rather than waiting for the incremental increase over time","isCorrect":true,"explanation":"잘못됨: 원문은 13개월을 기다려 더 큰 금액을 선택하는 것을 의미하지만, 이 보기는 '즉시 전액을 요구(immediately demand the full sum)'한다고 서술하여 '기다림'과 '더 큰 금액 선택'이라는 핵심 내용을 모두 반대로 왜곡함","translation":"시간이 지남에 따른 증분 증가를 기다리지 않고 즉시 전액을 요구하다","enText":""},{"text":"select the higher payment that becomes available over a year from now","isCorrect":false,"explanation":"올바름: 'select the higher payment'는 'opt for the larger sum'을, 'over a year from now'는 '13개월 후'의 의미를 자연스럽게 환언함","translation":"지금으로부터 1년 남짓 후에 지급되는 더 높은 금액을 선택하다","enText":""},{"text":"choose to receive the greater amount after waiting thirteen months","isCorrect":false,"explanation":"올바름: 'choose to receive'는 'opt for'를, 'the greater amount'는 'the larger sum'을, 'after waiting thirteen months'는 'in thirteen months'를 정확히 환언함","translation":"13개월을 기다린 후 더 많은 금액을 받는 쪽을 선택하다","enText":""},{"text":"prefer to take the more substantial amount that will be available thirteen months later","isCorrect":false,"explanation":"올바름: 'prefer to take'는 'opt for'를, 'the more substantial amount'는 'the larger sum'을, 'thirteen months later'는 'in thirteen months'를 명확하게 환언함","translation":"13개월 후에 받을 수 있는 더 실질적인 금액을 선호하다","enText":""}],"passage":"Would you rather receive $1,000 in a year or $1,100 in a year and a month? Most people will opt for the larger sum in thirteen months.","passageTranslation":"1년 후에 1,000달러를 받겠습니까, 아니면 1년 1개월 후에 1,100달러를 받겠습니까? 대부분의 사람들은 13개월 후의 더 큰 금액을 선택할 것이다."},{"questionNumber":6,"sourceQuestion":"1번 지문","keyExpression":"I've already waited twelve months; what's one more?","questionText":"'I've already waited twelve months; what's one more?'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"given that a year has already been spent waiting, one more month is perceived as a trivial extension","isCorrect":false,"explanation":"올바름: 'a year has already been spent waiting'은 'already waited twelve months'를, 'trivial extension'은 'what's one more?'의 심리적 태도를 충실히 환언함","translation":"이미 1년을 기다리는 데 보낸 만큼, 한 달이 더 늘어나는 것은 사소한 연장으로 인식된다","enText":""},{"text":"with a year of patience already invested, committing to one more month requires minimal additional effort","isCorrect":false,"explanation":"올바름: 'a year of patience already invested'는 'already waited twelve months'의 함의를, 'minimal additional effort'는 'what's one more?'의 태도를 자연스럽게 환언함","translation":"이미 1년의 인내를 투자한 만큼, 한 달을 더 버티는 것은 추가적인 노력이 거의 필요하지 않다","enText":""},{"text":"after waiting so long, the prospect of waiting one more month feels equally burdensome and prompts reconsideration","isCorrect":true,"explanation":"잘못됨: 원문의 'what's one more?'는 한 달 더 기다리는 것이 '별것 아니다'라는 태도를 표현하지만, 이 보기는 오히려 '똑같이 부담스럽고 재고를 촉구(equally burdensome and prompts reconsideration)'한다고 하여 원문의 의미를 정반대로 왜곡함","translation":"그토록 오래 기다린 후에 한 달을 더 기다리는 전망은 마찬가지로 부담스럽게 느껴지며 재고를 촉구한다","enText":""},{"text":"since twelve months have already passed, tolerating one additional month poses little psychological resistance","isCorrect":false,"explanation":"올바름: 'twelve months have already passed'는 원문의 상황을, 'tolerating one additional month poses little psychological resistance'는 'what's one more?'의 논리적 함의를 적절히 환언함","translation":"이미 12개월이 지났으니 한 달을 더 견디는 것은 심리적 저항이 거의 없다","enText":""},{"text":"having endured a full year of waiting, an extra month seems like a negligible addition","isCorrect":false,"explanation":"올바름: 'having endured a full year of waiting'은 'already waited twelve months'를, 'an extra month seems like a negligible addition'은 'what's one more?'의 함의를 정확히 환언함","translation":"꼬박 1년을 기다린 마당에 한 달이 더 추가되는 것은 무시할 만한 일처럼 보인다","enText":""}],"passage":"In the first case, it's simple enough. You figure: 'I've already waited twelve months; what's one more?'","passageTranslation":"첫 번째 경우는 충분히 간단하다. 당신은 이렇게 생각한다: '나는 이미 12개월을 기다렸는데, 한 달이 더 뭐가 대수겠어?'"},{"questionNumber":7,"sourceQuestion":"1번 지문","keyExpression":"The closer a reward is, the higher our 'emotional interest rate' rises","questionText":"'The closer a reward is, the higher our \"emotional interest rate\" rises'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the sooner a reward is available, the more disproportionate our emotional valuation of it becomes","isCorrect":false,"explanation":"올바름: 'the sooner a reward is available'은 'the closer a reward is'를, 'disproportionate emotional valuation'은 'emotional interest rate rises'의 의미를 충실히 환언함","translation":"보상을 더 빨리 받을 수 있을수록, 그것에 대한 우리의 감정적 평가가 더욱 불균형적으로 커진다","enText":""},{"text":"a reward that is farther away in time tends to generate a stronger emotional response and higher motivation","isCorrect":true,"explanation":"잘못됨: 원문은 보상이 '가까울수록' 감정적 이자율이 높아진다고 했으나, 이 보기는 '더 멀리 있는(farther away)' 보상이 더 강한 감정적 반응을 만든다고 하여 원문의 핵심 방향을 정반대로 왜곡함","translation":"시간적으로 더 멀리 있는 보상일수록 더 강한 감정적 반응과 높은 동기를 만들어내는 경향이 있다","enText":""},{"text":"the more imminent the reward becomes, the more powerfully our emotions inflate its perceived value","isCorrect":false,"explanation":"올바름: 'the more imminent the reward becomes'는 'the closer a reward is'를, 'emotions inflate its perceived value'는 'emotional interest rate rises'의 함의를 적절히 환언함","translation":"보상이 더 임박해질수록, 우리의 감정이 그것의 지각된 가치를 더 강하게 부풀린다","enText":""},{"text":"as a reward draws nearer in time, the psychological urgency we attach to it intensifies proportionally","isCorrect":false,"explanation":"올바름: 'draws nearer in time'은 'the closer a reward is'를, 'psychological urgency intensifies proportionally'는 'emotional interest rate rises'를 정확하고 충실하게 환언함","translation":"보상이 시간적으로 가까워질수록, 우리가 그것에 부여하는 심리적 긴박감이 비례하여 강해진다","enText":""},{"text":"when a reward is within close temporal reach, our subjective desire for it escalates markedly","isCorrect":false,"explanation":"올바름: 'within close temporal reach'는 'the closer a reward is'를, 'subjective desire escalates markedly'는 'emotional interest rate rises'를 자연스럽고 적절하게 환언함","translation":"보상이 시간적으로 가까운 범위 안에 있을 때, 그것에 대한 우리의 주관적 욕구가 현저히 높아진다","enText":""}],"passage":"The closer a reward is, the higher our 'emotional interest rate' rises and the more we are willing to give up in exchange for it.","passageTranslation":"보상이 가까울수록 우리의 '감정적 이자율'은 높아지고, 그것을 얻는 대가로 기꺼이 포기하려는 것도 많아진다."},{"questionNumber":8,"sourceQuestion":"2번 지문","keyExpression":"communicate exactly what we think and feel more honestly than any other part of our bodies","questionText":"'communicate exactly what we think and feel more honestly than any other part of our bodies'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"convey our internal states more faithfully and precisely than all other body parts combined","isCorrect":true,"explanation":"잘못됨: 원문은 '신체의 다른 어느 한 부위보다도 더 정직하게'라는 의미이지, 'all other body parts combined(모든 다른 신체 부위를 합친 것보다)'라는 집합적 비교가 아님. 의미가 과도하게 확대·왜곡됨","translation":"다른 모든 신체 부위를 합친 것보다 더 충실하고 정확하게 내면 상태를 전달한다","enText":""},{"text":"signal what we actually think and feel in a more straightforward way than other body parts do","isCorrect":false,"explanation":"올바름: 'signal'과 'what we actually think and feel'은 원문의 의미를 유지하고, 'straightforward way'는 'honestly'를 자연스럽게 paraphrasing함","translation":"다른 신체 부위들보다 더 직접적인 방식으로 우리가 실제로 생각하고 느끼는 것을 신호로 보낸다","enText":""},{"text":"reveal our true thoughts and emotions with greater accuracy than any other bodily part","isCorrect":false,"explanation":"올바름: 'reveal'은 'communicate'의 의미를 포함하며, 'greater accuracy'는 'more honestly'를, 'any other bodily part'는 'any other part of our bodies'를 정확히 paraphrasing함","translation":"신체의 다른 어떤 부위보다 더 정확하게 우리의 진정한 생각과 감정을 드러낸다","enText":""},{"text":"express our genuine thoughts and feelings more truthfully than any other region of the body","isCorrect":false,"explanation":"올바름: 'express'는 'communicate'에 대응하고, 'genuine'과 'truthfully'는 'honestly'의 의미를 유지하며, 'any other region of the body'는 원문 표현을 자연스럽게 paraphrasing함","translation":"신체의 다른 어떤 부위보다도 더 진실되게 우리의 진짜 생각과 감정을 표현한다","enText":""},{"text":"disclose our thoughts and feelings more candidly than any other part of the human body","isCorrect":false,"explanation":"올바름: 'disclose'는 'communicate'의 함의를 충실히 살리고, 'candidly'는 'honestly'의 적절한 동의어이며, 구조적으로도 원문과 일치함","translation":"인체의 다른 어떤 부위보다 더 솔직하게 우리의 생각과 감정을 드러낸다","enText":""}],"passage":"The writer and zoologist Desmond Morris observed that our feet communicate exactly what we think and feel more honestly than any other part of our bodies.","passageTranslation":"작가이자 동물학자인 Desmond Morris는 우리의 발이 신체의 다른 어떤 부위보다도 더 정직하게 우리가 생각하고 느끼는 바를 정확히 전달한다고 관찰했다."},{"questionNumber":9,"sourceQuestion":"2번 지문","keyExpression":"accurate reflectors of our sentiments","questionText":"'accurate reflectors of our sentiments'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"precise mirrors that faithfully represent our emotional states","isCorrect":false,"explanation":"올바름: 'precise mirrors'는 'accurate reflectors'의 비유적 의미를 유지하며, 'faithfully represent our emotional states'는 'sentiments'를 적절히 paraphrasing함","translation":"우리의 감정 상태를 충실하게 나타내는 정밀한 거울","enText":""},{"text":"trustworthy gauges of our inner emotional condition","isCorrect":false,"explanation":"올바름: 'trustworthy gauges'는 'accurate reflectors'의 의미를 잘 담고 있으며, 'inner emotional condition'은 'sentiments'를 적절히 paraphrasing함","translation":"우리의 내면적 감정 상태를 보여 주는 믿을 만한 척도","enText":""},{"text":"reliable indicators of how we truly feel on the inside","isCorrect":false,"explanation":"올바름: 'reliable indicators'는 'accurate reflectors'를 충실히 paraphrasing하고, 'how we truly feel on the inside'는 'sentiments'의 의미를 자연스럽게 확장함","translation":"우리가 내면으로 진정 어떻게 느끼는지를 보여 주는 신뢰할 만한 지표","enText":""},{"text":"dependable measures that amplify and intensify our emotional responses","isCorrect":true,"explanation":"잘못됨: 원문의 'reflectors'는 감정을 '반영(reflect)'한다는 의미이지, 'amplify(증폭시키다)'하거나 'intensify(강화하다)'한다는 의미가 전혀 없음. 수동적 반영과 능동적 증폭을 혼동한 잘못된 paraphrasing임","translation":"우리의 감정적 반응을 증폭시키고 강화하는 믿을 만한 척도","enText":""},{"text":"faithful representations of our underlying feelings and attitudes","isCorrect":false,"explanation":"올바름: 'faithful representations'은 'accurate reflectors'의 의미를 유지하고, 'underlying feelings and attitudes'는 'sentiments'의 의미를 자연스럽게 paraphrasing함","translation":"우리의 근저에 있는 감정과 태도를 충실히 나타내는 것","enText":""}],"passage":"Why are the feet and legs such accurate reflectors of our sentiments?","passageTranslation":"왜 발과 다리는 우리의 감정을 이토록 정확하게 반영하는 것일까?"},{"questionNumber":10,"sourceQuestion":"2번 지문","keyExpression":"reacted to environmental threats instantaneously, without the need for conscious thought","questionText":"'reacted to environmental threats instantaneously, without the need for conscious thought'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"reacted to surrounding hazards at once, without requiring any intentional awareness","isCorrect":false,"explanation":"올바름: 'surrounding hazards'는 'environmental threats'를, 'at once'는 'instantaneously'를, 'without requiring any intentional awareness'는 'without the need for conscious thought'를 충실히 paraphrasing함","translation":"어떠한 의도적 인식도 필요로 하지 않고 주변의 위험에 즉각 반응했다","enText":""},{"text":"addressed threats from the environment in an instant, prior to any rational deliberation","isCorrect":false,"explanation":"올바름: 'addressed threats from the environment in an instant'는 원문의 핵심 의미를 담고, 'prior to any rational deliberation'은 'without the need for conscious thought'를 논리적으로 paraphrasing함","translation":"어떠한 이성적 숙고에도 앞서, 환경으로부터의 위협에 순식간에 대처했다","enText":""},{"text":"responded to environmental dangers swiftly, as a result of heightened conscious awareness","isCorrect":true,"explanation":"잘못됨: 원문은 'without the need for conscious thought(의식적 사고 없이)'라고 명시하는데, 이 보기는 'as a result of heightened conscious awareness(고조된 의식적 인식의 결과로)'라고 반대 의미로 paraphrasing하여 핵심 논리를 왜곡함","translation":"고조된 의식적 인식의 결과로 환경적 위험에 신속하게 반응했다","enText":""},{"text":"reacted to threats in the surrounding environment at once, with no conscious reasoning involved","isCorrect":false,"explanation":"올바름: 'threats in the surrounding environment'는 'environmental threats'를, 'at once'는 'instantaneously'를, 'with no conscious reasoning involved'는 'without the need for conscious thought'를 정확히 paraphrasing함","translation":"어떠한 의식적 추론도 개입하지 않고 주변 환경의 위협에 즉각 반응했다","enText":""},{"text":"responded to external dangers immediately, bypassing deliberate mental processing","isCorrect":false,"explanation":"올바름: 'responded to external dangers immediately'는 'reacted to environmental threats instantaneously'를 정확히 paraphrasing하고, 'bypassing deliberate mental processing'은 'without the need for conscious thought'를 잘 표현함","translation":"의도적인 정신적 처리 과정을 거치지 않고 외부 위험에 즉각 반응했다","enText":""}],"passage":"For millions of years, long before humans spoke, our legs and feet reacted to environmental threats (e.g., hot sand, ill-tempered lions) instantaneously, without the need for conscious thought.","passageTranslation":"수백만 년 전, 인간이 언어를 사용하기 훨씬 전부터, 우리의 다리와 발은 의식적 사고의 필요 없이 환경적 위협(예: 뜨거운 모래, 성질 고약한 사자)에 즉각적으로 반응했다."},{"questionNumber":11,"sourceQuestion":"2번 지문","keyExpression":"Our limbic brains made sure that our feet and legs reacted as needed by either ceasing motion, running away, or kicking at a potential threat","questionText":"'Our limbic brains made sure that our feet and legs reacted as needed by either ceasing motion, running away, or kicking at a potential threat'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the primitive emotional brain guaranteed that our legs and feet took the necessary action of stopping, escaping, or attacking when facing a likely threat","isCorrect":false,"explanation":"올바름: 'primitive emotional brain'은 'limbic brain'을, 'guaranteed'는 'made sure'를, 'stopping, escaping, or attacking'은 원문의 세 가지 반응을 충실히 paraphrasing하며, 'likely threat'은 'potential threat'과 의미상 부합함","translation":"원시적 감정 뇌는 잠재적 위협에 직면했을 때 다리와 발이 멈추거나 도망치거나 공격하는 필요한 행동을 취하도록 보장했다","enText":""},{"text":"the emotion-regulating part of our brain ensured our lower limbs responded appropriately by freezing, fleeing, or striking at a possible danger","isCorrect":false,"explanation":"올바름: 'emotion-regulating part of our brain'은 'limbic brain'을, 'ensured'는 'made sure'를, 'freezing, fleeing, or striking'은 'ceasing motion, running away, or kicking'을, 'possible danger'는 'potential threat'을 정확히 paraphrasing함","translation":"뇌의 감정 조절 부위는 우리의 하지가 잠재적 위험에 얼어붙거나, 도망치거나, 가격하는 방식으로 적절히 반응하도록 보장했다","enText":""},{"text":"the brain's emotional center ensured our feet and legs reacted appropriately by either stopping movement, fleeing, or directing a kick toward a potential danger","isCorrect":false,"explanation":"올바름: 'brain's emotional center'는 'limbic brain'을, 'ensured'는 'made sure'를, 'stopping movement, fleeing, or directing a kick'은 원문의 세 가지 행동을, ' ined in our system'은 'hardwired in us'를 자연스럽게 paraphrasing함","translation":"이 오랫동안 이어져 온 반사 반응들은 우리의 시스템 속에 여전히 매우 깊이 뿌리 내려 있다","enText":""}],"passage":"In fact, these age-old reactions are still so hardwired in us that when we are presented with something dangerous or even disagreeable, our feet and legs still react as they did in prehistoric times.","passageTranslation":"사실, 이러한 오래된 반응들은 우리 안에 여전히 너무나 깊이 각인되어 있어서, 우리가 위험하거나 심지어 불쾌한 것에 직면할 때, 우리의 발과 다리는 선사시대에 그랬던 것처럼 여전히 반응한다."},{"questionNumber":14,"sourceQuestion":"2번 지문","keyExpression":"when we are presented with something dangerous or even disagreeable, our feet and legs still react as they did in prehistoric times","questionText":"'when we are presented with something dangerous or even disagreeable, our feet and legs still react as they did in prehistoric times'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"our feet and legs still behave in the same primitive fashion as they did thousands of years ago when confronted with anything that is hazardous or even objectionable","isCorrect":false,"explanation":"올바름: 'primitive fashion'과 'thousands of years ago'는 'prehistoric times'를, 'hazardous or even objectionable'은 'dangerous or even disagreeable'를, 'confronted with'는 'presented with'를 정확히 paraphrasing함","translation":"우리의 발과 다리는 위험하거나 심지어 불쾌한 것에 직면했을 때 수천 년 전과 동일한 원시적 방식으로 여전히 행동한다","enText":""},{"text":"our feet and legs adapt and develop new responses each time we encounter a dangerous or unpleasant situation, reflecting our evolved cognitive abilities","isCorrect":true,"explanation":"잘못됨: 원문은 발과 다리가 선사시대와 '동일하게' 반응한다고 하는데, 이 보기는 'adapt and develop new responses(적응하고 새로운 반응을 개발한다)'라고 표현하여 반응의 불변성이라는 원문의 핵심 논점을 정반대로 왜곡함","translation":"우리의 발과 다리는 위험하거나 불쾌한 상황에 직면할 때마다 적응하여 새로운 반응을 발달시키며, 이는 우리의 진화된 인지 능력을 반영한다","enText":""},{"text":"whenever something perilous or even distasteful is placed before us, our lower limbs still respond the way they would have in the Stone Age","isCorrect":false,"explanation":"
