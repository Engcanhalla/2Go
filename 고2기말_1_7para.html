isasters","questionText":"'most migration is involuntary — people fleeing natural or man-made disasters'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"a large portion of migrants leave their homes by compulsion, escaping either environmental or artificially generated emergencies","isCorrect":false,"explanation":"올바름: involuntary→by compulsion, fleeing→escaping, natural disasters→environmental emergencies, man-made→artificially generated로 의미 보존됨","translation":"상당수의 이주민들이 강제로 집을 떠나며, 환경적이거나 인위적으로 발생한 비상 상황을 피해 달아난다","enText":""},{"text":"the majority of population movement occurs without personal choice, driven by natural catastrophes or human-caused crises","isCorrect":false,"explanation":"올바름: involuntary→without personal choice, fleeing→driven by, natural or man-made disasters→natural catastrophes or human-caused crises로 정확히 대응됨","translation":"대부분의 인구 이동은 개인적 선택 없이, 자연재해나 인간이 유발한 위기에 의해 발생한다","enText":""},{"text":"migrants are generally motivated by personal ambition rather than forced displacement from disaster-prone regions","isCorrect":true,"explanation":"잘못됨: 원문은 '대부분의 이주가 비자발적'이라는 가정을 제시하는데, 이 보기는 반대로 '개인적 야망에 의한 자발적 이동'으로 의미를 역전시켜 핵심을 왜곡함","translation":"이주민들은 재해 지역에서의 강제 이주보다는 일반적으로 개인적 야망에 의해 동기를 부여받는다","enText":""},{"text":"it is commonly assumed that the bulk of migration happens not by free will but as a result of escaping disasters, whether naturally occurring or caused by human activity","isCorrect":false,"explanation":"올바름: questionable assumption→commonly assumed, involuntary→not by free will, fleeing natural or man-made disasters→escaping disasters, whether naturally occurring or caused by human activity로 정확함","translation":"대부분의 이주가 자유 의지가 아닌, 자연적으로 발생했거나 인간 활동으로 인한 재해를 피한 결과로 일어난다고 흔히 가정된다","enText":""},{"text":"it is widely presumed that migration is predominantly forced, with people running away from disasters that are either environmental or human-induced","isCorrect":false,"explanation":"올바름: involuntary→forced, fleeing→running away from, natural→environmental, man-made→human-induced로 충실히 paraphrase됨","translation":"이주는 주로 강제적인 것으로 널리 추정되며, 사람들이 환경적이거나 인간이 유발한 재해를 피해 달아나는 것으로 여겨진다","enText":""}],"passage":"The other questionable assumption is that most migration is involuntary — people fleeing natural or man-made disasters.","passageTranslation":"또 다른 의문스러운 가정은 대부분의 이주가 비자발적이라는 것, 즉 자연재해나 인간이 만든 재해를 피해 달아나는 사람들이라는 것이다."},{"questionNumber":17,"sourceQuestion":"3번 지문","keyExpression":"many migrants are simply seeking greater economic opportunity","questionText":"'many migrants are simply seeking greater economic opportunity'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"a significant number of migrants are merely pursuing better chances for financial advancement","isCorrect":false,"explanation":"올바름: many→a significant number, simply→merely, seeking→pursuing, greater economic opportunity→better chances for financial advancement로 정확히 대응됨","translation":"상당수의 이주민들은 단지 더 나은 경제적 발전의 기회를 추구하고 있을 뿐이다","enText":""},{"text":"numerous migrants move primarily in search of improved prospects for material well-being","isCorrect":false,"explanation":"올바름: many→numerous, simply seeking→move primarily in search of, greater economic opportunity→improved prospects for material well-being으로 의미 보존됨","translation":"수많은 이주민들이 주로 물질적 풍요의 향상된 가능성을 찾아 이동한다","enText":""},{"text":"many of those who migrate do so chiefly to gain access to wider economic possibilities","isCorrect":false,"explanation":"올바름: simply→chiefly, seeking→do so to gain access to, greater economic opportunity→wider economic possibilities로 의미가 정확히 유지됨","translation":"이주하는 사람들 중 많은 이들이 더 넓은 경제적 가능성에 접근하기 위해 주로 그렇게 한다","enText":""},{"text":"quite a few migrants are straightforwardly looking for more favorable economic conditions","isCorrect":false,"explanation":"올바름: many→quite a few, simply→straightforwardly, seeking→looking for, greater economic opportunity→more favorable economic conditions로 충실히 대응됨","translation":"꽤 많은 이주민들이 단순히 더 유리한 경제적 조건을 찾고 있다","enText":""},{"text":"a large proportion of migrants are compelled by political instability to abandon their economic livelihoods","isCorrect":true,"explanation":"잘못됨: 원문은 '더 나은 경제적 기회를 자발적으로 추구'하는 것인데, 이 보기는 '정치적 불안정에 의한 강제적 생계 포기'로 동기와 방향을 완전히 왜곡함","translation":"상당 비율의 이주민들이 정치적 불안정으로 인해 경제적 생계를 포기할 수밖에 없다","enText":""}],"passage":"The reality, however, is more complex, and many migrants are simply seeking greater economic opportunity.","passageTranslation":"그러나 현실은 더 복잡하며, 많은 이주민들은 단순히 더 큰 경제적 기회를 추구하고 있을 뿐이다."},{"questionNumber":18,"sourceQuestion":"3번 지문","keyExpression":"out-migration generally redistributes workers from places of labor surplus to areas where there is greater demand or more opportunity","questionText":"'out-migration generally redistributes workers from places of labor surplus to areas where there is greater demand or more opportunity'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the movement of workers out of their home regions commonly serves to balance labor supply by directing people toward locations with greater economic need","isCorrect":false,"explanation":"올바름: out-migration→movement of workers out of their home regions, redistributes→serves to balance, labor surplus→balance labor supply, greater demand→greater economic need로 핵심 의미가 유지됨","translation":"노동자들이 자신의 고향 지역을 벗어나는 이동은 일반적으로 더 큰 경제적 필요가 있는 지역으로 사람들을 이끌어 노동 공급의 균형을 맞추는 역할을 한다","enText":""},{"text":"emigration tends to shift the distribution of labor from oversupplied regions to those experiencing a shortage of workers or expanded economic openings","isCorrect":false,"explanation":"올바름: out-migration→emigration, redistributes→shift the distribution, labor surplus→oversupplied regions, greater demand or more opportunity→shortage of workers or expanded economic openings로 의미 보존됨","translation":"이민은 노동력이 과잉 공급된 지역에서 노동력 부족이나 경제적 기회가 확대된 지역으로 노동 분배를 이동시키는 경향이 있다","enText":""},{"text":"when workers leave an area, they are usually absorbed by regions where labor is scarce and economic opportunities are more abundant","isCorrect":false,"explanation":"올바름: out-migration→workers leave an area, redistributes→absorbed by, labor surplus(origin)→contrast with labor scarce(destination), more opportunity→more abundant으로 논리적 관계가 유지됨","translation":"노동자들이 한 지역을 떠날 때, 그들은 보통 노동력이 부족하고 경제적 기회가 더 풍부한 지역으로 흡수된다","enText":""},{"text":"population outflows generally cause labor shortages in both origin and destination regions, creating economic imbalance across all areas","isCorrect":true,"explanation":"잘못됨: 원문은 이민이 노동 과잉 지역에서 수요가 높은 지역으로 노동을 '재분배'하는 균형 기능을 설명하는데, 이 보기는 양쪽 모두에 노동 부족과 불균형을 초래한다고 왜곡함","translation":"인구 유출은 일반적으로 출발지와 목적지 모두에서 노동력 부족을 야기하여 모든 지역에 경제적 불균형을 초래한다","enText":""},{"text":"the outflow of people typically reallocates the workforce away from regions with an excess of labor toward areas with higher demand or better prospects","isCorrect":false,"explanation":"올바름: out-migration→outflow of people, redistributes→reallocates, labor surplus→excess of labor, greater demand or more opportunity→higher demand or better prospects로 정확히 대응됨","translation":"인구 유출은 일반적으로 노동력 과잉 지역에서 수요가 높거나 더 나은 전망이 있는 지역으로 노동력을 재배치한다","enText":""}],"passage":"out-migration generally redistributes workers from places of labor surplus to areas where there is greater demand or more opportunity.","passageTranslation":"이민(out-migration)은 일반적으로 노동력 과잉 지역에서 더 큰 수요나 기회가 있는 지역으로 노동자들을 재분배한다."},{"questionNumber":19,"sourceQuestion":"3번 지문","keyExpression":"Migration is generally selective of persons who are younger, healthier, more flexible, and more willing to endure hardship in hopes of a better life","questionText":"'Migration is generally selective of persons who are younger, healthier, more flexible, and more willing to endure hardship in hopes of a better life'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"those who migrate tend to be younger individuals in better health, who are more adaptable and prepared to bear difficulties for the sake of improved living conditions","isCorrect":false,"explanation":"올바름: selective of→tend to be, younger and healthier→younger individuals in better health, flexible→adaptable, endure hardship→bear difficulties, in hopes of a better life→for the sake of improved living conditions로 정확히 대응됨","translation":"이주하는 사람들은 더 건강한 젊은 개인들로, 더 나은 생활 조건을 위해 어려움을 감내할 준비가 되어 있고 더 잘 적응하는 경향이 있다","enText":""},{"text":"migrants are typically self-selected from among those with a greater capacity for resilience, who are comparatively young and physically fit, and who are willing to withstand difficulties in pursuit of a more prosperous life","isCorrect":false,"explanation":"올바름: selective of→self-selected, younger and healthier→comparatively young and physically fit, flexible→resilience, endure hardship→withstand difficulties, hopes of better life→pursuit of a more prosperous life로 충실히 paraphrase됨","translation":"이주민들은 보통 회복력이 더 뛰어나고, 비교적 젊고 체력이 좋으며, 더 풍요로운 삶을 추구하기 위해 어려움을 감내할 의지가 있는 사람들 중에서 자기 선택된다","enText":""},{"text":"migration disproportionately draws people who are at a younger age, in stronger physical condition, more open to change, and tolerant of adversity with the expectation of a better future","isCorrect":false,"explanation":"올바름: selective of→disproportionately draws, younger→at a younger age, healthier→in stronger physical condition, flexible→open to change, endure hardship→tolerant of adversity, in hopes of a better life→with the expectation of a better future로 의미 보존됨","translation":"이주는 더 어린 나이, 더 강한 체력, 변화에 더 열린 태도, 그리고 더 나은 미래에 대한 기대를 가지고 역경을 견디는 사람들을 불균형적으로 끌어들인다","enText":""},{"text":"the process of migration tends to filter for individuals who possess greater youth and vitality, along with the mental flexibility and determination to face hardship in anticipation of a life improvement","isCorrect":false,"explanation":"올바름: selective of→filter for, younger→greater youth, healthier→vitality, flexible→mental flexibility, endure hardship→determination to face hardship, in hopes of a better life→in anticipation of a life improvement로 의미가 정확히 유지됨","translation":"이주 과정은 더 큰 젊음과 활력, 그리고 삶의 개선을 기대하며 역경에 맞서는 정신적 유연성과 결단력을 갖춘 개인들을 선별하는 경향이 있다","enText":""},{"text":"it is the older, less physically capable population who are predominantly selected for migration, as they seek stability rather than enduring further challenges","isCorrect":true,"explanation":"잘못됨: 원문은 이주자가 '더 젊고 건강하며 역경을 기꺼이 감내하는' 사람들이라고 하는데, 이 보기는 '나이 많고 체력이 약하며 안정을 추구하는' 사람들이라고 정반대로 왜곡함","translation":"이주를 위해 주로 선택되는 것은 더 나이 많고 신체적으로 덜 유능한 인구이며, 그들은 추가적인 도전을 감내하기보다 안정을 추구한다","enText":""}],"passage":"Migration is generally selective of persons who are younger, healthier, more flexible, and more willing to endure hardship in hopes of a better life relative to their prospects in their places of origin.","passageTranslation":"이주는 일반적으로 출신지에서의 전망에 비해 더 젊고, 더 건강하며, 더 유연하고, 더 나은 삶을 희망하며 역경을 기꺼이 감내하려는 사람들을 선별한다."},{"questionNumber":20,"sourceQuestion":"3번 지문","keyExpression":"migration can also be a solution for many preexisting problems","questionText":"'migration can also be a solution for many preexisting problems'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the movement of people to new regions can generate a fresh set of social and economic challenges that were previously absent","isCorrect":true,"explanation":"잘못됨: 원문은 이주가 기존 문제의 '해결책'이 될 수 있다는 긍정적 측면인데, 이 보기는 이주가 '새로운 문제를 만든다'는 부정적 의미로 완전히 반전시켜 핵심을 왜곡함","translation":"새로운 지역으로의 인구 이동은 이전에는 없었던 새로운 사회·경제적 도전들을 만들어낼 수 있다","enText":""},{"text":"population movement can likewise serve as a remedy for numerous issues that already existed before migration began","isCorrect":false,"explanation":"올바름: migration→population movement, also→likewise, solution→remedy, preexisting problems→issues that already existed로 정확히 대응됨","translation":"인구 이동은 또한 이주가 시작되기 전에 이미 존재했던 수많은 문제들에 대한 해결책으로 기능할 수 있다","enText":""},{"text":"relocation of populations may function as an answer to various difficulties that were already in existence prior to any migratory movement","isCorrect":false,"explanation":"올바름: migration→relocation of populations, solution→function as an answer, preexisting→already in existence prior to any migratory movement로 충실히 paraphrase됨","translation":"인구의 재배치는 어떠한 이주 움직임보다 앞서 이미 존재했던 다양한 어려움들에 대한 답으로 기능할 수 있다","enText":""},{"text":"migration has the capacity to act as a means of resolving problems that preceded its own occurrence","isCorrect":false,"explanation":"올바름: solution→means of resolving, preexisting→problems that preceded its own occurrence로 의미가 정확히 유지되며 논리적 관계도 보존됨","translation":"이주는 그 자체가 발생하기 이전부터 존재하던 문제들을 해결하는 수단으로 작용할 수 있는 역량을 가진다","enText":""},{"text":"moving from one place to another has the potential to address a range of problems that were present even before the migration took place","isCorrect":false,"explanation":"올바름: migration→moving from one place to another, solution→address, preexisting→present even before the migration took place로 의미 보존됨","translation":"한 곳에서 다른 곳으로 이동하는 것은 이주가 일어나기 전에도 존재했던 다양한 문제들을 해결할 가능성이 있다","enText":""}],"passage":"But migration can also be a solution for many preexisting problems.","passageTranslation":"그러나 이주는 또한 많은 기존 문제들에 대한 해결책이 될 수도 있다."},{"questionNumber":21,"sourceQuestion":"3번 지문","keyExpression":"examines long-term outcomes of migration, including remittances and intergenerational mobility, finds positive 'long-term' effects on places of origin and destination","questionText":"'examines long-term outcomes of migration, including remittances and intergenerational mobility, finds positive \"long-term\" effects on places of origin and destination'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"investigates the extended consequences of population movement, encompassing money sent home and social advancement across generations, and concludes that both sending and receiving regions benefit over time","isCorrect":false,"explanation":"올바름: examines→investigates, long-term outcomes→extended consequences, remittances→money sent home, intergenerational mobility→social advancement across generations, places of origin and destination→sending and receiving regions로 정확히 대응됨","translation":"인구 이동의 장기적 결과를 조사하고, 고국으로 보내는 송금과 세대 간 사회적 상승을 포함하여, 송출 지역과 수용 지역 모두가 시간이 지남에 따라 혜택을 받는다는 결론을 내린다","enText":""},{"text":"looks into the lasting effects of people moving across regions, accounting for financial transfers to home countries and upward mobility between generations, and reveals beneficial impacts on both the regions migrants leave and those they arrive in","isCorrect":false,"explanation":"올바름: examines→looks into, long-term→lasting, remittances→financial transfers to home countries, intergenerational mobility→upward mobility between generations, positive effects→beneficial impacts, origin and destination→regions migrants leave and those they arrive in으로 의미 보존됨","translation":"지역 간 이동의 지속적인 영향을 조사하고, 본국으로의 금전적 이전과 세대 간 상향 이동을 고려하여, 이주민들이 떠나는 지역과 도착하는 지역 모두에 유익한 영향을 드러낸다","enText":""},{"text":"focuses primarily on the short-term economic burdens of migration, such as immediate wage suppression, and finds that the negative impacts outweigh any benefits for receiving communities","isCorrect":true,"explanation":"잘못됨: 원문은 '장기적 결과'에서 '긍정적 효과'를 발견한다고 하는데, 이 보기는 '단기적 경제적 부담'과 '부정적 영향'이 더 크다고 하여 시간 범위와 결론 모두를 왜곡함","translation":"주로 즉각적인 임금 억제 등 이주의 단기적인 경제적 부담에 초점을 맞추며, 수용 지역 공동체에서 부정적인 영향이 혜택보다 더 크다는 것을 발견한다","enText":""},{"text":"analyzes the prolonged results of migratory patterns, taking into account cross-generational social progress and earnings sent back to home countries, and determines that there are constructive enduring impacts on both origin and host regions","isCorrect":false,"explanation":"올바름: examines→analyzes, long-term outcomes→prolonged results, intergenerational mobility→cross-generational social progress, remittances→earnings sent back to home countries, positive effects→constructive enduring impacts, origin and destination→origin and host regions로 충실히 paraphrase됨","translation":"이주 패턴의 장기적 결과를 분석하고, 세대를 초월한 사회적 발전과 본국으로 보내는 수입을 고려하여, 출신 지역과 수용 지역 모두에 건설적이고 지속적인 영향이 있음을 결론 내린다","enText":""},{"text":"studies the far-reaching consequences of migration over time, including the transfer of earnings to home regions and the social mobility experienced across generations, and establishes that such movement yields favorable outcomes for the communities on both ends of the migration process","isCorrect":false,"explanation":"올바름: examines→studies, long-term→over time, remittances→transfer of earnings to home regions, intergenerational mobility→social mobility across generations, positive effects→favorable outcomes, places of origin and destination→communities on both ends로 의미가 정확히 유지됨","translation":"시간에 걸친 이주의 광범위한 결과를 연구하고, 고향 지역으로의 수입 이전과 세대 간 경험되는 사회적 이동성을 포함하여, 그러한 이동이 이주 과정의 양쪽 끝에 있는 지역 사회에 유리한 결과를 가져다준다는 것을 확립한다","enText":""}],"passage":"Most research that examines long-term outcomes of migration, including remittances and intergenerational mobility, finds positive 'long-term' effects on places of origin and destination.","passageTranslation":"송금과 세대 간 이동성을 포함하여 이주의 장기적 결과를 검토하는 대부분의 연구는 출신지와 목적지 모두에 긍정적인 '장기적' 효과가 있음을 발견한다."},{"questionNumber":22,"sourceQuestion":"4번 지문","keyExpression":"shifts the clock to extend evening daylight hours","questionText":"'shifts the clock to extend evening daylight hours'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"alters the clock setting with the aim of giving people more daylight in the evening","isCorrect":false,"explanation":"올바름: 'shifts the clock'을 'alters the clock setting'으로, 'extend evening daylight hours'를 'giving people more daylight in the evening'으로 적절히 paraphrasing함","translation":"사람들에게 저녁 시간대에 더 많은 햇빛을 제공하기 위해 시계 설정을 변경함","enText":""},{"text":"changes the time so that sunlight remains available for a longer period in the evening","isCorrect":false,"explanation":"올바름: 'shifts the clock'을 'changes the time'으로, 'extend evening daylight hours'를 'sunlight remains available for a longer period in the evening'으로 올바르게 표현함","translation":"저녁에 햇빛이 더 오랫동안 지속되도록 시간을 변경함","enText":""},{"text":"moves the clock forward so that darkness falls earlier in the evening","isCorrect":true,"explanation":"잘못됨: DST는 저녁 햇빛 시간을 늘리는 것인데, 'darkness falls earlier'(어둠이 더 일찍 찾아온다)는 반대 의미를 전달함","translation":"저녁에 어둠이 더 일찍 찾아오도록 시계를 앞으로 조정함","enText":""},{"text":"adjusts the time in order to prolong the hours of natural light in the evening","isCorrect":false,"explanation":"올바름: 'shifts the clock'을 'adjusts the time'으로, 'extend evening daylight hours'를 'prolong the hours of natural light in the evening'으로 정확히 바꿈","translation":"저녁 시간대의 자연광 시간을 연장하기 위해 시간을 조정함","enText":""},{"text":"modifies the clock to make evening daylight last longer than it naturally would","isCorrect":false,"explanation":"올바름: 'shifts'를 'modifies'로, 'extend evening daylight hours'를 'make evening daylight last longer than it naturally would'로 적절하게 paraphrasing함","translation":"자연 상태보다 저녁 햇빛이 더 오래 지속되도록 시계를 수정함","enText":""}],"passage":"DST is a system that shifts the clock to extend evening daylight hours.","passageTranslation":"DST는 저녁 시간대의 햇빛 시간을 연장하기 위해 시계를 조정하는 시스템이다."},{"questionNumber":23,"sourceQuestion":"4번 지문","keyExpression":"the idea was adopted by several countries to save energy during World Wars I and II","questionText":"'the idea was adopted by several countries to save energy during World Wars I and II'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"a number of nations took up the concept for the purpose of conserving energy in wartime","isCorrect":false,"explanation":"올바름: 'several countries adopted'를 'a number of nations took up'으로, 'to save energy'를 'for the purpose of conserving energy'로 적절히 바꿈","translation":"전시에 에너지를 절약할 목적으로 여러 나라가 그 개념을 채택함","enText":""},{"text":"the concept gained acceptance across various nations who sought to preserve energy resources amid the wars","isCorrect":false,"explanation":"올바름: 'was adopted'를 'gained acceptance'로, 'to save energy'를 'to preserve energy resources'로 적절하게 변환함","translation":"전쟁 중 에너지 자원을 보존하려 했던 여러 나라에서 그 개념이 받아들여짐","enText":""},{"text":"various nations embraced the approach with the goal of cutting down on energy use throughout the wartime periods","isCorrect":false,"explanation":"올바름: 'adopted'를 'embraced'로, 'to save energy'를 'with the goal of cutting down on energy use'로 올바르게 paraphrasing함","translation":"전시 기간 동안 에너지 사용을 줄이기 위한 목적으로 여러 나라가 그 방식을 받아들임","enText":""},{"text":"multiple countries implemented the idea as a means of reducing energy consumption during the two world wars","isCorrect":false,"explanation":"올바름: 'adopted'를 'implemented'로, 'to save energy'를 'as a means of reducing energy consumption'으로 올바르게 paraphrasing함","translation":"여러 나라가 두 차례의 세계대전 동안 에너지 소비를 줄이는 수단으로 그 아이디어를 시행함","enText":""},{"text":"several countries rejected the proposal despite the urgent need to conserve energy during the world wars","isCorrect":true,"explanation":"잘못됨: 원문은 여러 나라가 아이디어를 '채택했다'는 의미인데, 'rejected the proposal'(제안을 거부했다)로 반대 의미를 표현함","translation":"세계대전 중 에너지 절약의 긴박한 필요에도 불구하고 여러 나라가 그 제안을 거부함","enText":""}],"passage":"First proposed by scientist George Vernon Hudson in 1895, the idea was adopted by several countries to save energy during World Wars I and II.","passageTranslation":"1895년 과학자 조지 버넌 허드슨에 의해 처음 제안된 이 아이디어는 제1·2차 세계대전 중 에너지를 절약하기 위해 여러 나라에서 채택되었다."},{"questionNumber":24,"sourceQuestion":"4번 지문","keyExpression":"boosted consumer spending","questionText":"'boosted consumer spending'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"a reduction in the financial burden placed on everyday consumers","isCorrect":true,"explanation":"잘못됨: 원문은 소비자 지출이 '증가'했다는 의미인데, 'a reduction in the financial burden'(재정적 부담의 감소)은 지출 증가가 아닌 비용 절감을 의미하므로 전혀 다른 내용임","translation":"일반 소비자들이 지는 재정적 부담의 감소","enText":""},{"text":"an increase in the amount of money that people spend as buyers","isCorrect":false,"explanation":"올바름: 'boosted'를 'an increase in'으로, 'consumer spending'을 'the amount of money that people spend as buyers'로 정확히 paraphrasing함","translation":"구매자로서 사람들이 지출하는 금액의 증가","enText":""},{"text":"a rise in purchasing activity among the general public","isCorrect":false,"explanation":"올바름: 'boosted'를 'a rise in'으로, 'consumer spending'을 'purchasing activity among the general public'으로 적절히 paraphrasing함","translation":"일반 대중 사이에서 구매 활동의 증가","enText":""},{"text":"an enhanced level of expenditure by people in their role as consumers","isCorrect":false,"explanation":"올바름: 'boosted'를 'an enhanced level of'로, 'consumer spending'을 'expenditure by people in their role as consumers'로 올바르게 표현함","translation":"소비자로서의 역할을 하는 사람들의 지출 수준 향상","enText":""},{"text":"a growth in the extent to which individuals make purchases in the marketplace","isCorrect":false,"explanation":"올바름: 'boosted'를 'a growth in'으로, 'consumer spending'을 'the extent to which individuals make purchases'로 적절하게 paraphrasing함","translation":"개인들이 시장에서 구매를 하는 정도의 증가","enText":""}],"passage":"DST offers other benefits, including increased work productivity, boosted consumer spending, and additional time for daily activities.","passageTranslation":"DST는 향상된 업무 생산성, 증가된 소비자 지출, 일상 활동을 위한 추가 시간을 포함하여 다른 이점들도 제공한다."},{"questionNumber":25,"sourceQuestion":"4번 지문","keyExpression":"critics of DST argue that people often use more energy in the darker mornings","questionText":"'critics of DST argue that people often use more energy in the darker mornings'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"those critical of DST claim that the absence of morning sunlight drives people to consume greater amounts of energy","isCorrect":false,"explanation":"올바름: 'argue'를 'claim'으로, 'darker mornings'를 'the absence of morning sunlight'로 올바르게 paraphrasing함","translation":"DST에 비판적인 사람들은 아침 햇빛의 부재가 사람들로 하여금 더 많은 에너지를 소비하게 만든다고 주장함","enText":""},{"text":"those who oppose DST point out that energy consumption tends to rise due to dimmer morning conditions","isCorrect":false,"explanation":"올바름: 'critics argue'를 'those who oppose point out'으로, 'darker mornings'를 'dimmer morning conditions'으로 적절히 paraphrasing함","translation":"DST에 반대하는 사람들은 더 어두운 아침 환경 때문에 에너지 소비가 증가하는 경향이 있다고 지적함","enText":""},{"text":"opponents of DST contend that the reduced natural light in the mornings leads to higher energy use","isCorrect":false,"explanation":"올바름: 'critics argue'를 'opponents contend'로, 'darker mornings'를 'reduced natural light in the mornings'로 올바르게 변환함","translation":"DST 반대론자들은 아침의 줄어든 자연광이 더 높은 에너지 사용으로 이어진다고 주장함","enText":""},{"text":"detractors of DST maintain that increased energy demands occur as a result of less sunlight in the morning hours","isCorrect":false,"explanation":"올바름: 'critics argue'를 'detractors maintain'으로, 'darker mornings'를 'less sunlight in the morning hours'로 적절하게 paraphrasing함","translation":"DST 비판자들은 아침 시간대에 햇빛이 줄어들면서 에너지 수요가 증가한다고 주장함","enText":""},{"text":"skeptics of DST insist that people are more productive in the mornings and therefore consume less energy overall","isCorrect":true,"explanation":"잘못됨: 원문은 어두운 아침에 에너지를 '더 많이' 사용한다는 비판인데, 'consume less energy overall'(전체적으로 에너지를 덜 소비)은 정반대의 의미이며 생산성 향상이라는 무관한 내용을 삽입함","translation":"DST에 회의적인 사람들은 사람들이 아침에 더 생산적이어서 전체적으로 에너지를 덜 소비한다고 주장함","enText":""}],"passage":"Despite its benefits, critics of DST argue that people often use more energy in the darker mornings.","passageTranslation":"장점에도 불구하고, DST 비판론자들은 사람들이 더 어두운 아침에 종종 더 많은 에너지를 사용한다고 주장한다."},{"questionNumber":26,"sourceQuestion":"4번 지문","keyExpression":"disrupt the brain's circadian rhythms","questionText":"'disrupt the brain's circadian rhythms'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"disturb the regular sleep-wake cycles that the brain naturally follows","isCorrect":false,"explanation":"올바름: 'disrupt circadian rhythms'를 'disturb the regular sleep-wake cycles'로, 이는 일주기 리듬의 핵심 기능을 올바르게 표현함","translation":"뇌가 자연적으로 따르는 규칙적인 수면-각성 주기를 방해함","enText":""},{"text":"reinforce the brain's ability to maintain a stable and consistent daily biological rhythm","isCorrect":true,"explanation":"잘못됨: 원문은 일주기 리듬을 '방해한다'는 부정적 의미인데, 'reinforce the brain's ability to maintain a stable rhythm'(안정적인 리듬을 유지하는 능력을 강화)은 정반대인 긍정적 효과를 나타냄","translation":"뇌가 안정적이고 일관된 일일 생체 리듬을 유지하는 능력을 강화함","enText":""},{"text":"throw off the brain's built-in timing system that regulates daily bodily functions","isCorrect":false,"explanation":"올바름: 'disrupt'를 'throw off'로, 'circadian rhythms'를 'built-in timing system that regulates daily bodily functions'으로 올바르게 paraphrasing함","translation":"일상적인 신체 기능을 조절하는 뇌의 내장된 시간 조절 시스템을 혼란시킴","enText":""},{"text":"upset the brain's cyclical patterns that govern when people feel alert or sleepy","isCorrect":false,"explanation":"올바름: 'disrupt'를 'upset'으로, 'circadian rhythms'를 'cyclical patterns that govern when people feel alert or sleepy'로 적절하게 paraphrasing함","translation":"사람들이 각성하거나 졸음을 느끼는 시간을 지배하는 뇌의 주기적 패턴을 혼란시킴","enText":""},{"text":"interfere with the brain's natural internal biological clock","isCorrect":false,"explanation":"올바름: 'disrupt'를 'interfere with'로, 'circadian rhythms'를 'natural internal biological clock'으로 정확히 paraphrasing함","translation":"뇌의 자연스러운 내부 생체 시계를 방해함","enText":""}],"passage":"This can reportedly disrupt the brain's circadian rhythms, increase the risk of heart attack, and cause people to get into more accidents.","passageTranslation":"이것은 뇌의 일주기 리듬을 방해하고, 심장마비의 위험을 높이며, 사람들이 더 많은 사고를 내게 할 수 있다고 보고된다."},{"questionNumber":27,"sourceQuestion":"4번 지문","keyExpression":"permanently adopt DST, ending the tradition of changing the clocks twice a year","questionText":"'permanently adopt DST, ending the tradition of changing the clocks twice a year'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"temporarily trial DST while maintaining the existing schedule of clock adjustments throughout the year","isCorrect":true,"explanation":"잘못됨: 원문은 DST를 '영구적으로 채택'하고 '전통을 종료'하는 것인데, 'temporarily trial'(일시적으로 시험 운영)과 'maintaining the existing schedule'(기존 일정 유지)은 각각 영구성과 전통 종료에 정반대되는 의미임","translation":"연중 시계 조정의 기존 일정을 유지하면서 DST를 일시적으로 시험 운영함","enText":""},{"text":"establish DST as a permanent standard, doing away with the need to reset clocks at two points each year","isCorrect":false,"explanation":"올바름: 'permanently adopt'를 'establish as a permanent standard'로, 'changing the clocks twice a year'를 'reset clocks at two points each year'로 적절하게 paraphrasing함","translation":"매년 두 시점에 시계를 재설정할 필요성을 없애면서 DST를 영구적인 표준으로 확립함","enText":""},{"text":"introduce DST as a lasting policy while discontinuing the twice-yearly practice of adjusting the clocks","isCorrect":false,"explanation":"올바름: 'permanently adopt'를 'introduce as a lasting policy'로, 'ending the tradition'을 'discontinuing the twice-yearly practice'로 올바르게 변환함","translation":"1년에 두 번 시계를 조정하는 관행을 중단하면서 DST를 영구적인 정책으로 도입함","enText":""},{"text":"lock in DST as the unchanging time standard by putting an end to the annual twice-yearly clock changes","isCorrect":false,"explanation":"올바름: 'permanently adopt'를 'lock in as the unchanging time standard'로, 'ending the tradition of changing clocks twice a year'를 'putting an end to the annual twice-yearly clock changes'로 올바르게 표현함","translation":"연간 두 차례의 시계 변경을 종료함으로써 DST를 변하지 않는 시간 표준으로 확정함","enText":""},{"text":"make DST a fixed, ongoing practice by abolishing the biannual custom of resetting the clocks","isCorrect":false,"explanation":"올바름: 'permanently adopt'를 'make a fixed, ongoing practice'로, 'ending the tradition of changing clocks twice a year'를 'abolishing the biannual custom of resetting the clocks'로 적절히 paraphrasing함","translation":"1년에 두 번 시계를 재설정하는 관행을 폐지함으로써 DST를 고정적이고 지속적인 관행으로 만듦","enText":""}],"passage":"The government of British Columbia, Canada, recently decided to permanently adopt DST, ending the tradition of changing the clocks twice a year.","passageTranslation":"캐나다 브리티시컬럼비아 주 정부는 최근 DST를 영구적으로 채택하여 1년에 두 번 시계를 바꾸는 전통을 끝내기로 결정했다."},{"questionNumber":28,"sourceQuestion":"4번 지문","keyExpression":"Supported by over 90 percent of the public","questionText":"'Supported by over 90 percent of the public'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"having gained the approval of an overwhelming majority of citizens","isCorrect":false,"explanation":"올바름: 'supported by over 90 percent'를 'having gained the approval of an overwhelming majority'로 적절하게 paraphrasing함. '90% 이상'은 압도적 다수로 볼 수 있음","translation":"시민의 압도적 다수의 승인을 얻어","enText":""},{"text":"enjoying broad public consensus, with nearly all residents expressing their agreement","isCorrect":false,"explanation":"올바름: 'over 90 percent of the public'을 'broad public consensus with nearly all residents'로 적절하게 paraphrasing함","translation":"거의 모든 주민들이 동의를 표명하면서 광범위한 대중적 합의를 얻어","enText":""},{"text":"with the backing of more than nine out of ten members of the general population","isCorrect":false,"explanation":"올바름: 'over 90 percent'를 'more than nine out of ten'으로, 'the public'을 'members of the general population'으로 정확하게 paraphrasing함","translation":"일반 대중 열 명 중 아홉 명 이상의 지지를 받아","enText":""},{"text":"endorsed by a small but vocal minority of the community who were strongly in favor","isCorrect":true,"explanation":"잘못됨: 원문은 90% 이상의 압도적 다수가 지지한다는 의미인데, 'a small but vocal minority'(소수이지만 목소리 큰 소수)는 정반대의 의미를 전달함","translation":"강력하게 찬성하는 작지만 목소리 큰 지역사회 소수의 지지를 받아","enText":""},{"text":"receiving the agreement of the vast majority of people in the region","isCorrect":false,"explanation":"올바름: 'supported by over 90 percent of the public'을 'receiving the agreement of the vast majority of people'로 올바르게 paraphrasing함","translation":"그 지역 사람들의 압도적 다수의 동의를 받아","enText":""}],"passage":"Supported by over 90 percent of the public, residents of the province set their clocks one hour forward for the last time in March 2026.","passageTranslation":"대중의 90% 이상의 지지를 받아, 그 주의 주민들은 2026년 3월에 마지막으로 시계를 한 시간 앞으로 설정했다."},{"questionNumber":29,"sourceQuestion":"4번 지문","keyExpression":"some policymakers have proposed shifting them by 30 minutes, rather than a full hour","questionText":"'some policymakers have proposed shifting them by 30 minutes, rather than a full hour'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"some lawmakers have offered the proposal of moving clocks by a lesser amount, specifically 30 minutes","isCorrect":false,"explanation":"올바름: 'policymakers have proposed'를 'lawmakers have offered the proposal'로, 'shifting by 30 minutes rather than a full hour'를 'moving clocks by a lesser amount, specifically 30 minutes'로 올바르게 표현함","translation":"일부 입법자들이 특히 30분이라는 더 적은 양만큼 시계를 이동시키는 제안을 제시함","enText":""},{"text":"certain legislators have suggested adjusting the clocks by only half an hour instead of sixty minutes","isCorrect":false,"explanation":"올바름: 'policymakers have proposed'를 'legislators have suggested'로, '30 minutes rather than a full hour'를 'only half an hour instead of sixty minutes'로 정확하게 paraphrasing함","translation":"일부 입법자들이 60분 대신 30분만 시계를 조정할 것을 제안함","enText":""},{"text":"some decision-makers have recommended a more moderate clock adjustment of half the conventional amount","isCorrect":false,"explanation":"올바름: 'policymakers have proposed'를 'decision-makers have recommended'로, '30 minutes rather than a full hour'를 'half the conventional amount'로 적절하게 paraphrasing함","translation":"일부 의사 결정권자들이 기존 조정 시간의 절반에 해당하는 보다 온건한 시계 조정을 권고함","enText":""},{"text":"several government officials have advocated for eliminating the time change altogether rather than reducing it","isCorrect":true,"explanation":"잘못됨: 원문은 1시간 대신 30분으로 '줄이자'는 제안인데, 'eliminating the time change altogether'(시간 변경을 완전히 없애자)는 전혀 다른 주장으로 원문의 핵심 내용인 '30분으로의 축소'를 왜곡함","translation":"일부 정부 관계자들이 시간 변경을 줄이는 것이 아니라 완전히 없애야 한다고 주장함","enText":""},{"text":"a number of officials in the policy sector have put forward the idea of a smaller, 30-minute time change","isCorrect":false,"explanation":"올바름: 'policymakers have proposed'를 'officials in the policy sector have put forward the idea'로, '30 minutes rather than a full hour'를 'a smaller, 30-minute time change'로 올바르게 변환함","translation":"정책 분야의 일부 관계자들이 더 작은 30분 시간 변경 아이디어를 제안함","enText":""}],"passage":"While other regions, including the United States, Mexico, and Europe, will continue to change their clocks, some policymakers have proposed shifting them by 30 minutes, rather than a full hour.","passageTranslation":"미국, 멕시코, 유럽을 포함한 다른 지역들은 계속해서 시계를 바꿀 것이지만, 일부 정책 입안자들은 1시간이 아닌 30분으로 시계를 이동할 것을 제안했다."},{"questionNumber":30,"sourceQuestion":"4번 지문","keyExpression":"it may reduce disruptions, while opponents say it would complicate timekeeping systems","questionText":"'it may reduce disruptions, while opponents say it would complicate timekeeping systems'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"those who back the idea say it could cut down on the problems caused by the switch, while those who oppose it maintain that it would render timekeeping more burdensome","isCorrect":false,"explanation":"올바름: 'reduce disruptions'를 'cut down on the problems caused by the switch'로, 'complicate timekeeping systems'를 'render timekeeping more burdensome'으로 올바르게 paraphrasing함","translation":"아이디어를 지지하는 사람들은 전환으로 인한 문제를 줄일 수 있다고 말하는 반면, 반대하는 사람들은 시간 기록을 더 부담스럽게 만들 것이라고 주장함","enText":""},{"text":"advocates argue it would solve all existing problems with DST, and even critics have begun to acknowledge its merits","isCorrect":true,"explanation":"잘못됨: 원문은 지지자와 반대자 각각의 상반된 주장을 대조하는 구조인데, 'solve all existing problems'(모든 문제 해결)는 'reduce disruptions'를 과장하고 'even critics have begun to acknowledge its merits'(비판자들도 장점 인정)는 반대론자들의 부정적 입장을 완전히 뒤집음","translation":"지지자들은 그것이 DST의 모든 기존 문제를 해결할 것이라고 주장하며, 비판자들조차 그 장점을 인정하기 시작했음","enText":""},{"text":"supporters claim it could lessen the negative impacts, whereas critics argue it would make time management systems more complex","isCorrect":false,"explanation":"올바름: 'reduce disruptions'를 'lessen the negative impacts'로, 'complicate timekeeping systems'를 'make time management systems more complex'로 정확하게 paraphrasing함","translation":"지지자들은 부정적 영향을 줄일 수 있다고 주장하고, 비판론자들은 시간 관리 시스템을 더 복잡하게 만들 것이라고 주장함","enText":""},{"text":"proponents believe it could ease the negative consequences, while detractors warn that it would add unnecessary complications to systems that track time","isCorrect":false,"explanation":"올바름: 'reduce disruptions'를 'ease the negative consequences'로, 'complicate timekeeping systems'를 'add unnecessary complications to systems that track time'으로 적절하게 paraphrasing함","translation":"지지자들은 부정적 결과를 완화할 수 있다고 믿는 반면, 비판자들은 시간을 추적하는 시스템에 불필요한 복잡성을 더할 것이라고 경고함","enText":""},{"text":"those in favor suggest it might minimize unwanted interference, but those against contend it would create additional challenges for clock-based systems","isCorrect":false,"explanation":"올바름: 'reduce disruptions'를 'minimize unwanted interference'로, 'complicate timekeeping systems'를 'create additional challenges for clock-based systems'로 올바르게 표현함","translation":"찬성하는 사람들은 원치 않는 방해를 최소화할 수 있다고 제안하지만, 반대하는 사람들은 시계 기반 시스템에 추가적인 어려움을 만들 것이라고 주장함","enText":""}],"passage":"Supporters argue that it may reduce disruptions, while opponents say it would complicate timekeeping systems.","passageTranslation":"지지자들은 그것이 혼란을 줄일 수 있다고 주장하는 반면, 반대론자들은 그것이 시간 기록 시스템을 복잡하게 만들 것이라고 말한다."},{"questionNumber":31,"sourceQuestion":"5번 지문","keyExpression":"deeply absorbed in their research","questionText":"'deeply absorbed in their research'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"fully engrossed in the investigation of their chosen topic","isCorrect":false,"explanation":"올바름: 'fully engrossed in'은 'deeply absorbed in'의 정확한 유사 표현이며, 'investigation of their chosen topic'은 연구 활동을 구체적으로 풀어쓴 적절한 paraphrase임","translation":"선택한 주제의 탐구에 완전히 빠져들어","enText":""},{"text":"intensely immersed in pursuing their academic inquiry","isCorrect":false,"explanation":"올바름: 'intensely immersed in'은 'deeply absorbed in'과 동의어 수준의 표현이며, 'academic inquiry'는 'research'를 적절히 환언함","translation":"학문적 탐구에 깊이 몰입하여","enText":""},{"text":"occasionally browsing through research materials with mild interest","isCorrect":true,"explanation":"잘못됨: 'deeply absorbed'는 깊은 몰입을 의미하는데, 'occasionally browsing'과 'mild interest'는 피상적·간헐적 관심을 나타내어 원문의 핵심 의미를 정반대로 왜곡함","translation":"연구 자료를 가끔 가벼운 관심으로 훑어보며","enText":""},{"text":"entirely consumed by their investigative work","isCorrect":false,"explanation":"올바름: 'entirely consumed by'는 'deeply absorbed in'의 강도와 의미를 정확히 반영하며, 'investigative work'는 'research'의 적절한 paraphrase임","translation":"연구 활동에 완전히 몰두하여","enText":""},{"text":"wholly preoccupied with the subject of their study","isCorrect":false,"explanation":"올바름: 'wholly preoccupied with'는 완전한 몰입 상태를 나타내며 원문의 의미와 일치하고, 'the subject of their study'는 'research'를 자연스럽게 대체함","translation":"연구 주제에 완전히 사로잡혀","enText":""}],"passage":"As students become deeply absorbed in their research, they may spend less time exploring related fields or acquiring skills outside their immediate area of study.","passageTranslation":"학생들이 연구에 깊이 몰두하게 되면서, 관련 분야를 탐색하거나 전공 분야 밖의 기술을 습득하는 데 시간을 덜 쓰게 될 수 있다."},{"questionNumber":32,"sourceQuestion":"5번 지문","keyExpression":"limit the breadth of knowledge and skills developed during the programme","questionText":"'limit the breadth of knowledge and skills developed during the programme'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"curb the extent to which students can develop a wide-ranging set of abilities and insights","isCorrect":false,"explanation":"올바름: 'curb the extent to which'는 제한의 의미를, 'wide-ranging set of abilities and insights'는 'breadth of knowledge and skills'를 충실히 반영한 올바른 paraphrase임","translation":"학생들이 폭넓은 능력과 통찰력을 개발할 수 있는 정도를 억제하다","enText":""},{"text":"deepen the level of specialised knowledge that students accumulate within a focused discipline","isCorrect":true,"explanation":"잘못됨: 원문은 지식과 기술의 '폭'이 제한된다는 부정적 결과를 말하는데, 'deepen the level of specialised knowledge'는 오히려 심화·전문화를 긍정적으로 표현하여 원문의 의미를 왜곡함","translation":"학생들이 특정 분야 내에서 축적하는 전문 지식의 깊이를 심화시키다","enText":""},{"text":"constrain the variety of learning outcomes that students can achieve within the doctoral programme","isCorrect":false,"explanation":"올바름: 'constrain the variety of learning outcomes'는 'limit the breadth of knowledge and skills'의 의미를 적절히 환언하며, 전체적인 논리 구조를 유지함","translation":"학생들이 박사 과정 내에서 성취할 수 있는 학습 결과의 다양성을 제약하다","enText":""},{"text":"restrict the range of competencies and understanding gained throughout the course of study","isCorrect":false,"explanation":"올바름: 'restrict the range of'는 'limit the breadth of'를 정확히 대체하며, 'competencies and understanding'은 'knowledge and skills'를, 'throughout the course of study'는 'during the programme'을 적절히 환언함","translation":"학업 과정 전반에 걸쳐 습득되는 역량과 이해의 범위를 제한하다","enText":""},{"text":"narrow the scope of expertise and abilities that students acquire over the duration of their studies","isCorrect":false,"explanation":"올바름: 'narrow the scope of'는 'limit the breadth of'와 의미상 일치하며, 'expertise and abilities'와 'over the duration of their studies'도 원문을 충실히 반영함","translation":"학생들이 학업 기간 동안 습득하는 전문성과 능력의 범위를 좁히다","enText":""}],"passage":"Consequently, this singular focus may limit the breadth of knowledge and skills developed during the programme, potentially hindering students' ability to adapt to diverse career paths or address interdisciplinary challenges.","passageTranslation":"결과적으로, 이러한 단일한 집중은 프로그램 기간 동안 개발되는 지식과 기술의 폭을 제한하여, 다양한 진로에 적응하거나 학제 간 문제를 다루는 학생들의 능력을 저해할 가능성이 있다."},{"questionNumber":33,"sourceQuestion":"5번 지문","keyExpression":"potentially hindering students' ability to adapt to diverse career paths","questionText":"'potentially hindering students' ability to adapt to diverse career paths'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"potentially undermining the flexibility students need to navigate different occupational trajectories","isCorrect":false,"explanation":"올바름: 'potentially undermining'은 원문의 'potentially hindering'과 같은 함의를 가지며, 'flexibility to navigate different occupational trajectories'는 'ability to adapt to diverse career paths'를 충실히 반영함","translation":"학생들이 서로 다른 직업 경로를 탐색하는 데 필요한 유연성을 잠재적으로 약화시키는","enText":""},{"text":"risking a reduction in students' preparedness to engage with varied professional environments","isCorrect":false,"explanation":"올바름: 'risking a reduction in preparedness to engage with'는 잠재적 저해의 의미를 정확히 담으며, 'varied professional environments'는 'diverse career paths'를 자연스럽게 대체함","translation":"다양한 직업적 환경에 적응할 학생들의 준비도를 저하시킬 위험이 있는","enText":""},{"text":"consistently guaranteeing that students are well-equipped to pursue multiple vocational directions","isCorrect":true,"explanation":"잘못됨: 원문은 능력을 '저해할 가능성'이라는 부정적·잠재적 의미인데, 'consistently guaranteeing'은 확실한 보장이라는 긍정적 의미로 원문의 방향성과 양태를 모두 왜곡함","translation":"학생들이 여러 직업 방향을 추구할 준비가 충분히 갖춰지도록 일관되게 보장하는","enText":""},{"text":"perhaps obstructing the readiness of students to adjust to a range of employment options","isCorrect":false,"explanation":"올바름: 'obstructing the readiness to adjust to'는 'hindering the ability to adapt to'와 동일한 구조로 원문을 정확히 환언하며, 'a range of employment options'은 'diverse career paths'의 적절한 paraphrase임","translation":"학생들이 다양한 취업 선택지에 적응할 준비를 방해할 수도 있는","enText":""},{"text":"possibly impairing graduates' capacity to transition into a variety of professional roles","isCorrect":false,"explanation":"올바름: 'possibly impairing'은 'potentially hindering'을, 'capacity to transition into'는 'ability to adapt to'를, 'a variety of professional roles'는 'diverse career paths'를 각각 적절히 대체함","translation":"졸업생들이 다양한 직업적 역할로 전환하는 능력을 저해할 가능성이 있는","enText":""}],"passage":"Consequently, this singular focus may limit the breadth of knowledge and skills developed during the programme, potentially hindering students' ability to adapt to diverse career paths or address interdisciplinary challenges.","passageTranslation":"결과적으로, 이러한 단일한 집중은 프로그램 기간 동안 개발되는 지식과 기술의 폭을 제한하여, 다양한 진로에 적응하거나 학제 간 문제를 다루는 학생들의 능력을 저해할 가능성이 있다."},{"questionNumber":34,"sourceQuestion":"5번 지문","keyExpression":"recognised the limitations of traditional thesis-based doctoral programmes","questionText":"'recognised the limitations of traditional thesis-based doctoral programmes'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"come to terms with the deficiencies present in orthodox thesis-based doctoral training","isCorrect":false,"explanation":"올바름: 'come to terms with the deficiencies'는 한계를 받아들이고 인정하는 의미로 'recognised the limitations'와 일치하며, 'orthodox thesis-based doctoral training'은 원문 표현을 자연스럽게 대체함","translation":"정통적인 논문 기반 박사 훈련에 존재하는 결함을 인정하게 된","enText":""},{"text":"acknowledged the drawbacks inherent in conventional dissertation-centred doctoral education","isCorrect":false,"explanation":"올바름: 'acknowledged the drawbacks'는 'recognised the limitations'를 정확히 대체하며, 'conventional dissertation-centred doctoral education'은 'traditional thesis-based doctoral programmes'의 충실한 paraphrase임","translation":"전통적인 논문 중심의 박사 교육에 내재된 단점을 인정한","enText":""},{"text":"become aware of the constraints embedded in time-honoured thesis-driven graduate studies","isCorrect":false,"explanation":"올바름: 'become aware of the constraints embedded in'은 'recognised the limitations of'의 의미를 정확히 반영하며, 'time-honoured thesis-driven graduate studies'는 원문의 traditional thesis-based doctoral programmes를 적절히 환언함","translation":"오래된 전통을 지닌 논문 중심 대학원 과정에 내재된 제약을 인식하게 된","enText":""},{"text":"celebrated the enduring strengths of well-established research-focused doctoral frameworks","isCorrect":true,"explanation":"잘못됨: 원문은 전통적 박사 과정의 '한계를 인식했다'는 비판적 시각인데, 'celebrated the enduring strengths'는 그 장점을 칭송한다는 의미로 원문의 비판적 입장을 긍정적으로 완전히 전도시킴","translation":"잘 확립된 연구 중심 박사 체계의 지속적인 강점을 높이 평가한","enText":""},{"text":"identified the shortcomings associated with long-established research-only doctorate structures","isCorrect":false,"explanation":"올바름: 'identified the shortcomings'는 'recognised the limitations'와 동의어 관계이며, 'long-established research-only doctorate structures'는 'traditional thesis-based doctoral programmes'를 적절히 환언함","translation":"오래 확립된 연구 전용 박사 구조와 관련된 단점을 파악한","enText":""}],"passage":"Some universities in Europe have recognised the limitations of traditional thesis-based doctoral programmes and have started to implement more structured approaches.","passageTranslation":"유럽의 일부 대학들은 전통적인 논문 기반 박사 과정의 한계를 인식하고, 보다 체계적인 접근 방식을 시행하기 시작했다."},{"questionNumber":35,"sourceQuestion":"5번 지문","keyExpression":"combine research with coursework and training in transferable skills","questionText":"'combine research with coursework and training in transferable skills'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"blend academic investigation with formal subject-based modules and instruction in skills applicable across various fields","isCorrect":false,"explanation":"올바름: 'blend academic investigation with'는 'combine research with'를 충실히 환언하며, 'skills applicable across various fields'는 'transferable skills'의 개념을 정확하게 풀어씀","translation":"학문적 탐구를 공식적인 교과 모듈 및 다양한 분야에 적용 가능한 기술 교육과 혼합하다","enText":""},{"text":"pair research activities with taught programme elements and preparation in skills that translate across professional settings","isCorrect":false,"explanation":"올바름: 'pair research activities with taught programme elements'는 'combine research with coursework'를 자연스럽게 대체하며, 'skills that translate across professional settings'는 'transferable skills'의 기능적 의미를 정확히 반영함","translation":"연구 활동을 교수 기반 프로그램 요소 및 다양한 직업 환경에 적용 가능한 기술 준비와 연계하다","enText":""},{"text":"integrate scholarly inquiry with structured academic courses and the cultivation of broadly applicable competencies","isCorrect":false,"explanation":"올바름: 'integrate scholarly inquiry with'는 'combine research with'를 정확히 반영하며, 'cultivation of broadly applicable competencies'는 'training in transferable skills'의 충실한 paraphrase임","translation":"학문적 탐구를 구조화된 교과 과정 및 폭넓게 적용 가능한 역량의 함양과 통합하다","enText":""},{"text":"merge investigative work with formal instruction and the development of versatile, cross-context abilities","isCorrect":false,"explanation":"올바름: 'merge investigative work with'는 'combine research with'를, 'development of versatile, cross-context abilities'는 'training in transferable skills'를 의미상 정확히 대체함","translation":"탐구 활동을 공식적인 수업 및 다양한 맥락에 적용 가능한 능력의 개발과 통합하다","enText":""},{"text":"replace traditional research requirements entirely with skills-based workshops and professional internships","isCorrect":true,"explanation":"잘못됨: 원문은 연구와 이수 과목 및 기술 훈련을 '결합'한다는 의미인데, 'replace traditional research requirements entirely'는 연구를 완전히 대체한다는 의미로 원문의 핵심인 병행·통합의 개념을 왜곡함","translation":"전통적인 연구 요건을 기술 중심의 워크숍과 전문 인턴십으로 완전히 대체하다","enText":""}],"passage":"These structured programmes often combine research with coursework and training in transferable skills.","passageTranslation":"이러한 구조화된 프로그램들은 흔히 연구를 이수 과목 및 이전 가능한 기술 훈련과 결합한다."},{"questionNumber":36,"sourceQuestion":"5번 지문","keyExpression":"incorporating coursework, seminars, workshops and internships into the curriculum","questionText":"'incorporating coursework, seminars, workshops and internships into the curriculum'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"excluding elective modules and external professional experiences from the standardised core curriculum","isCorrect":true,"explanation":"잘못됨: 원문은 다양한 교육 요소를 교육과정에 '포함시킨다'는 의미인데, 'excluding elective modules and external professional experiences'는 오히려 제외한다는 반대 방향의 의미를 나타내어 원문을 완전히 왜곡함","translation":"선택 모듈과 외부 직업 경험을 표준화된 핵심 교육과정에서 제외하는 것","enText":""},{"text":"folding required subject modules, peer-led discussions, skill-oriented training, and field-based experiences into the educational plan","isCorrect":false,"explanation":"올바름: 'folding into the educational plan'은 'incorporating into the curriculum'과 동일한 통합의 의미이며, 나열된 네 요소도 원문을 각각 자연스럽게 환언함","translation":"필수 교과 모듈, 동료 주도 토론, 기술 지향 훈련, 현장 기반 경험을 교육 계획 안에 편입시키는 것","enText":""},{"text":"integrating taught modules, discussion-based sessions, hands-on skill-building activities, and professional placements into the course framework","isCorrect":false,"explanation":"올바름: 원문의 네 가지 구성 요소를 'taught modules, discussion-based sessions, hands-on skill-building activities, professional placements'로 충실히 환언하며, 'course framework'는 'curriculum'의 자연스러운 대체어임","translation":"교수 기반 모듈, 토론 중심 세션, 실습 기술 개발 활동, 전문 현장 실습을 과정 틀 안에 통합하는 것","enText":""},{"text":"weaving subject-based instruction, guided seminars, experiential workshops, and job placements into the overall academic structure","isCorrect":false,"explanation":"올바름: 'weaving into the overall academic structure'는 'incorporating into the curriculum'의 의미를 자연스럽게 반영하며, 나열된 네 요소도 원문의 각 항목을 충실히 대체함","translation":"교과 기반 수업, 지도 세미나, 체험적 워크숍, 취업 배치를 전체 학문 구조에 녹여 넣는 것","enText":""},{"text":"embedding structured lessons, academic discussions, practical training sessions, and work placements within the programme of study","isCorrect":false,"explanation":"올바름: 각 구성 요소(structured lessons, academic discussions, practical training sessions, work placements)가 원문의 coursework, seminars, workshops, internships를 순서대로 정확히 환언하며, 'within the programme of study'는 'into the curriculum'을 적절히 대체함","translation":"구조화된 수업, 학문적 토론, 실습 훈련 세션, 현장 실습을 학업 프로그램 내에 포함시키는 것","enText":""}],"passage":"By incorporating coursework, seminars, workshops and internships into the curriculum, they aim to provide students with a broader skill set and better prepare them for a variety of career paths beyond academia.","passageTranslation":"이수 과목, 세미나, 워크숍, 인턴십을 교육과정에 통합함으로써, 이 프로그램들은 학생들에게 더 폭넓은 기술 역량을 제공하고 학계 밖의 다양한 진로에 더 잘 대비할 수 있도록 하는 것을 목표로 한다."},{"questionNumber":37,"sourceQuestion":"5번 지문","keyExpression":"provide students with a broader skill set and better prepare them for a variety of career paths beyond academia","questionText":"'provide students with a broader skill set and better prepare them for a variety of career paths beyond academia'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"offer students an enriched repertoire of transferable skills and more effectively ready them to enter a range of fields outside higher education","isCorrect":false,"explanation":"올바름: 'enriched repertoire of transferable skills'는 'broader skill set'을, 'more effectively ready them to enter a range of fields outside higher education'은 'better prepare them for a variety of career paths beyond academia'를 충실하고 자연스럽게 환언함","translation":"학생들에게 이전 가능한 기술의 풍부한 레퍼토리를 제공하고, 고등 교육 밖의 다양한 분야에 진입할 수 있도록 더 효과적으로 준비시키다","enText":""},{"text":"furnish students with a wider array of abilities while improving their prospects for multiple non-academic professional trajectories","isCorrect":false,"explanation":"올바름: 'furnish students with a wider array of abilities'는 'provide students with a broader skill set'을, 'improving their prospects for multiple non-academic professional trajectories'는 'better prepare them for a variety of career paths beyond academia'를 충실히 반영함","translation":"학생들에게 더 넓은 범위의 능력을 부여하면서 다양한 비학술적 직업 경로에 대한 전망을 향상시키다","enText":""},{"text":"arm students with a more comprehensive set of skills and strengthen their ability to pursue varied employment pathways in non-academic sectors","isCorrect":false,"explanation":"올바름: 'arm students with a more comprehensive set of skills'는 'provide students with a broader skill set'을, 'strengthen their ability to pursue varied employment pathways in non-academic sectors'는 'better prepare them for a variety of career paths beyond academia'를 자연스럽게 대체함","translation":"학생들에게 보다 포괄적인 기술 세트를 갖추게 하고, 비학술 부문의 다양한 취업 경로를 추구하는 능력을 강화하다","enText":""},{"text":"equip learners with a more extensive range of competencies and enhance their readiness for diverse professional opportunities outside the academic world","isCorrect":false,"explanation":"올바름: 'equip learners with a more extensive range of competencies'는 'provide students with a broader skill set'을, 'enhance their readiness for diverse professional opportunities outside the academic world'는 'better prepare them for a variety of career paths beyond academia'를 정확히 환언함","translation":"학습자들에게 더 광범위한 역량을 갖추게 하고, 학계 밖의 다양한 직업적 기회에 대한 준비도를 높이다","enText":""},{"text":"narrow students' training to academic specialisation in order to maximise their prospects within university-based research careers","isCorrect":true,"explanation":"잘못됨: 원문은 '폭넓은 기술 세트'를 제공하고 '학계 밖' 진로를 준비시킨다는 의미인데, 'narrow students' training to academic specialisation'과 'within university-based research careers'는 반대로 학내 전문화에 집중한다는 의미로 원문의 핵심 방향을 완전히 왜곡함","translation":"대학 기반 연구 진로 내에서의 전망을 극대화하기 위해 학생들의 훈련을 학문적 전문화로 좁히다","enText":""}],"passage":"By incorporating coursework, seminars, workshops and internships into the curriculum, they aim to provide students with a broader skill set and better prepare them for a variety of career paths beyond academia.","passageTranslation":"이수 과목, 세미나, 워크숍, 인턴십을 교육과정에 통합함으로써, 이 프로그램들은 학생들에게 더 폭넓은 기술 역량을 제공하고 학계 밖의 다양한 진로에 더 잘 대비할 수 있도록 하는 것을 목표로 한다."},{"questionNumber":38,"sourceQuestion":"6번 지문","keyExpression":"degraded and dismissed by prevalent philosophical theory","questionText":"'degraded and dismissed by prevalent philosophical theory'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"refined and reinterpreted through widely accepted philosophical frameworks","isCorrect":true,"explanation":"잘못됨: 'degraded and dismissed'는 부정적 평가(격하·일축)인데, 'refined and reinterpreted(정제되고 재해석된)'는 긍정적 재검토를 의미하므로 의미가 정반대임","translation":"널리 받아들여진 철학적 틀을 통해 정제되고 재해석된","enText":""},{"text":"looked down upon and rejected by dominant schools of philosophical thought","isCorrect":false,"explanation":"올바름: 'degraded→looked down upon', 'dismissed→rejected', 'prevalent→dominant'로 정확히 대응됨","translation":"지배적인 철학 사조에 의해 격하되고 거부된","enText":""},{"text":"devalued and set aside by mainstream philosophical perspectives","isCorrect":false,"explanation":"올바름: 'degraded→devalued', 'dismissed→set aside', 'prevalent→mainstream'으로 적절히 paraphrasing됨","translation":"주류 철학적 관점에 의해 평가절하되고 무시된","enText":""},{"text":"undervalued and overlooked within the prevailing traditions of philosophy","isCorrect":false,"explanation":"올바름: 'degraded→undervalued', 'dismissed→overlooked', 'prevalent→prevailing'으로 의미가 잘 보존됨","translation":"철학의 지배적인 전통 안에서 과소평가되고 간과된","enText":""},{"text":"treated as inferior and disregarded by the philosophical ideas that held sway","isCorrect":false,"explanation":"올바름: 'degraded→treated as inferior', 'dismissed→disregarded', 'prevalent→that held sway'로 정확하게 의미를 전달함","translation":"우세했던 철학적 사상에 의해 열등한 것으로 취급되고 무시된","enText":""}],"passage":"the possibility of aesthetic gratification in ordinary objects and events has long been recognized, even if degraded and dismissed by prevalent philosophical theory.","passageTranslation":"일상적인 사물과 사건에서 미적 만족을 얻을 수 있다는 가능성은 오래전부터 인정되어 왔으나, 지배적인 철학 이론에 의해 격하되고 일축되어 왔다."},{"questionNumber":39,"sourceQuestion":"6번 지문","keyExpression":"argued against the separation of art from life","questionText":"'argued against the separation of art from life'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"advocated for a clear boundary between aesthetic experience and the routines of daily life","isCorrect":true,"explanation":"잘못됨: 'argued against the separation'은 분리에 반대한다는 뜻인데, 'advocated for a clear boundary(명확한 경계를 옹호했다)'는 정반대로 분리를 지지하는 의미임","translation":"미적 경험과 일상생활의 일과 사이에 명확한 경계를 옹호했다","enText":""},{"text":"made the case that keeping art isolated from ordinary human experience was misguided","isCorrect":false,"explanation":"올바름: 'argued against the separation→keeping art isolated was misguided'로 반대 입장을 명확히 표현함","translation":"예술을 일상적 인간 경험으로부터 고립시키는 것은 잘못된 일이라고 주장했다","enText":""},{"text":"challenged the view that art and life should be treated as distinct domains","isCorrect":false,"explanation":"올바름: 'argued against→challenged', 'separation→treated as distinct domains'로 핵심 반대 논지를 정확히 반영함","translation":"예술과 삶이 별개의 영역으로 다루어져야 한다는 견해에 이의를 제기했다","enText":""},{"text":"contended that art and everyday life are fundamentally interconnected rather than opposed","isCorrect":false,"explanation":"올바름: 분리에 반대했다는 것은 곧 연결되어 있다는 주장이므로, 'interconnected rather than opposed'로 올바르게 paraphrasing됨","translation":"예술과 일상적 삶은 대립하는 것이 아니라 근본적으로 상호 연결되어 있다고 주장했다","enText":""},{"text":"opposed the notion that artistic value exists apart from the conditions of human life","isCorrect":false,"explanation":"올바름: 예술과 삶의 분리에 반대했다는 내용을 'artistic value exists apart from conditions of human life'에 반대한 것으로 적절히 재표현함","translation":"예술적 가치가 인간 삶의 조건과 무관하게 존재한다는 개념에 반대했다","enText":""}],"passage":"In that book Dewey argued against the separation of art from life by basing aesthetic experience on the biological and cultural conditions of human life.","passageTranslation":"그 책에서 듀이는 미적 경험을 인간 삶의 생물학적·문화적 조건에 근거시킴으로써 예술과 삶의 분리에 반대했다."},{"questionNumber":40,"sourceQuestion":"6번 지문","keyExpression":"basing aesthetic experience on the biological and cultural conditions of human life","questionText":"'basing aesthetic experience on the biological and cultural conditions of human life'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"anchoring the concept of aesthetic experience in the innate and culturally shaped aspects of human life","isCorrect":false,"explanation":"올바름: 'basing→anchoring', 'biological→innate', 'cultural conditions→culturally shaped aspects'로 의미가 충실히 전달됨","translation":"미적 경험의 개념을 인간 삶의 선천적이고 문화적으로 형성된 측면에 정박시키는 것","enText":""},{"text":"deriving the foundation of aesthetic experience from purely individual psychological responses","isCorrect":true,"explanation":"잘못됨: 원문은 생물학적·문화적 조건이라는 공유된 인간 조건에 근거를 두는데, 'purely individual psychological responses(순전히 개인적인 심리적 반응)'는 원문의 집단적·생물문화적 토대를 개인주의적 심리로 왜곡함","translation":"미적 경험의 토대를 순전히 개인적인 심리적 반응으로부터 도출하는 것","enText":""},{"text":"grounding the appreciation of beauty in the natural and social circumstances that shape human existence","isCorrect":false,"explanation":"올바름: 'basing→grounding', 'biological and cultural conditions→natural and social circumstances', 'human life→human existence'로 정확히 대응됨","translation":"아름다움의 인식을 인간 존재를 형성하는 자연적·사회적 환경에 근거시키는 것","enText":""},{"text":"treating aesthetic experience as rooted in both the physical makeup and cultural context of human beings","isCorrect":false,"explanation":"올바름: 'biological→physical makeup', 'cultural conditions→cultural context'로 적절한 paraphrasing이며 핵심 의미를 보존함","translation":"미적 경험을 인간의 신체적 구성과 문화적 맥락 모두에 뿌리를 둔 것으로 보는 것","enText":""},{"text":"founding aesthetic appreciation on the shared biological and sociocultural realities of human existence","isCorrect":false,"explanation":"올바름: 'basing→founding', 'biological→biological', 'cultural→sociocultural', 'conditions→realities'로 정확하게 paraphrasing됨","translation":"미적 감상을 인간 존재의 공유된 생물학적·사회문화적 현실에 근거시키는 것","enText":""}],"passage":"In that book Dewey argued against the separation of art from life by basing aesthetic experience on the biological and cultural conditions of human life.","passageTranslation":"그 책에서 듀이는 미적 경험을 인간 삶의 생물학적·문화적 조건에 근거시킴으로써 예술과 삶의 분리에 반대했다."},{"questionNumber":41,"sourceQuestion":"6번 지문","keyExpression":"not in an internalized awareness of sensation and feeling","questionText":"'not in an internalized awareness of sensation and feeling'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"not situated in an absorbed, inner apprehension of sensory experience and emotional response","isCorrect":false,"explanation":"올바름: 'internalized→absorbed, inner', 'awareness→apprehension', 'sensation→sensory experience', 'feeling→emotional response'로 의미가 충실히 반영됨","translation":"감각적 경험과 정서적 반응에 대한 몰입된 내면적 파악 속에 있지 않은","enText":""},{"text":"not in a self-contained, inward consciousness of one's physical and emotional reactions","isCorrect":false,"explanation":"올바름: 'internalized→self-contained, inward', 'awareness→consciousness', 'sensation and feeling→physical and emotional reactions'으로 적절히 대응됨","translation":"자신의 신체적·정서적 반응에 대한 자기완결적이고 내면적인 의식 속에 있지 않은","enText":""},{"text":"not located in an outwardly directed engagement with sensory and affective impressions","isCorrect":true,"explanation":"잘못됨: 'internalized'는 내면화된·내향적 인식을 뜻하는데, 'outwardly directed(외부를 향한)'으로 바꾸면 내향↔외향의 방향성이 정반대로 뒤집혀 의미가 왜곡됨","translation":"감각적·정서적 인상에 대한 외부를 향한 참여 속에 있지 않은","enText":""},{"text":"not found in a purely inner, private recognition of what one senses and feels","isCorrect":false,"explanation":"올바름: 'internalized→purely inner, private', 'awareness→recognition', 'sensation and feeling→what one senses and feels'로 내면적 인식임을 정확히 표현함","translation":"자신이 느끼고 감각하는 것에 대한 순전히 내면적이고 사적인 인식 속에 있지 않은","enText":""},{"text":"not residing in the subjective, introspective perception of bodily and emotional states","isCorrect":false,"explanation":"올바름: 'internalized→introspective', 'awareness→perception', 'sensation→bodily states', 'feeling→emotional states'로 의미가 잘 보존됨","translation":"신체적·정서적 상태에 대한 주관적이고 내성적인 인식 속에 있지 않은","enText":""}],"passage":"He located the aesthetic, not in an internalized awareness of sensation and feeling but in 'a complete interpenetration of self and the world of objects and events.'","passageTranslation":"그는 미적인 것을 감각과 감정의 내면화된 인식이 아니라 '자아와 사물 및 사건의 세계 사이의 완전한 상호침투' 속에 위치시켰다."},{"questionNumber":42,"sourceQuestion":"6번 지문","keyExpression":"a complete interpenetration of self and the world of objects and events","questionText":"'a complete interpenetration of self and the world of objects and events'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"a thorough merging of one's inner self with the surrounding realm of things and occurrences","isCorrect":false,"explanation":"올바름: 'complete→thorough', 'interpenetration→merging', 'self→inner self', 'objects and events→things and occurrences'로 핵심 의미가 잘 보존됨","translation":"내면의 자아와 사물 및 사건의 주변 영역이 철저하게 융합되는 것","enText":""},{"text":"a full mutual permeation between the experiencing subject and the objective world","isCorrect":false,"explanation":"올바름: 'complete→full', 'interpenetration→mutual permeation', 'self→experiencing subject', 'world of objects and events→objective world'로 상호침투의 의미가 정확히 전달됨","translation":"경험하는 주체와 객관적 세계 사이의 완전한 상호 침투","enText":""},{"text":"a clear demarcation maintained between the conscious self and the material world it perceives","isCorrect":true,"explanation":"잘못됨: 'interpenetration(상호침투)'은 자아와 세계가 서로 완전히 스며드는 것인데, 'demarcation maintained(경계의 유지)'는 분리를 강조하므로 의미가 정반대임","translation":"의식하는 자아와 그것이 인식하는 물질세계 사이에 유지되는 명확한 경계","enText":""},{"text":"an all-encompassing fusion in which personal identity and the world of experience become inseparable","isCorrect":false,"explanation":"올바름: 'complete→all-encompassing', 'interpenetration→fusion', 'self→personal identity', 'objects and events→world of experience'로 상호침투의 완전성을 올바르게 표현함","translation":"개인적 정체성과 경험의 세계가 분리 불가능해지는 모든 것을 아우르는 융합","enText":""},{"text":"a total integration between the individual and the external environment of things and happenings","isCorrect":false,"explanation":"올바름: 'complete→total', 'interpenetration→integration', 'world of objects and events→external environment of things and happenings'로 적절히 대응됨","translation":"개인과 사물 및 사건의 외부 환경 사이의 완전한 통합","enText":""}],"passage":"He located the aesthetic, not in an internalized awareness of sensation and feeling but in 'a complete interpenetration of self and the world of objects and events.'","passageTranslation":"그는 미적인 것을 감각과 감정의 내면화된 인식이 아니라 '자아와 사물 및 사건의 세계 사이의 완전한 상호침투' 속에 위치시켰다."},{"questionNumber":43,"sourceQuestion":"6번 지문","keyExpression":"the clarified and intensified development of traits that belong to every normally complete experience","questionText":"'the clarified and intensified development of traits that belong to every normally complete experience'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the sharpened and amplified unfolding of characteristics found in any typical, well-rounded experience","isCorrect":false,"explanation":"올바름: 'clarified→sharpened', 'intensified→amplified', 'development→unfolding', 'normally complete→typical, well-rounded'로 적절히 paraphrasing됨","translation":"전형적이고 균형 잡힌 어떤 경험에서도 발견되는 특성들의 날카로워지고 증폭된 전개","enText":""},{"text":"the enriched and elevated expression of features that characterize every experience brought to full realization","isCorrect":false,"explanation":"올바름: 'clarified→enriched', 'intensified→elevated', 'development→expression', 'normally complete→brought to full realization'으로 의미가 잘 전달됨","translation":"완전히 실현된 모든 경험을 특징짓는 특질들의 풍부해지고 고양된 표현","enText":""},{"text":"the refined and heightened cultivation of qualities that are inherent in any ordinarily fulfilled experience","isCorrect":false,"explanation":"올바름: 'clarified→refined', 'intensified→heightened', 'development→cultivation', 'normally complete→ordinarily fulfilled'로 핵심 의미를 충실히 반영함","translation":"일반적으로 완성된 어떤 경험에도 내재된 특질들의 정제되고 고양된 계발","enText":""},{"text":"a more focused and intensely realized growth of the same properties that underlie any complete human experience","isCorrect":false,"explanation":"올바름: 'clarified→more focused', 'intensified→intensely realized', 'development→growth', 'traits→properties'로 일상 경험의 특질을 미학이 심화·명확화한다는 의미를 올바르게 전달함","translation":"완전한 인간 경험 어디에나 근간이 되는 동일한 특성들의 보다 집중되고 강렬하게 실현된 성장","enText":""},{"text":"the introduction of entirely new qualities that are absent from ordinary, everyday forms of experience","isCorrect":true,"explanation":"잘못됨: 원문은 일반적 완전한 경험에 '이미 속해 있는' 특질들이 명확해지고 강화된 것이라는 뜻인데, 'introduction of entirely new qualities that are absent(일상적 경험에 없는 완전히 새로운 특질의 도입)'는 이 특질들이 일상 경험에 원래 없다고 함으로써 핵심 의미를 왜곡함","translation":"평범하고 일상적인 경험의 형태에는 없는 완전히 새로운 특질들의 도입","enText":""}],"passage":"Dewey maintained that 'the aesthetic is the clarified and intensified development of traits that belong to every normally complete experience.'","passageTranslation":"듀이는 '미적인 것은 일반적으로 완전한 모든 경험에 속하는 특질들의 명확해지고 강화된 발전'이라고 주장했다."},{"questionNumber":44,"sourceQuestion":"6번 지문","keyExpression":"locate its contemporary intellectual origins in John Dewey's Art as Experience","questionText":"'locate its contemporary intellectual origins in John Dewey's Art as Experience'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"trace the modern theoretical roots of everyday aesthetics back to Dewey's foundational work","isCorrect":false,"explanation":"올바름: 'locate→trace back', 'contemporary intellectual origins→modern theoretical roots', 'Art as Experience→Dewey's foundational work'로 의미가 충실히 전달됨","translation":"일상 미학의 현대적 이론적 뿌리를 듀이의 근본적 저작으로 거슬러 올라가 추적하다","enText":""},{"text":"point to Dewey's text as the conceptual starting point for the present-day academic discussion of everyday aesthetics","isCorrect":false,"explanation":"올바름: 'locate→point to', 'intellectual origins→conceptual starting point', 'contemporary→present-day academic'으로 의미가 정확히 반영됨","translation":"듀이의 저작을 일상 미학에 관한 오늘날 학문적 논의의 개념적 출발점으로 지목하다","enText":""},{"text":"identify Dewey's Art as Experience as the primary intellectual source from which current thinking on everyday aesthetics derives","isCorrect":false,"explanation":"올바름: 'locate→identify', 'contemporary intellectual origins→primary intellectual source', 'from which current thinking derives'로 적절히 paraphrasing됨","translation":"듀이의 『경험으로서의 예술』을 일상 미학에 관한 현재의 사유가 비롯된 주된 지적 원천으로 확인하다","enText":""},{"text":"attribute the ultimate resolution of debates in everyday aesthetics to the influence of Dewey's practical philosophy","isCorrect":true,"explanation":"잘못됨: 원문은 현대 일상 미학의 '지적 기원(intellectual origins)'을 듀이에서 찾는다는 것인데, 'ultimate resolution of debates(논쟁의 최종 해결)'로 바꾸면 기원·출발점이 아닌 결론·해결이라는 전혀 다른 역할을 부여하게 됨","translation":"일상 미학 논쟁의 궁극적 해결을 듀이의 실천 철학의 영향으로 돌리다","enText":""},{"text":"regard Dewey's Art as Experience as the intellectual springboard from which modern everyday aesthetics emerged","isCorrect":false,"explanation":"올바름: 'locate→regard as', 'contemporary intellectual origins→intellectual springboard', 'from which modern everyday aesthetics emerged'로 기원으로서의 역할을 정확히 표현함","translation":"듀이의 『경험으로서의 예술』을 현대 일상 미학이 등장한 지적 도약대로 간주하다","enText":""}],"passage":"It may be most convenient, though, to locate its contemporary intellectual origins in John Dewey's Art as Experience.","passageTranslation":"그러나 그 현대적 지적 기원을 존 듀이의 『경험으로서의 예술』에서 찾는 것이 가장 편리할 것이다."}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
var CIRCLED=["①","②","③","④","⑤","⑥"];
function esc(s){if(s==null)return "";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML;}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub;}
function gi(si,pi){return si*SET_SIZE+pi;}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var len=sq.length;var done=0,correct=0;
    for(var i=0;i<len;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===len);
    var pct=done>0?Math.round(correct/len*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af;'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b;'>📝 "+done+"/"+len+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"+
           "<div><div style='font-weight:700;'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400;'>("+len+"문제)</span></div></div>"+
           "<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"+
    "<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"+
    "<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>총 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"+
    "</div>"+
    "<div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0);}
function showQ(pos){
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length)return;
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var optsHTML=q.options.map(function(o,i){
    var cls="";
    if(answered){
      if(i===answered.selected&&!answered.isCorrect)cls="wrong";
      if(o.isCorrect)cls=(answered.isCorrect&&i===answered.selected)?"correct":"reveal";
    }
    return "<button class='option-btn "+cls+"' onclick='answer("+pos+","+i+")' "+(answered?"disabled":"")+">"+
           "<span class='num'>"+(i+1)+"</span><span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidx=q.options.findIndex(function(o){return o.isCorrect;});
    var cLabel=cidx>=0?CIRCLED[cidx]:"?";
    feedbackHTML=
      "<div class='feedback "+(answered.isCorrect?"correct-fb":"wrong-fb")+"'>"+
      (answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)+
      "</div>"+
      "<div class='explain-box'><div class='ex-title'>해설</div>"+
      q.options.map(function(o,i){
        var tag=q.qmode==="ko"
          ?(o.isCorrect?"<span class='tag-w'>[오답 — 틀린 해석]</span>":"<span class='tag-o'>[올바른 해석]</span>")
          :(o.isCorrect?"<span class='tag-w'>[오답 — 잘못된 paraphrasing]</span>":"<span class='tag-o'>[올바른 paraphrasing]</span>");
        var sub=q.qmode==="ko"?(o.enText||o.explanation):(o.translation||o.explanation);
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag+
               "<br><span class='trans'>→ "+esc(sub)+"</span></div>";
      }).join("")+
      "</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection=
      "<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"+
      "<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"+
    "<div class='progress-bar'><div class='progress-fill' style='width:"+pct+"%'></div></div>"+
    (q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px;'>"+esc(q.sourceQuestion)+"</div>":"")+
    "<div class='key-box'>"+
    "<div class='expr'>“"+esc(q.keyExpression)+"”</div>"+
    (q.qmode==="ko"?"<div class='qtext'>위 표현의 <span class='hl'>의미(한글 해석)</span>로 잘못된 것은?</div>":"<div class='qtext'>위 표현을 <span class='hl'>잘못</span> paraphrasing 한 것은?</div>")+
    "</div>"+
    passageSection+
    "<div class='options'>"+optsHTML+"</div>"+
    feedbackHTML+
    "<div class='nav-bar'>"+
    "<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"+
    "<button class='nav-btn home' onclick='showIndex()'>목록</button>"+
    "<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>"+
    "</div>";
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기";}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기";}
}
function answer(pos,optIdx){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=!!(q.options[optIdx]&&q.options[optIdx].isCorrect);
  answers[gidx]={selected:optIdx,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"+
    "<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"통과!":"미달")+"</p>"+
    "<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"+
    "</div>"+
    "<div style='margin-top:16px'><button class='btn btn-primary btn-block' onclick='showIndex()'>목록으로</button></div>";
}
showIndex();
</script>
</body>
</html>
