delightful'을 적절히 반영함","translation":"우리에게 평범해 보이는 것을 취하여 예기치 않게 매력적인 특성을 부여하다","enText":""},{"text":"reshape our view of things typically dismissed as lacking appeal into something enjoyable","isCorrect":false,"explanation":"올바름: 'typically dismissed as lacking appeal'이 'dull and boring'을, 'enjoyable'이 'delightful'을 자연스럽게 paraphrase함","translation":"매력이 없다고 흔히 무시되는 것들에 대한 우리의 시각을 즐거운 것으로 재형성하다","enText":""},{"text":"convert what is perceived as tedious and mundane into something captivating","isCorrect":false,"explanation":"올바름: 'tedious and mundane'은 'dull and boring'의, 'captivating'은 'delightful'의 적절한 paraphrase","translation":"지루하고 평범하다고 인식되는 것을 매력적인 무언가로 변환시키다","enText":""},{"text":"transform elements commonly regarded as uninteresting into sources of genuine pleasure","isCorrect":false,"explanation":"올바름: 'commonly regarded as uninteresting'은 'we consider dull and boring'의, 'sources of genuine pleasure'는 'something delightful'의 정확한 paraphrase","translation":"일반적으로 흥미롭지 않다고 여겨지는 요소들을 진정한 즐거움의 원천으로 변환시키다","enText":""}],"passage":"He often uses iconic pop culture characters. His unique twists sometimes turn what we consider dull and boring into something delightful.","passageTranslation":"그는 종종 대중문화의 상징적인 캐릭터들을 활용한다. 그의 독특한 변형은 때때로 우리가 지루하고 따분하다고 여기는 것을 즐거운 무언가로 바꿔놓는다."},{"questionNumber":34,"sourceQuestion":"5번 지문","keyExpression":"After finding whatever is common in two unrelated things, he connects them smoothly in his digital drawing","questionText":"'After finding whatever is common in two unrelated things, he connects them smoothly in his digital drawing'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"having recognized a shared element between two distinct and unrelated things, he merges them gracefully within his artwork","isCorrect":false,"explanation":"올바름: 'shared element between two distinct and unrelated things'는 원문의 전반부를, 'merges them gracefully within his artwork'는 'connects them smoothly in his digital drawing'을 잘 paraphrase함","translation":"두 가지 별개의 관련 없는 대상 사이의 공유된 요소를 인식한 후, 그것들을 자신의 작품 안에서 우아하게 합친다","enText":""},{"text":"upon locating a common trait shared by two otherwise unrelated items, he weaves them together naturally in his digital work","isCorrect":false,"explanation":"올바름: 'common trait shared by two otherwise unrelated items'와 'weaves them together naturally in his digital work'이 원문 의미를 충실히 전달함","translation":"그 외에는 관련 없는 두 항목이 공유하는 공통 특성을 찾아낸 뒤, 그것들을 디지털 작업 안에서 자연스럽게 엮어낸다","enText":""},{"text":"by identifying a point of intersection between unconnected subjects, he integrates them fluidly in his illustrations","isCorrect":false,"explanation":"올바름: 'point of intersection'이 'whatever is common'을, 'integrates them fluidly'가 'connects them smoothly'를 정확히 paraphrase함","translation":"연결되지 않은 대상들 사이의 교차점을 파악함으로써 그것들을 삽화 안에 유연하게 통합한다","enText":""},{"text":"he deliberately emphasizes the contrasting differences between two unrelated objects before separating them into distinct categories","isCorrect":true,"explanation":"잘못됨: 원문은 두 대상에서 '공통점'을 찾아 '연결'하는 과정인데, 'emphasizes the contrasting differences'(대조적 차이를 강조)하고 'separating them into distinct categories'(별개의 범주로 분리)는 완전히 반대 의미","translation":"그는 관련 없는 두 대상 사이의 대조적 차이를 의도적으로 강조한 뒤 그것들을 별개의 범주로 분리한다","enText":""},{"text":"once he discovers shared qualities between two seemingly disparate objects, he seamlessly links them through his digital artwork","isCorrect":false,"explanation":"올바름: 'shared qualities between disparate objects'는 원문의 'common in two unrelated things'를, 'seamlessly links through digital artwork'는 'connects smoothly in his digital drawing'을 정확히 반영함","translation":"겉보기에 전혀 다른 두 대상 사이에서 공통된 특성을 발견한 뒤, 그것들을 디지털 아트워크를 통해 매끄럽게 연결한다","enText":""}],"passage":"After finding whatever is common in two unrelated things, he connects them smoothly in his digital drawing. His work combines his passion for traveling and drawing.","passageTranslation":"관련 없는 두 사물에서 공통점을 찾은 후, 그는 디지털 드로잉 안에서 그것들을 매끄럽게 연결한다. 그의 작품은 여행과 그림에 대한 그의 열정을 결합한다."},{"questionNumber":35,"sourceQuestion":"5번 지문","keyExpression":"transform the most historic buildings of the world into new objects that you would like to see again","questionText":"'transform the most historic buildings of the world into new objects that you would like to see again'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"restore and preserve the world's most historically significant buildings to their original condition for future generations","isCorrect":true,"explanation":"잘못됨: 'restore and preserve to their original condition'(원래 상태로 복원·보존)은 원문의 'transform into new objects'(새로운 대상으로 변환)와 정반대로, 원형 유지가 아닌 창의적 변환이 원문의 핵심임","translation":"미래 세대를 위해 세계에서 역사적으로 가장 중요한 건물들을 원래 상태로 복원하고 보존하다","enText":""},{"text":"reinvent globally recognized heritage sites as captivating subjects that inspire audiences to look at them anew","isCorrect":false,"explanation":"올바름: 'reinvent as captivating subjects'는 'transform into new objects'를, 'inspire audiences to look at them anew'는 'would like to see again'을 자연스럽게 paraphrase함","translation":"전 세계적으로 알려진 문화유산지를 관객들이 새로운 시각으로 바라보도록 영감을 주는 매력적인 소재로 재창조하다","enText":""},{"text":"reimagine the world's most historically significant structures as fresh entities that invite repeated viewing","isCorrect":false,"explanation":"올바름: 'reimagine as fresh entities'는 'transform into new objects'를, 'invite repeated viewing'은 'would like to see again'을 정확히 반영함","translation":"세계에서 역사적으로 가장 중요한 구조물들을 반복적인 감상을 유도하는 신선한 존재로 재상상하다","enText":""},{"text":"reinterpret the world's most celebrated ancient buildings as compelling new images that draw viewers back","isCorrect":false,"explanation":"올바름: 'reinterpret as compelling new images that draw viewers back'이 원문의 'transform into new objects that you would like to see again'의 의미를 충실히 전달함","translation":"세계에서 가장 유명한 고대 건물들을 관람객들을 다시 이끄는 설득력 있는 새로운 이미지로 재해석하다","enText":""},{"text":"convert renowned historical architecture into novel visual experiences worth revisiting","isCorrect":false,"explanation":"올바름: 'renowned historical architecture'는 'most historic buildings'를, 'novel visual experiences worth revisiting'은 'new objects that you would like to see again'을 잘 paraphrase함","translation":"저명한 역사적 건축물을 다시 볼 가치가 있는 새로운 시각적 경험으로 변환시키다","enText":""}],"passage":"Many of his digital illustrations transform the most historic buildings of the world into new objects that you would like to see again. For example, he added images of ice cream cones onto the scenic photo of St. Basil's Cathedral in Moscow.","passageTranslation":"그의 디지털 삽화 중 많은 것들이 세계에서 역사적으로 가장 유명한 건물들을 다시 보고 싶은 새로운 사물로 변환시킨다. 예를 들어, 그는 모스크바에 있는 성 바실리 대성당의 경치 좋은 사진 위에 아이스크림 콘 이미지를 추가했다."},{"questionNumber":36,"sourceQuestion":"1번 지문","keyExpression":"validly argue that humans are morally superior beings on the ground that","questionText":"'validly argue that humans are morally superior beings on the ground that'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"인간이 윤리적으로 다른 종보다 우위에 있다고 강제적으로 주장하다","isCorrect":true,"explanation":"잘못됨: 'validly'는 '타당하게/정당하게'라는 뜻인데 '강제적으로'로 교묘하게 바꿔 핵심 의미를 왜곡함","translation":"","enText":"validly argue that humans are morally superior beings on the ground that"},{"text":"인간이 도덕적 측면에서 더 높은 위치에 있다고 정당하게 주장하다","isCorrect":false,"explanation":"올바름: 'validly'(정당하게), 'morally superior'(도덕적으로 우월한)의 의미를 정확히 반영함","translation":"","enText":"validly argue that humans are morally superior beings on the ground that"},{"text":"인간이 더 큰 도덕적 가치를 지닌다는 설득력 있는 주장을 하다","isCorrect":false,"explanation":"올바름: 'validly'를 '설득력 있는'으로, 'morally superior'를 '더 큰 도덕적 가치'로 올바르게 표현함","translation":"","enText":"validly argue that humans are morally superior beings on the ground that"},{"text":"인간이 더 높은 도덕적 지위를 지닌다고 합리적으로 주장하다","isCorrect":false,"explanation":"올바름: 'superior beings'를 '더 높은 지위'로, 'validly'를 '합리적으로'로 적절히 풀어씀","translation":"","enText":"validly argue that humans are morally superior beings on the ground that"},{"text":"인간이 도덕적으로 우월한 존재라는 근거 있는 주장을 펼치다","isCorrect":false,"explanation":"올바름: 'validly'를 '근거 있는'으로, 전체 구조를 자연스럽게 풀어씀","translation":"","enText":"validly argue that humans are morally superior beings on the ground that"}],"passage":"One cannot validly argue that humans are morally superior beings on the ground that they possess, while others lack, the capacities of a moral agent.","passageTranslation":"인간이 도덕적 행위자로서의 능력을 지니고 있고 다른 존재들은 그렇지 않다는 근거로 인간이 도덕적으로 우월한 존재라고 타당하게 주장할 수는 없다."},{"questionNumber":37,"sourceQuestion":"1번 지문","keyExpression":"both entities must fall within the range of application of moral standards","questionText":"'both entities must fall within the range of application of moral standards'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"두 존재 모두가 도덕적 기준의 적용 범위에서 자유로워야 한다","isCorrect":true,"explanation":"잘못됨: 'fall within the range of application'은 '범위 안에 포함되다'인데, '범위에서 자유로워야 한다'로 바꿔 반대 의미처럼 보이지 않게 교묘하게 왜곡함","translation":"","enText":"both entities must fall within the range of application of moral standards"},{"text":"두 존재 모두가 도덕적 평가의 범위에 포함되는 것이 전제 조건이다","isCorrect":false,"explanation":"올바름: 'must fall within the range'를 '범위에 포함되는 것이 전제 조건'으로 올바르게 풀어씀","translation":"","enText":"both entities must fall within the range of application of moral standards"},{"text":"두 존재 중 어느 것도 도덕적 기준의 적용 영역 밖에 있어서는 안 된다","isCorrect":false,"explanation":"올바름: 'must fall within'을 부정 형태로 바꿔도 동일한 의미를 정확히 전달함","translation":"","enText":"both entities must fall within the range of application of moral standards"},{"text":"도덕적 기준이 비교되는 두 존재 모두에 적용 가능해야 한다","isCorrect":false,"explanation":"올바름: 'fall within the range of application'을 '적용 가능해야 한다'로 정확히 표현함","translation":"","enText":"both entities must fall within the range of application of moral standards"},{"text":"유효한 도덕적 비교를 위해 두 존재 모두가 동일한 도덕적 틀 안에 놓여야 한다","isCorrect":false,"explanation":"올바름: 'range of application of moral standards'를 '동일한 도덕적 틀'로 적절히 의역함","translation":"","enText":"both entities must fall within the range of application of moral standards"}],"passage":"Both entities, therefore, must fall within the range of application of moral standards. This would not be the case, however, if humans were being judged superior to animals and plants, since the latter are not moral agents.","passageTranslation":"따라서 두 존재 모두 도덕적 기준의 적용 범위 안에 포함되어야 한다. 그러나 후자는 도덕적 행위자가 아니기 때문에, 인간이 동물과 식물보다 우월하다고 판단되는 경우에는 이것이 해당되지 않을 것이다."},{"questionNumber":38,"sourceQuestion":"2번 지문","keyExpression":"we intuitively assume it reflects an increase in temperature","questionText":"'we intuitively assume it reflects an increase in temperature'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"의식적 추론 없이, 우리는 더 높은 온도가 이러한 변화를 설명한다고 가정한다","isCorrect":false,"explanation":"올바름: 'intuitively'를 '의식적 추론 없이'로 풀어쓰고, 전체 의미를 올바르게 전달함","translation":"","enText":"we intuitively assume it reflects an increase in temperature"},{"text":"우리는 그러한 현상이 온도 상승을 반영한다고 논리적으로 추론한다","isCorrect":true,"explanation":"잘못됨: 'intuitively'는 '직관적으로'라는 뜻인데 '논리적으로'로 바꿔, 의식적 추론 없이 직감적으로 가정한다는 핵심 의미를 왜곡함","translation":"","enText":"we intuitively assume it reflects an increase in temperature"},{"text":"기본적으로 우리는 온도의 상승이 이러한 물리적 전이를 유발한다고 가정한다","isCorrect":false,"explanation":"올바름: 'intuitively assume'을 '기본적으로 가정한다'로, 전체 흐름을 자연스럽게 표현함","translation":"","enText":"we intuitively assume it reflects an increase in temperature"},{"text":"우리는 그러한 현상의 근저에 온도 상승이 있다고 본능적으로 전제한다","isCorrect":false,"explanation":"올바름: 'intuitively'를 '본능적으로'로, 'reflects'를 '근저에 있다'로 올바르게 풀어씀","translation":"","enText":"we intuitively assume it reflects an increase in temperature"},{"text":"우리는 그러한 변화가 온도 상승을 동반한다고 자연스럽게 당연시한다","isCorrect":false,"explanation":"올바름: 'intuitively assume'을 '자연스럽게 당연시한다'로, 'reflects'를 '동반한다'로 적절히 표현함","translation":"","enText":"we intuitively assume it reflects an increase in temperature"}],"passage":"when we think of melting or boiling or the creation of plasma, we intuitively assume it reflects an increase in temperature.","passageTranslation":"우리가 녹음, 끓음, 또는 플라스마의 생성을 생각할 때, 우리는 그것이 온도의 상승을 반영한다고 직관적으로 가정한다."},{"questionNumber":39,"sourceQuestion":"2번 지문","keyExpression":"pressures increase rapidly with depth","questionText":"'pressures increase rapidly with depth'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"깊이가 증가함에 따라 압력 수준이 급격하게 높아진다","isCorrect":false,"explanation":"올바름: 'rapidly'를 '급격하게'로, 'with depth'를 '깊이가 증가함에 따라'로 적절히 표현함","translation":"","enText":"pressures increase rapidly with depth"},{"text":"더 깊이 들어갈수록 압력은 더욱 빠르게 상승한다","isCorrect":false,"explanation":"올바름: 'increase rapidly with depth'를 '깊이 들어갈수록 빠르게 상승한다'로 정확히 표현함","translation":"","enText":"pressures increase rapidly with depth"},{"text":"표면 아래로 더 이동할수록 압력은 가파른 속도로 증가한다","isCorrect":false,"explanation":"올바름: 'with depth'를 '표면 아래로 이동할수록'으로, 'rapidly'를 '가파른 속도로'로 자연스럽게 풀어씀","translation":"","enText":"pressures increase rapidly with depth"},{"text":"지구 내부로 더 깊이 내려갈수록 단위 면적당 가해지는 힘이 극적으로 증가한다","isCorrect":false,"explanation":"올바름: 'rapidly'를 '극적으로', 'pressures'를 '단위 면적당 가해지는 힘'으로 풀어쓴 올바른 해석임","translation":"","enText":"pressures increase rapidly with depth"},{"text":"깊이에 따라 압력이 균일하고 빠르게 증가한다","isCorrect":true,"explanation":"잘못됨: 'rapidly'는 단순히 속도가 빠르다는 의미이지 '균일하게'라는 뜻이 없는데, '균일하고'를 추가해 의미를 교묘하게 변형함","translation":"","enText":"pressures increase rapidly with depth"}],"passage":"Since pressure is controlled by the weight of overlying material, pressures increase rapidly with depth.","passageTranslation":"압력은 위에 놓인 물질의 무게에 의해 결정되기 때문에, 깊이에 따라 압력은 빠르게 증가한다."},{"questionNumber":40,"sourceQuestion":"3번 지문","keyExpression":"generate and eliminate many hypotheses","questionText":"'generate and eliminate many hypotheses'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"반복적 검증을 통해 광범위한 가설들을 고안한 다음 그중 우수한 것들을 폐기한다","isCorrect":true,"explanation":"잘못됨: 'eliminate'는 '타당하지 않은 것을 제거한다'는 뜻인데, '우수한 것들을 폐기한다'로 바꿔 제거 대상을 교묘하게 뒤집음","translation":"","enText":"generate and eliminate many hypotheses"},{"text":"여러 경쟁 이론들을 고안하고 경험적 뒷받침이 없는 것들을 솎아낸다","isCorrect":false,"explanation":"올바름: 'generate'를 '고안하다'로, 'eliminate'를 '솎아낸다'로 정확히 표현함","translation":"","enText":"generate and eliminate many hypotheses"},{"text":"다양한 가능한 설명들을 만들어 내는 동시에 지지될 수 없는 것들을 제거한다","isCorrect":false,"explanation":"올바름: 'generate'를 '만들어 내다'로, 'eliminate'를 '제거한다'로 적절히 표현함","translation":"","enText":"generate and eliminate many hypotheses"},{"text":"수많은 잠재적 설명들을 만들어 내고 검증 과정에서 살아남지 못한 것들을 추려낸다","isCorrect":false,"explanation":"올바름: 'generate'와 'eliminate'의 의미를 검증 맥락에 맞게 자연스럽게 풀어씀","translation":"","enText":"generate and eliminate many hypotheses"},{"text":"수많은 잠정적 아이디어를 공식화하고 유지되지 않는 것들을 체계적으로 버린다","isCorrect":false,"explanation":"올바름: 'generate'를 '공식화하다'로, 'eliminate'를 '체계적으로 버린다'로 올바르게 표현함","translation":"","enText":"generate and eliminate many hypotheses"}],"passage":"The researcher begins with self-experiments that, if all goes well, find large effects and / or generate and eliminate many hypotheses.","passageTranslation":"연구자는 자기 실험으로 시작하는데, 모든 것이 잘 진행된다면 그 실험은 큰 효과를 발견하고/또는 많은 가설을 생성하고 제거한다."},{"questionNumber":41,"sourceQuestion":"3번 지문","keyExpression":"using the optimized parameters","questionText":"'using the optimized parameters'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"이전 자기 실험을 통해 다듬어진 조건들을 적용하여","isCorrect":false,"explanation":"올바름: 'optimized parameters'를 '다듬어진 조건들'로 자연스럽게 의역함","translation":"","enText":"using the optimized parameters"},{"text":"이전 단계에서 이미 미세 조정된 절차적 변수들을 사용하여","isCorrect":false,"explanation":"올바름: 'optimized'를 '미세 조정된'으로, 'parameters'를 '절차적 변수들'로 적절히 표현함","translation":"","enText":"using the optimized parameters"},{"text":"자기 실험 단계에서 가장 효과적인 것으로 확인된 실험 조건들을 활용하여","isCorrect":false,"explanation":"올바름: 'optimized parameters'를 '가장 효과적인 것으로 확인된 실험 조건들'로 맥락에 맞게 표현함","translation":"","enText":"using the optimized parameters"},{"text":"사전에 가장 단순한 결과를 달성하도록 조정된 설정들로","isCorrect":true,"explanation":"잘못됨: 'optimized'는 '최선의/최적의 결과를 달성하도록'이라는 뜻인데 '가장 단순한 결과를 달성하도록'으로 바꿔 최적화의 목적을 교묘하게 왜곡함","translation":"","enText":"using the optimized parameters"},{"text":"사전에 최선의 결과를 달성하도록 조정된 설정들로","isCorrect":false,"explanation":"올바름: 'optimized'를 '최선의 결과를 달성하도록 조정된'으로 정확히 표현함","translation":"","enText":"using the optimized parameters"}],"passage":"Only then would the researcher begin conventional experiments, using the optimized parameters.","passageTranslation":"그때서야 비로소 연구자는 최적화된 변수들을 사용하여 전통적 실험을 시작할 것이다."},{"questionNumber":42,"sourceQuestion":"4번 지문","keyExpression":"Markets exist precisely to sort out what things are worth","questionText":"'Markets exist precisely to sort out what things are worth'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"시장의 바로 그 목적은 교환을 통해 재화의 가치를 결정하는 것이다","isCorrect":false,"explanation":"올바름: 'precisely'를 강조 표현으로 살리고 'sort out'을 '결정하다'로 올바르게 표현함","translation":"","enText":"Markets exist precisely to sort out what things are worth"},{"text":"시장은 어떤 것의 가격을 균등하게 분배하기 위해 정확히 존재한다","isCorrect":true,"explanation":"잘못됨: 'sort out what things are worth'는 '가치를 가려내다/결정하다'인데 '가격을 균등하게 분배하다'로 바꿔 'sort out'의 의미를 교묘하게 왜곡함","translation":"","enText":"Markets exist precisely to sort out what things are worth"},{"text":"무언가의 가치를 확립하는 것이 바로 시장이 수행하도록 설계된 기능이다","isCorrect":false,"explanation":"올바름: 'precisely'를 '바로'로, 'sort out what things are worth'를 '가치를 확립하는 기능'으로 적절히 표현함","translation":"","enText":"Markets exist precisely to sort out what things are worth"},{"text":"어떤 것이 받아야 할 가격을 결정하는 것이 시장이 수행하도록 의도된 특정한 역할이다","isCorrect":false,"explanation":"올바름: 'precisely'를 '특정한'으로, 'sort out what things are worth'를 '받아야 할 가격을 결정하다'로 정확히 표현함","translation":"","enText":"Markets exist precisely to sort out what things are worth"},{"text":"어떤 물건의 진정한 가치를 가려내는 데 적합한 것은 바로 시장이다","isCorrect":false,"explanation":"올바름: 'sort out'을 '가려내다'로, 전체 의미를 자연스럽게 풀어씀","translation":"","enText":"Markets exist precisely to sort out what things are worth"}],"passage":"There is also a straightforward libertarian argument here. If someone has the money and wants to spend it on a painting, that is their business. Markets exist precisely to sort out what things are worth, and art is no exception.","passageTranslation":"여기에는 또한 간단명료한 자유주의적 논거도 있다. 누군가 돈이 있어서 그림에 쓰고 싶다면 그것은 그 사람의 일이다. 시장은 정확히 사물의 가치를 가려내기 위해 존재하며, 예술도 예외가 아니다."},{"questionNumber":43,"sourceQuestion":"4번 지문","keyExpression":"access matters more than ownership — at least when the stakes are this high","questionText":"'access matters more than ownership — at least when the stakes are this high'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"관련된 중요성을 감안할 때 대중이 작품을 볼 권리가 법적 소유권자의 권리보다 크다","isCorrect":false,"explanation":"올바름: 'access'를 '볼 권리'로, 'ownership'을 '법적 소유권'으로 적절히 표현함","translation":"","enText":"access matters more than ownership — at least when the stakes are this high"},{"text":"특정 작품의 탁월한 중요성을 감안할 때, 그것을 공적으로 경험할 수 있는 능력이 사적 소유의 독점성보다 소중히 여겨져야 한다","isCorrect":false,"explanation":"올바름: 'access'를 '공적으로 경험할 수 있는 능력'으로, 'ownership'을 '사적 소유의 독점성'으로 올바르게 표현함","translation":"","enText":"access matters more than ownership — at least when the stakes are this high"},{"text":"이해관계가 이토록 크다면, 접근 권리보다 소유 여부가 더 중요한 기준이 된다","isCorrect":true,"explanation":"잘못됨: 원문은 'access matters more than ownership'으로 접근성이 소유보다 중요하다는 뜻인데, '소유 여부가 접근 권리보다 중요하다'로 두 개념의 우선순위를 교묘하게 뒤바꿈","translation":"","enText":"access matters more than ownership — at least when the stakes are this high"},{"text":"그토록 많은 문화적 가치가 걸려 있을 때, 사람들이 작품을 볼 수 있는지가 누가 소유하는지보다 더 중요하다","isCorrect":false,"explanation":"올바름: 'access matters more than ownership'과 'stakes are this high'를 자연스럽게 풀어씀","translation":"","enText":"access matters more than ownership — at least when the stakes are this high"},{"text":"위대한 문화적 중요성의 경우에는 예술을 대중이 이용할 수 있게 유지하는 것이 개인의 재산권보다 우선시되어야 한다","isCorrect":false,"explanation":"올바름: 'access'를 '대중이 이용할 수 있는 것'으로, 'stakes are high'를 '문화적 중요성'으로 맥락에 맞게 표현함","translation":"","enText":"access matters more than ownership — at least when the stakes are this high"}],"passage":"For critics who think this way, access matters more than ownership — at least when the stakes are this high.","passageTranslation":"이런 방식으로 생각하는 비평가들에게는, 접근성이 소유권보다 더 중요하다. 적어도 이토록 중요한 것이 걸려 있을 때는."},{"questionNumber":44,"sourceQuestion":"5번 지문","keyExpression":"breathe life into well-known structures around the world","questionText":"'breathe life into well-known structures around the world'의 의미(한글 해석)로 적절하지 않은 것은?","qmode":"ko","options":[{"text":"널리 알려진 구조물들에 새로운 에너지와 신선한 매력을 부여하다","isCorrect":false,"explanation":"올바름: 'breathe life into'를 '새로운 에너지와 매력을 부여하다'로, 전체 표현을 올바르게 풀어씀","translation":"","enText":"breathe life into well-known structures around the world"},{"text":"여러 나라에 걸쳐 존재하는 유명한 기념물의 이미지를 새롭게 살리다","isCorrect":false,"explanation":"올바름: 'breathe life into'를 '새롭게 살리다'로, 'around the world'를 '여러 나라에 걸쳐'로 자연스럽게 표현함","translation":"","enText":"breathe life into well-known structures around the world"},{"text":"전 세계 사람들이 알고 있는 상징적인 건물들에 대한 인식을 완전히 지우다","isCorrect":true,"explanation":"잘못됨: 'breathe life into'는 '생기를 불어넣다'라는 뜻인데 '인식을 완전히 지우다'로 바꿔 새로운 활력을 부여한다는 핵심 의미를 교묘하게 왜곡함","translation":"","enText":"breathe life into well-known structures around the world"},{"text":"전 세계적으로 알려진 건축 명소에 활기를 불어넣다","isCorrect":false,"explanation":"올바름: 'breathe life into'를 '활기를 불어넣다'로, 'well-known structures'를 '건축 명소'로 적절히 표현함","translation":"","enText":"breathe life into well-known structures around the world"},{"text":"전 세계 유명 건축물들이 지닌 생동감을 다시 일깨우다","isCorrect":false,"explanation":"올바름: 'breathe life into'를 '생동감을 일깨우다'로, 'well-known structures around the world'를 '전 세계 유명 건축물'로 정확히 표현함","translation":"","enText":"breathe life into well-known structures around the world"}],"passage":"He draws illustrations on top of photos of landmarks or buildings and offers whole new ways to see them. To breathe life into well-known structures around the world, he often uses iconic pop culture characters.","passageTranslation":"그는 명소나 건물 사진 위에 삽화를 그려 그것들을 보는 완전히 새로운 방식을 제공한다. 전 세계의 잘 알려진 구조물에 생기를 불어넣기 위해 그는 종종 대중문화의 상징적인 캐릭터들을 활용한다."}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
var CIRCLED=["①","②","③","④","⑤","⑥"];
function esc(s){if(s==null)return "";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML;}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub;}
function gi(si,pi){return si*SET_SIZE+pi;}
function showIndex(){
  setH(CONFIG.title,"Paraphrasing 표현 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var len=sq.length;var done=0,correct=0;
    for(var i=0;i<len;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===len);
    var pct=done>0?Math.round(correct/len*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af;'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#f59e0b;'>📝 "+done+"/"+len+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"'onclick='enterSet("+si+")'>"+
           "<div><div style='font-weight:700;'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400;'>("+len+"문제)</span></div></div>"+
           "<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div style='font-size:2.5rem;margin-bottom:8px'>🔄</div>"+
    "<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>Paraphrasing 표현 테스트</h2>"+
    "<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>총 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과</p>"+
    "</div>"+
    "<div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0);}
function showQ(pos){
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length)return;
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  var optsHTML=q.options.map(function(o,i){
    var cls="";
    if(answered){
      if(i===answered.selected&&!answered.isCorrect)cls="wrong";
      if(o.isCorrect)cls=(answered.isCorrect&&i===answered.selected)?"correct":"reveal";
    }
    return "<button class='option-btn "+cls+"' onclick='answer("+pos+","+i+")' "+(answered?"disabled":"")+">"+
           "<span class='num'>"+(i+1)+"</span><span>"+esc(o.text)+"</span></button>";
  }).join("");
  var feedbackHTML="";
  if(answered){
    var cidx=q.options.findIndex(function(o){return o.isCorrect;});
    var cLabel=cidx>=0?CIRCLED[cidx]:"?";
    feedbackHTML=
      "<div class='feedback "+(answered.isCorrect?"correct-fb":"wrong-fb")+"'>"+
      (answered.isCorrect?"✅ 정답!":"❌ 오답 — 정답: "+cLabel)+
      "</div>"+
      "<div class='explain-box'><div class='ex-title'>해설</div>"+
      q.options.map(function(o,i){
        var tag=q.qmode==="ko"
          ?(o.isCorrect?"<span class='tag-w'>[오답 — 틀린 해석]</span>":"<span class='tag-o'>[올바른 해석]</span>")
          :(o.isCorrect?"<span class='tag-w'>[오답 — 잘못된 paraphrasing]</span>":"<span class='tag-o'>[올바른 paraphrasing]</span>");
        var sub=q.qmode==="ko"?(o.enText||o.explanation):(o.translation||o.explanation);
        return "<div class='ex-item'><strong>"+CIRCLED[i]+" "+esc(o.text)+"</strong> "+tag+
               "<br><span class='trans'>→ "+esc(sub)+"</span></div>";
      }).join("")+
      "</div>";
  }
  var passageSection="";
  if(q.passage){
    passageSection=
      "<button class='show-passage-btn' id='pbtn' onclick='togglePassage()'>📄 지문 보기</button>"+
      "<div class='passage-box' id='pbox' style='display:none'>"+esc(q.passage)+"</div>";
  }
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"+
    "<div class='progress-bar'><div class='progress-fill' style='width:"+pct+"%'></div></div>"+
    (q.sourceQuestion?"<div style='display:inline-block;background:#fef3c7;color:#b45309;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:10px;'>"+esc(q.sourceQuestion)+"</div>":"")+
    "<div class='key-box'>"+
    "<div class='expr'>“"+esc(q.keyExpression)+"”</div>"+
    (q.qmode==="ko"?"<div class='qtext'>위 표현의 <span class='hl'>의미(한글 해석)</span>로 잘못된 것은?</div>":"<div class='qtext'>위 표현을 <span class='hl'>잘못</span> paraphrasing 한 것은?</div>")+
    "</div>"+
    passageSection+
    "<div class='options'>"+optsHTML+"</div>"+
    feedbackHTML+
    "<div class='nav-bar'>"+
    "<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"+
    "<button class='nav-btn home' onclick='showIndex()'>목록</button>"+
    "<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>→ "+(pos<qs.length-1?"다음":"결과")+"</button>"+
    "</div>";
}
function togglePassage(){
  var b=document.getElementById("pbox");var btn=document.getElementById("pbtn");
  if(!b)return;
  if(b.style.display==="none"){b.style.display="block";if(btn)btn.textContent="📄 지문 숨기기";}
  else{b.style.display="none";if(btn)btn.textContent="📄 지문 보기";}
}
function answer(pos,optIdx){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=!!(q.options[optIdx]&&q.options[optIdx].isCorrect);
  answers[gidx]={selected:optIdx,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;}
  var pct=Math.round(correct/total*100);
  var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=
    "<div style='text-align:center;padding:16px 0'>"+
    "<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"+
    "<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+";'>"+(passed?"통과!":"미달")+"</p>"+
    "<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 기준 "+CONFIG.passThreshold+"%</p>"+
    "</div>"+
    "<div style='margin-top:16px'><button class='btn btn-primary btn-block' onclick='showIndex()'>목록으로</button></div>";
}
showIndex();
</script>
</body>
</html>
