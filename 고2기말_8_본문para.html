<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>고2기말_8_본문para</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%}
body{font-family:"Noto Sans KR",sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);min-height:100vh;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom));display:flex;align-items:flex-start;justify-content:center;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
.container{max-width:720px;width:100%;background:#f8fafc;border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.35);overflow:hidden}
.header{background:linear-gradient(150deg,#1e3a5f 0%,#2d5a87 50%,#1a4a6e 100%);padding:26px 24px 20px;color:#fff;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.header h1{font-size:1.3rem;font-weight:800;margin-bottom:4px;letter-spacing:-.02em}
.header p{opacity:.75;font-size:.82rem}
.content{padding:22px 20px}
@keyframes pop{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.set-list{display:grid;gap:12px;margin-top:8px}
.set-card{background:#fff;border:2px solid #e5e7eb;border-radius:18px;padding:18px 22px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 5px rgba(15,23,42,.07)}
.set-card:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-3px);box-shadow:0 6px 20px rgba(59,130,246,.18)}
.set-card.done{border-color:#34d399;background:linear-gradient(135deg,#ecfdf5,#d1fae5);box-shadow:0 2px 8px rgba(52,211,153,.15)}
.q-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 0}
.q-chip{width:46px;height:46px;border-radius:13px;border:2px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#374151;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.q-chip:hover{border-color:#3b82f6;background:#eff6ff;transform:translateY(-1px)}
.q-chip.correct{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46}
.q-chip.wrong{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337}
.progress-bar{height:8px;background:#e5e7eb;border-radius:4px;margin-bottom:16px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
.progress-fill{height:100%;background:linear-gradient(90deg,#2d5a87,#60a5fa);border-radius:4px;transition:width .4s}
.q-counter{text-align:center;font-size:.82rem;color:#6b7280;margin-bottom:8px;font-weight:500}
.key-box{text-align:center;margin:16px 0;padding:20px 18px;background:linear-gradient(135deg,#f0f7ff,#e8f0fe);border-radius:20px;border:2px solid #bfdbfe;box-shadow:0 3px 12px rgba(59,130,246,.1)}
.key-box .expr{font-size:1.45rem;font-weight:800;color:#1e3a5f;margin-bottom:8px;line-height:1.4;letter-spacing:-.02em}
.key-box .qtext{font-size:.95rem;color:#374151;font-weight:500}
.key-box .qtext .hl{color:#e11d48;font-weight:800}
.passage-box{margin:12px 0;padding:14px 18px;background:#fff;border-left:4px solid #3b82f6;border-radius:0 14px 14px 0;font-size:.88rem;color:#4b5563;line-height:1.75;font-style:italic;box-shadow:0 1px 4px rgba(59,130,246,.08)}
.show-passage-btn{margin:4px auto 10px;display:block;padding:7px 16px;background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe;border-radius:10px;font-size:.8rem;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.options{display:grid;gap:10px;margin-top:16px}
.option-btn{padding:15px 18px;background:#fff;border:2px solid #e8ecf1;border-radius:16px;font-size:1rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;color:#1f2937;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(15,23,42,.07)}
.option-btn .num{width:34px;height:34px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#6b7280;flex-shrink:0;transition:all .2s}
.option-btn:hover:not(:disabled){border-color:#3b82f6;background:#f0f7ff;box-shadow:0 3px 10px rgba(59,130,246,.12)}
.option-btn.correct{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;animation:pop .3s;box-shadow:0 2px 10px rgba(16,185,129,.18)}
.option-btn.correct .num{background:#10b981;color:#fff}
.option-btn.wrong{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;animation:shake .4s;box-shadow:0 2px 10px rgba(244,63,94,.15)}
.option-btn.wrong .num{background:#f43f5e;color:#fff}
.option-btn.reveal{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46}
.option-btn.reveal .num{background:#10b981;color:#fff}
.option-btn:disabled{cursor:default;opacity:.85}
.feedback{text-align:center;padding:14px 16px;border-radius:16px;margin-top:14px;font-weight:700;font-size:.95rem;line-height:1.5}
.feedback.correct-fb{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46;border:1.5px solid #6ee7b7;box-shadow:0 2px 8px rgba(16,185,129,.15)}
.feedback.wrong-fb{background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#881337;border:1.5px solid #fda4af;box-shadow:0 2px 8px rgba(244,63,94,.12)}
.explain-box{margin-top:12px;padding:14px 16px;background:#fff;border-radius:14px;border:1.5px solid #e8ecf1;box-shadow:0 1px 5px rgba(15,23,42,.06)}
.ex-title{font-size:.92rem;font-weight:700;color:#374151;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #f1f5f9}
.ex-item{padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:.9rem;line-height:1.75}
.ex-item:last-child{border-bottom:none}
.tag-w{color:#e11d48;font-weight:700;font-size:.8rem}
.tag-o{color:#059669;font-weight:600;font-size:.8rem}
.trans{color:#6b7280;font-size:.88rem}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1.5px solid #e8ecf1;gap:8px}
.nav-btn{padding:10px 18px;border:none;border-radius:12px;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.nav-btn:active{transform:scale(.97);opacity:.9}
.nav-btn:disabled{opacity:.3;cursor:default;transform:none}
.nav-btn.prev{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.nav-btn.next{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;box-shadow:0 2px 10px rgba(45,90,135,.28)}
.nav-btn.home,.nav-btn.back{background:#f1f5f9;color:#374151;border:1.5px solid #e2e8f0}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:18px auto;font-size:2rem;font-weight:800;border:6px solid;box-shadow:0 6px 20px rgba(0,0,0,.12)}
.score-circle.pass{border-color:#10b981;color:#059669;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.score-circle.fail{border-color:#f43f5e;color:#e11d48;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border:none;border-radius:14px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;box-shadow:0 3px 12px rgba(45,90,135,.3)}
.btn-block{width:100%}
.opt-list{margin:16px 0}
.opt-item{display:flex;align-items:flex-start;gap:12px;padding:15px 18px;border-radius:14px;border:2px solid #e8ecf1;margin-bottom:8px;font-size:1rem;line-height:1.65;color:#1f2937;background:#fff;box-shadow:0 1px 4px rgba(15,23,42,.06)}
.opt-item .onum{width:32px;height:32px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:#6b7280;flex-shrink:0}
.opt-item.correct{border-color:#f43f5e;background:linear-gradient(135deg,#fff1f2,#fecdd3)}
.opt-item.correct .onum{background:#f43f5e;color:#fff}
.opt-item.wrong{border-color:#10b981;background:linear-gradient(135deg,#ecfdf5,#d1fae5)}
.opt-item.wrong .onum{background:#10b981;color:#fff}
.answer-section{margin:16px 0;padding:20px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:16px;border:1.5px solid #6ee7b7;box-shadow:0 2px 8px rgba(16,185,129,.1)}
.ans-label{font-size:.85rem;font-weight:700;color:#065f46;margin-bottom:10px}
.ans-correct{font-size:1.1rem;font-weight:800;color:#dc2626;margin-bottom:12px}
.explain-item{padding:9px 0;border-bottom:1px solid #d1fae5;font-size:.92rem;line-height:1.75}
.explain-item:last-child{border-bottom:none}
.tag-wrong{color:#e11d48;font-weight:700;font-size:.8rem}

var CONFIG={"title":"고2기말_8_본문para","passThreshold":90,"questions":[{"questionNumber":1,"sourceQuestion":"1번 지문","keyExpression":"validly argue that humans are morally superior beings on the ground that","questionText":"'validly argue that humans are morally superior beings on the ground that'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"justifiably assert that humans rank higher in moral terms for the reason that","isCorrect":false,"explanation":"올바름: 'validly'→'justifiably', 'argue'→'assert', 'morally superior'→'rank higher in moral terms', 'on the ground that'→'for the reason that'으로 의미 정확히 대응","translation":"인간이 도덕적 측면에서 더 높은 위치에 있다고 정당하게 주장하다","enText":""},{"text":"reasonably insist that humans are ethically above other species due to the fact that","isCorrect":false,"explanation":"올바름: 'validly'→'reasonably', 'morally superior'→'ethically above', 'on the ground that'→'due to the fact that'으로 적절히 대응함","translation":"인간이 윤리적으로 다른 종보다 우위에 있다고 합리적으로 주장하다","enText":""},{"text":"legitimately claim that human beings hold a higher moral standing because","isCorrect":false,"explanation":"올바름: 'validly'를 'legitimately'로, 'morally superior beings'를 'hold a higher moral standing'으로 정확히 paraphrasing함","translation":"인간이 더 높은 도덕적 지위를 지닌다고 정당하게 주장하다","enText":""},{"text":"make a defensible case that humans are of greater moral worth on the basis that","isCorrect":false,"explanation":"올바름: 'validly argue'→'make a defensible case', 'morally superior'→'of greater moral worth', 'on the ground that'→'on the basis that'으로 논리적 의미 보존","translation":"인간이 더 큰 도덕적 가치를 지닌다는 설득력 있는 주장을 하다","enText":""},{"text":"convincingly demonstrate that humans are morally advanced regardless of whether","isCorrect":true,"explanation":"잘못됨: 'on the ground that'은 '~라는 근거로'라는 인과·조건적 의미인데, 'regardless of whether'(~와 무관하게)로 대체하면 근거 제시의 논리 방향이 완전히 반전되어 의미가 왜곡됨","translation":"~와 무관하게 인간이 도덕적으로 앞서 있음을 설득력 있게 입증하다","enText":""}],"passage":"One cannot validly argue that humans are morally superior beings on the ground that they possess, while others lack, the capacities of a moral agent.","passageTranslation":"인간이 도덕적 행위자로서의 능력을 지니고 있고 다른 존재들은 그렇지 않다는 근거로 인간이 도덕적으로 우월한 존재라고 타당하게 주장할 수는 없다."},{"questionNumber":2,"sourceQuestion":"1번 지문","keyExpression":"only beings that have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad","questionText":"'only beings that have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the label of moral goodness or moral badness can sensibly apply only to those who are capable of acting as moral agents","isCorrect":false,"explanation":"올바름: 'meaningfully'→'sensibly', 'can be said to be'→'the label can apply to', 'have the capacities of a moral agent'→'capable of acting as moral agents'로 의미 보존","translation":"도덕적 선함 또는 도덕적 나쁨이라는 딱지는 도덕적 행위자로 행동할 능력이 있는 존재에게만 의미 있게 적용될 수 있다","enText":""},{"text":"moral goodness and badness are attributes that can be coherently ascribed only to beings endowed with the faculties of a moral agent","isCorrect":false,"explanation":"올바름: 'meaningfully'→'coherently', 'can be said to be'→'attributes that can be ascribed', 'capacities'→'faculties'로 B2 수준에서 적절히 paraphrasing됨","translation":"도덕적 선함과 나쁨은 도덕적 행위자의 능력을 부여받은 존재에게만 일관되게 귀속될 수 있는 속성이다","enText":""},{"text":"only entities possessing the abilities of a moral agent are properly subject to judgments of being morally virtuous or morally flawed","isCorrect":false,"explanation":"올바름: 'capacities'→'abilities', 'meaningfully be said to be'→'properly subject to judgments of being', 'morally good or bad'→'morally virtuous or morally flawed'로 정확히 대응","translation":"도덕적 행위자의 능력을 지닌 존재만이 도덕적으로 훌륭하거나 결함 있다는 평가의 대상이 될 수 있다","enText":""},{"text":"it is meaningful to evaluate a being as morally good or bad only if that being has the functional capacities of a moral agent","isCorrect":false,"explanation":"올바름: 'meaningfully be said to be'→'meaningful to evaluate', 조건절을 'only if'로 재구성하여 논리 구조를 충실히 보존함","translation":"어떤 존재를 도덕적으로 선하거나 나쁘다고 평가하는 것은 그 존재가 도덕적 행위자로서의 기능적 능력을 갖춘 경우에만 의미가 있다","enText":""},{"text":"beings with the capacities of a moral agent are more likely than others to be considered morally good rather than morally bad","isCorrect":true,"explanation":"잘못됨: 원문은 도덕적 평가 자체가 '적용 가능한가'의 문제(선·악 판단의 전제 조건)를 다루는데, 이 보기는 '도덕적으로 선할 가능성이 높다'는 확률적 비교로 왜곡하여 핵심 논지를 완전히 벗어남","translation":"도덕적 행위자의 능력을 지닌 존재가 그렇지 않은 존재보다 도덕적으로 선하다고 여겨질 가능성이 더 높다","enText":""}],"passage":"The reason is that, as far as moral standards are concerned, only beings that have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad.","passageTranslation":"그 이유는, 도덕적 기준과 관련하여, 도덕적 행위자로서의 능력을 지닌 존재만이 도덕적으로 선하거나 도덕적으로 나쁘다고 의미 있게 말해질 수 있기 때문이다."},{"questionNumber":3,"sourceQuestion":"1번 지문","keyExpression":"Judgments of moral superiority are based on the comparative merits or deficiencies of the entities being judged","questionText":"'Judgments of moral superiority are based on the comparative merits or deficiencies of the entities being judged'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the grounds for claiming moral superiority lie in the measured comparison of each entity's moral qualities and moral failings","isCorrect":false,"explanation":"올바름: 'judgments are based on'→'the grounds lie in', 'comparative merits or deficiencies'→'moral qualities and moral failings'로 의미를 정확히 포착함","translation":"도덕적 우월성을 주장하는 근거는 각 존재의 도덕적 자질과 도덕적 결함의 신중한 비교에 있다","enText":""},{"text":"assessing whether one entity is morally superior to another requires comparing the relative strengths and shortcomings of those entities","isCorrect":false,"explanation":"올바름: 'judgments of moral superiority'→'assessing whether one entity is morally superior', 'comparative merits or deficiencies'→'relative strengths and shortcomings'으로 정확히 대응","translation":"한 존재가 다른 존재보다 도덕적으로 우월한지를 평가하려면 그 존재들의 상대적 강점과 결점을 비교해야 한다","enText":""},{"text":"moral superiority can be judged simply by observing how frequently an entity performs morally good actions","isCorrect":true,"explanation":"잘못됨: 원문은 '비교적 우열(comparative merits or deficiencies)'에 근거한 상대적 판단을 말하는데, 이 보기는 단순 행동 빈도로 판단한다는 의미로 왜곡하여 '비교'의 핵심 개념과 '결함(deficiencies)' 요소를 완전히 누락함","translation":"도덕적 우월성은 어떤 존재가 도덕적으로 선한 행동을 얼마나 자주 수행하는지를 관찰하는 것만으로 판단될 수 있다","enText":""},{"text":"determining moral superiority hinges on a comparative evaluation of the advantages and limitations exhibited by the entities in question","isCorrect":false,"explanation":"올바름: 'based on'→'hinges on', 'comparative merits or deficiencies'→'advantages and limitations exhibited', 'entities being judged'→'entities in question'으로 적절히 paraphrasing됨","translation":"도덕적 우월성의 판단은 문제의 존재들이 보여주는 장점과 한계에 대한 비교 평가에 달려 있다","enText":""},{"text":"to declare one being morally superior, one must weigh the respective moral strengths and weaknesses of the entities under evaluation","isCorrect":false,"explanation":"올바름: 'judgments'→'to declare', 'based on'→'one must weigh', 'comparative merits or deficiencies'→'respective moral strengths and weaknesses'로 논리 관계를 충실히 보존","translation":"한 존재를 도덕적으로 우월하다고 선언하려면 평가 대상 존재들의 각각의 도덕적 강점과 약점을 비교 검토해야 한다","enText":""}],"passage":"Judgments of moral superiority are based on the comparative merits or deficiencies of the entities being judged, and these merits and deficiencies are all moral ones, that is, ones determined by moral standards.","passageTranslation":"도덕적 우월성에 대한 판단은 판단 대상인 존재들의 비교적 장점이나 결점에 근거하며, 이러한 장점과 결점은 모두 도덕적인 것, 즉 도덕적 기준에 의해 결정되는 것이다."},{"questionNumber":4,"sourceQuestion":"1번 지문","keyExpression":"when valid moral standards are applied to both entities, the first fulfills them to a greater degree than the second","questionText":"'when valid moral standards are applied to both entities, the first fulfills them to a greater degree than the second'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the first entity is considered morally superior because it independently developed its own valid moral standards unlike the second","isCorrect":true,"explanation":"잘못됨: 원문은 동일한 외부 기준을 '두 존재 모두에 적용'하여 충족 정도를 비교하는 것인데, 이 보기는 첫 번째 존재가 '독자적으로 기준을 개발했다'는 전혀 다른 내용으로 왜곡하여 '동일 기준 적용'과 '비교'의 핵심을 훼손함","translation":"첫 번째 존재는 두 번째와 달리 자체적인 유효한 도덕적 기준을 독립적으로 발전시켰기 때문에 도덕적으로 우월하다고 여겨진다","enText":""},{"text":"once proper moral standards are brought to bear on both entities, the first proves to conform to them more closely than the second does","isCorrect":false,"explanation":"올바름: 'applied'→'brought to bear on', 'fulfills to a greater degree'→'conform to them more closely'로 논리 관계와 비교의 의미를 정확히 보존함","translation":"적절한 도덕적 기준이 두 존재 모두에 적용되면, 첫 번째 존재가 두 번째보다 그 기준에 더 밀접하게 부합한다는 것이 입증된다","enText":""},{"text":"the first entity demonstrates superior adherence to accepted moral standards compared to the second when both are evaluated by those same standards","isCorrect":false,"explanation":"올바름: 'valid moral standards'→'accepted moral standards', 'fulfills to a greater degree'→'superior adherence', 'applied to both'→'when both are evaluated'로 의미를 충실히 반영함","translation":"두 존재가 동일한 기준으로 평가될 때 첫 번째 존재가 두 번째보다 인정된 도덕적 기준에 대한 더 뛰어난 준수를 보인다","enText":""},{"text":"if sound moral standards serve as the measure for both entities, the former satisfies those standards to a higher extent than the latter","isCorrect":false,"explanation":"올바름: 'valid'→'sound', 'applied to'→'serve as the measure for', 'fulfills to a greater degree'→'satisfies to a higher extent', 'first/second'→'former/latter'로 세련되게 paraphrasing됨","translation":"건전한 도덕적 기준이 두 존재 모두의 척도로 사용된다면, 전자가 후자보다 그 기준을 더 높은 정도로 충족한다","enText":""},{"text":"upon measuring both entities against legitimate moral criteria, the first one meets those criteria more fully than the second","isCorrect":false,"explanation":"올바름: 'valid moral standards'→'legitimate moral criteria', 'applied to'→'measuring against', 'fulfills to a greater degree'→'meets more fully'로 정확히 대응","translation":"두 존재를 정당한 도덕적 기준으로 측정했을 때, 첫 번째 존재가 두 번째보다 그 기준을 더 충분히 충족한다","enText":""}],"passage":"One entity is correctly judged morally superior to another if it is the case that, when valid moral standards are applied to both entities, the first fulfills them to a greater degree than the second.","passageTranslation":"한 존재가 다른 존재보다 도덕적으로 우월하다고 올바르게 판단되는 것은, 유효한 도덕적 기준이 두 존재 모두에 적용될 때 첫 번째 존재가 두 번째보다 그 기준을 더 높은 정도로 충족하는 경우이다."},{"questionNumber":5,"sourceQuestion":"1번 지문","keyExpression":"both entities must fall within the range of application of moral standards","questionText":"'both entities must fall within the range of application of moral standards'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"neither of the two entities can be exempt from the domain in which moral standards hold","isCorrect":false,"explanation":"올바름: 'must fall within the range of application'→'cannot be exempt from the domain', 부정 표현을 통한 역논리로 동일한 의미를 정확히 표현함","translation":"두 존재 중 어느 것도 도덕적 기준이 적용되는 영역에서 면제될 수 없다","enText":""},{"text":"moral standards must be applicable to both of the entities being compared","isCorrect":false,"explanation":"올바름: 'fall within the range of application of'→'be applicable to'로 간결하고 정확하게 paraphrasing하여 핵심 의미를 보존함","translation":"도덕적 기준이 비교되는 두 존재 모두에 적용 가능해야 한다","enText":""},{"text":"for a valid moral comparison, both entities need to be subject to the same moral framework","isCorrect":false,"explanation":"올바름: 'fall within the range of application'→'be subject to', 'moral standards'→'the same moral framework'으로 '동일한 기준 적용 가능성'의 의미를 충실히 반영함","translation":"유효한 도덕적 비교를 위해 두 존재 모두가 동일한 도덕적 틀에 적용되어야 한다","enText":""},{"text":"it is a prerequisite that both entities come under the scope of moral evaluation","isCorrect":false,"explanation":"올바름: 'must fall within the range of application'→'come under the scope of', 'moral standards'→'moral evaluation'으로 전제 조건의 의미를 정확히 보존함","translation":"두 존재 모두가 도덕적 평가의 범위에 포함되는 것이 전제 조건이다","enText":""},{"text":"both entities are expected to actively uphold and enforce the moral standards by which they are judged","isCorrect":true,"explanation":"잘못됨: 원문은 두 존재가 도덕적 기준의 '적용 범위 안에 들어와야 한다(피평가자 조건)'는 의미인데, 이 보기는 두 존재가 기준을 '적극적으로 지지하고 집행해야 한다'는 능동적 의무로 왜곡하여 수동적 적용 조건과 능동적 실행 의무를 혼동함","translation":"두 존재는 자신들이 판단받는 도덕적 기준을 적극적으로 지지하고 집행할 것이 기대된다","enText":""}],"passage":"Both entities, therefore, must fall within the range of application of moral standards. This would not be the case, however, if humans were being judged superior to animals and plants, since the latter are not moral agents.","passageTranslation":"따라서 두 존재 모두 도덕적 기준의 적용 범위 안에 포함되어야 한다. 그러나 후자는 도덕적 행위자가 아니기 때문에, 인간이 동물과 식물보다 우월하다고 판단되는 경우에는 이것이 해당되지 않을 것이다."},{"questionNumber":6,"sourceQuestion":"1번 지문","keyExpression":"the others in question must be moral agents themselves","questionText":"'the others in question must be moral agents themselves'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the entities used for comparison must themselves fall under the category of beings capable of moral agency","isCorrect":false,"explanation":"올바름: 'the others in question'→'entities used for comparison', 'moral agents'→'beings capable of moral agency', 'themselves'의 강조가 'themselves'로 그대로 유지되어 정확한 paraphrasing임","translation":"비교에 사용되는 존재들 자체도 도덕적 행위 능력이 있는 존재의 범주에 속해야 한다","enText":""},{"text":"the entities with which the comparison is being drawn must also possess the status of moral agents","isCorrect":false,"explanation":"올바름: 'the others in question'→'the entities with which the comparison is being drawn', 'must be moral agents themselves'→'must also possess the status of moral agents'로 정확히 대응","translation":"비교의 대상이 되는 존재들 역시 도덕적 행위자의 지위를 지녀야 한다","enText":""},{"text":"the moral agents being evaluated must independently establish their own standards of moral judgment","isCorrect":true,"explanation":"잘못됨: 원문은 '비교 대상(the others)'도 도덕적 행위자여야 한다는 자격 조건을 말하는데, 이 보기는 '도덕적 행위자들이 독자적으로 기준을 수립해야 한다'는 전혀 다른 요구사항으로 왜곡하여 '비교 대상의 자격'이라는 핵심 조건을 누락함","translation":"평가받는 도덕적 행위자들은 자신들의 도덕적 판단 기준을 독립적으로 확립해야 한다","enText":""},{"text":"the parties to whom one is being compared are required to be moral agents as well","isCorrect":false,"explanation":"올바름: 'the others in question'→'the parties to whom one is being compared', 'must'→'are required to be', 'themselves'→'as well'로 의미를 자연스럽게 보존함","translation":"비교의 상대방이 되는 당사자들 역시 도덕적 행위자이어야 한다","enText":""},{"text":"those being compared must equally qualify as moral agents in their own right","isCorrect":false,"explanation":"올바름: 'the others in question'→'those being compared', 'must be moral agents themselves'→'qualify as moral agents in their own right'로 'themselves'의 강조 의미를 'in their own right'로 잘 포착함","translation":"비교 대상이 되는 존재들 스스로도 도덕적 행위자로서의 자격을 갖추어야 한다","enText":""}],"passage":"Only moral agents can be judged to be morally better or worse than others, and the others in question must be moral agents themselves.","passageTranslation":"오직 도덕적 행위자만이 다른 존재보다 도덕적으로 더 낫거나 더 나쁘다고 판단될 수 있으며, 문제의 다른 존재들도 스스로 도덕적 행위자이어야 한다."},{"questionNumber":7,"sourceQuestion":"1번 지문","keyExpression":"humans were being judged superior to animals and plants, since the latter are not moral agents","questionText":"'humans were being judged superior to animals and plants, since the latter are not moral agents'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"a claim that humans rank above animals and plants is problematic given that animals and plants lack the standing of moral agents","isCorrect":false,"explanation":"올바름: 'judged superior to'→'rank above', 'since the latter are not moral agents'→'given that animals and plants lack the standing of moral agents'로 인과 관계와 핵심 의미를 정확히 보존함","translation":"인간이 동물과 식물보다 우위에 있다는 주장은 동물과 식물이 도덕적 행위자의 지위를 결여하고 있다는 점에서 문제가 있다","enText":""},{"text":"evaluating humans as being of higher moral standing than animals and plants is unjustifiable on the grounds that the latter fall outside the domain of moral agency","isCorrect":false,"explanation":"올바름: 'judged superior'→'evaluating as being of higher moral standing', 'not moral agents'→'fall outside the domain of moral agency'로 논거를 세련되게 paraphrasing함","translation":"인간을 동물과 식물보다 더 높은 도덕적 지위를 지닌다고 평가하는 것은 후자가 도덕적 행위 능력의 영역 밖에 있다는 근거에서 정당화될 수 없다","enText":""},{"text":"humans are correctly judged to be morally superior to animals and plants because animals and plants do not behave in accordance with moral standards","isCorrect":true,"explanation":"잘못됨: 원문은 동물·식물이 도덕적 행위자가 '아니기 때문에' 인간과의 비교 자체가 성립하지 않는다는 논거인데, 이 보기는 '인간이 도덕적으로 우월하다고 올바르게 판단된다'고 주장하여 원문의 결론을 정반대로 왜곡함. 또한 '도덕적 기준을 따르지 않기 때문'이라는 이유도 '도덕적 행위자가 아니기 때문'과는 다른 개념임","translation":"동물과 식물이 도덕적 기준에 따라 행동하지 않기 때문에 인간이 동물과 식물보다 도덕적으로 우월하다고 올바르게 판단된다","enText":""},{"text":"the proposition that humans are morally superior to animals and plants fails because those organisms cannot be classified as moral agents","isCorrect":false,"explanation":"올바름: 'judged superior'→'morally superior', 'since the latter are not moral agents'→'because those organisms cannot be classified as moral agents'로 이유절의 논리를 정확히 보존함","translation":"인간이 동물과 식물보다 도덕적으로 우월하다는 명제는 그 유기체들이 도덕적 행위자로 분류될 수 없기 때문에 성립하지 않는다","enText":""},{"text":"declaring humans to be above animals and plants in moral terms is flawed because the latter do not possess the capacities required of moral agents","isCorrect":false,"explanation":"올바름: 'judged superior'→'declaring to be above', 'not moral agents'→'do not possess the capacities required of moral agents'로 이유의 논리를 충실히 확장하여 paraphrasing함","translation":"도덕적 측면에서 인간이 동물과 식물보다 우위에 있다고 선언하는 것은 후자가 도덕적 행위자에게 요구되는 능력을 지니지 않기 때문에 결함이 있다","enText":""}],"passage":"This would not be the case, however, if humans were being judged superior to animals and plants, since the latter are not moral agents.","passageTranslation":"그러나 후자는 도덕적 행위자가 아니기 때문에, 인간이 동물과 식물보다 우월하다고 판단되는 경우에는 이것이 해당되지 않을 것이다."},{"questionNumber":8,"sourceQuestion":"2번 지문","keyExpression":"variations in temperature cause changes in the state of matter","questionText":"'variations in temperature cause changes in the state of matter'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"alterations in temperature bring about transitions between different states of matter","isCorrect":false,"explanation":"올바름: variations→alterations, cause→bring about, changes→transitions로 의미를 정확히 유지함","translation":"온도의 변화가 물질의 서로 다른 상태 간 전이를 일으킨다","enText":""},{"text":"shifting temperatures are responsible for transforming matter from one phase to another","isCorrect":false,"explanation":"올바름: cause→be responsible for, changes in state→transforming from one phase to another로 적절히 paraphrasing함","translation":"변화하는 온도가 물질을 한 상에서 다른 상으로 변환시키는 원인이 된다","enText":""},{"text":"temperature variation drives matter through its various physical states","isCorrect":false,"explanation":"올바름: cause changes→drives through로 인과 관계를 유지하며 물질의 상태 변화를 적절히 표현함","translation":"온도 변화가 물질을 다양한 물리적 상태로 이끈다","enText":""},{"text":"differences in temperature uniformly stabilize the molecular structure of matter","isCorrect":true,"explanation":"잘못됨: 원문은 온도 변화가 상태 변화를 '일으킨다'는 의미인데, 'stabilize(안정화하다)'는 정반대의 의미를 나타냄","translation":"온도의 차이가 물질의 분자 구조를 균일하게 안정시킨다","enText":""},{"text":"fluctuations in temperature trigger shifts in the physical form of substances","isCorrect":false,"explanation":"올바름: variations→fluctuations, cause→trigger, changes in state→shifts in physical form으로 적절히 환언함","translation":"온도의 변동이 물질의 물리적 형태 변화를 유발한다","enText":""}],"passage":"variations in temperature cause changes in the state of matter from solid to liquid to gas.","passageTranslation":"온도의 변화는 물질의 상태를 고체에서 액체로, 액체에서 기체로 변화시킨다."},{"questionNumber":9,"sourceQuestion":"2번 지문","keyExpression":"we intuitively assume it reflects an increase in temperature","questionText":"'we intuitively assume it reflects an increase in temperature'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"by default, we assume that an elevation in temperature is what drives these physical transitions","isCorrect":false,"explanation":"올바름: intuitively→by default, reflects→drives로 바꾸되 온도 상승이 원인이라는 핵심 의미를 유지함","translation":"기본적으로 우리는 온도의 상승이 이러한 물리적 전이를 유발한다고 가정한다","enText":""},{"text":"we tend to associate such changes with a deliberate and carefully measured drop in temperature","isCorrect":true,"explanation":"잘못됨: 원문은 '온도 상승(increase)'을 전제한다는 의미인데, 'drop in temperature(온도 하강)'로 방향을 반대로 바꾸었고, 'deliberate and carefully measured'는 'intuitively'와 상충됨","translation":"우리는 그러한 변화를 의도적이고 신중하게 측정된 온도 하강과 연관 짓는 경향이 있다","enText":""},{"text":"we instinctively presuppose that a rise in temperature underlies such phenomena","isCorrect":false,"explanation":"올바름: intuitively→instinctively, assume→presuppose, reflects→underlies로 적절히 환언함","translation":"우리는 그러한 현상의 근저에 온도 상승이 있다고 본능적으로 전제한다","enText":""},{"text":"we naturally take it for granted that such changes are accompanied by rising temperatures","isCorrect":false,"explanation":"올바름: intuitively→naturally, assume→take for granted, reflects→is accompanied by로 의미를 정확히 유지함","translation":"우리는 그러한 변화가 온도 상승을 동반한다고 자연스럽게 당연시한다","enText":""},{"text":"without conscious reasoning, we suppose that higher temperatures account for these changes","isCorrect":false,"explanation":"올바름: intuitively→without conscious reasoning, reflects→account for로 의미를 잘 전달함","translation":"의식적 추론 없이, 우리는 더 높은 온도가 이러한 변화를 설명한다고 가정한다","enText":""}],"passage":"when we think of melting or boiling or the creation of plasma, we intuitively assume it reflects an increase in temperature.","passageTranslation":"우리가 녹음, 끓음, 또는 플라스마의 생성을 생각할 때, 우리는 그것이 온도의 상승을 반영한다고 직관적으로 가정한다."},{"questionNumber":10,"sourceQuestion":"2번 지문","keyExpression":"This bias comes from the fact that we live in a very constant pressure environment","questionText":"'This bias comes from the fact that we live in a very constant pressure environment'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the source of this cognitive tendency lies in our being surrounded by a pressure-stable environment throughout our lives","isCorrect":false,"explanation":"올바름: bias→cognitive tendency, comes from→lies in, constant→pressure-stable로 바꾸면서 의미를 충실히 전달함","translation":"이 인지적 경향의 원천은 우리가 평생 압력이 안정적인 환경에 둘러싸여 있다는 데 있다","enText":""},{"text":"such a misconception originates in the fact that our everyday surroundings feature consistently stable pressure","isCorrect":false,"explanation":"올바름: bias→misconception, comes from→originates in, constant→consistently stable로 의미를 정확히 유지함","translation":"그러한 오해는 우리의 일상적 환경이 지속적으로 안정적인 압력을 특징으로 한다는 사실에서 비롯된다","enText":""},{"text":"our skewed perception stems from inhabiting an environment where pressure remains largely stable","isCorrect":false,"explanation":"올바름: bias→skewed perception, comes from→stems from, constant→remains largely stable로 적절히 환언함","translation":"우리의 편향된 인식은 압력이 대체로 안정적인 환경에 거주하는 것에서 비롯된다","enText":""},{"text":"this distorted view arises because we are accustomed to an environment of widely fluctuating pressure levels","isCorrect":true,"explanation":"잘못됨: 원문은 'constant(일정한)' 압력 환경에서 비롯된 편향이라는 의미인데, 'widely fluctuating(크게 변동하는)'은 정반대의 의미로 핵심을 왜곡함","translation":"이 왜곡된 견해는 우리가 압력 수준이 크게 변동하는 환경에 익숙하기 때문에 발생한다","enText":""},{"text":"this preconception is rooted in our experience of an environment with little variation in pressure","isCorrect":false,"explanation":"올바름: bias→preconception, comes from→is rooted in, constant pressure→little variation in pressure로 적절히 paraphrasing함","translation":"이 선입견은 압력의 변화가 거의 없는 환경에 대한 우리의 경험에 뿌리를 두고 있다","enText":""}],"passage":"This bias comes from the fact that we live in a very constant pressure environment.","passageTranslation":"이 편향은 우리가 매우 일정한 압력 환경에서 살고 있다는 사실에서 비롯된다."},{"questionNumber":11,"sourceQuestion":"2번 지문","keyExpression":"the pressure changes we experience are trivial compared to the pressure range of the overall planetary environment","questionText":"'the pressure changes we experience are trivial compared to the pressure range of the overall planetary environment'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the shifts in pressure that people actually feel are insignificant when set against the entire pressure scale of planetary systems","isCorrect":false,"explanation":"올바름: trivial→insignificant, compared to→when set against, overall planetary environment→entire pressure scale of planetary systems로 의미를 정확히 유지함","translation":"사람들이 실제로 느끼는 압력의 변화는 행성 시스템의 전체 압력 척도와 비교하면 미미하다","enText":""},{"text":"in contrast to the sweeping range of pressures a planet encompasses, the pressure changes humans experience are of little consequence","isCorrect":false,"explanation":"올바름: trivial→of little consequence, compared to→in contrast to로 바꾸되 원문의 대조적 의미 구조를 그대로 유지함","translation":"행성이 포괄하는 광범위한 압력 범위와 대조적으로, 인간이 경험하는 압력 변화는 거의 중요하지 않다","enText":""},{"text":"pressure differences that we perceive in our daily lives are minor relative to the vast pressure range existing throughout a planet","isCorrect":false,"explanation":"올바름: trivial→minor, compared to→relative to, overall planetary environment→throughout a planet로 적절히 paraphrasing함","translation":"우리가 일상생활에서 인식하는 압력 차이는 행성 전체에 존재하는 광대한 압력 범위에 비해 미미하다","enText":""},{"text":"the variations in pressure that humans encounter are negligible in relation to the full spectrum of pressures across a planet","isCorrect":false,"explanation":"올바름: trivial→negligible, compared to→in relation to, overall planetary environment→full spectrum across a planet로 적절히 환언함","translation":"인간이 접하는 압력의 변화는 행성 전체에 걸친 압력의 전체 범위에 비해 무시할 수 있는 수준이다","enText":""},{"text":"the pressure fluctuations we are exposed to rival the immense pressure diversity found across an entire planet","isCorrect":true,"explanation":"잘못됨: 원문은 우리가 경험하는 압력 변화가 행성 전체 범위에 비해 '하찮다(trivial)'는 의미인데, 'rival(~에 필적하다)'은 두 범위가 비슷하다는 뜻으로 핵심 의미를 정반대로 왜곡함","translation":"우리가 노출되는 압력 변동은 행성 전체에서 발견되는 거대한 압력 다양성에 필적한다","enText":""}],"passage":"the pressure changes we experience are trivial compared to the pressure range of the overall planetary environment.","passageTranslation":"우리가 경험하는 압력 변화는 전체 행성 환경의 압력 범위와 비교하면 사소한 것이다."},{"questionNumber":12,"sourceQuestion":"2번 지문","keyExpression":"pressure is controlled by the weight of overlying material","questionText":"'pressure is controlled by the weight of overlying material'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the gravitational load of the material sitting above a given point governs the pressure at that point","isCorrect":false,"explanation":"올바름: weight→gravitational load, controlled by→governs, overlying→sitting above로 바꾸면서 원문의 인과 구조를 유지함","translation":"특정 지점 위에 놓인 물질의 중력적 하중이 그 지점의 압력을 지배한다","enText":""},{"text":"pressure at any depth is regulated by the cumulative mass of the substance resting upon it","isCorrect":false,"explanation":"올바름: controlled→regulated, weight→cumulative mass, overlying material→substance resting upon it으로 의미를 정확히 유지함","translation":"어느 깊이에서든 압력은 그 위에 놓인 물질의 누적 질량에 의해 조절된다","enText":""},{"text":"pressure builds independently of the surrounding material, being driven instead by fluctuations in external temperature","isCorrect":true,"explanation":"잘못됨: 원문은 압력이 '위에 놓인 물질의 무게'에 의해 결정된다는 의미인데, 'independently of the surrounding material'과 'driven by temperature fluctuations'는 원문의 인과 관계를 완전히 부정하고 왜곡함","translation":"압력은 주변 물질과 무관하게 축적되며, 대신 외부 온도의 변동에 의해 구동된다","enText":""},{"text":"it is the mass of the material stacked above that dictates the level of pressure experienced below","isCorrect":false,"explanation":"올바름: weight→mass, controlled by→dictates, overlying→stacked above로 적절히 paraphrasing함","translation":"위에 쌓인 물질의 질량이 아래에서 경험되는 압력의 수준을 결정한다","enText":""},{"text":"the amount of pressure at any given point is determined by how much the layers above it weigh","isCorrect":false,"explanation":"올바름: controlled by→determined by, overlying material→layers above로 적절히 환언하여 의미를 충실히 전달함","translation":"특정 지점의 압력의 크기는 그 위의 층들이 얼마나 무거운지에 의해 결정된다","enText":""}],"passage":"Since pressure is controlled by the weight of overlying material, pressures increase rapidly with depth.","passageTranslation":"압력은 위에 놓인 물질의 무게에 의해 결정되기 때문에, 깊이에 따라 압력은 빠르게 증가한다."},{"questionNumber":13,"sourceQuestion":"2번 지문","keyExpression":"pressures increase rapidly with depth","questionText":"'pressures increase rapidly with depth'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"descending further into the earth is accompanied by a dramatic increase in the force exerted per unit area","isCorrect":false,"explanation":"올바름: with depth→descending further into the earth, pressure→force exerted per unit area로 압력의 물리적 정의를 활용해 적절히 paraphrasing함","translation":"지구 내부로 더 깊이 내려가는 것은 단위 면적당 가해지는 힘의 극적인 증가를 동반한다","enText":""},{"text":"the deeper one goes, the more swiftly pressure escalates","isCorrect":false,"explanation":"올바름: with depth→the deeper one goes, increase rapidly→swiftly escalates로 원문의 의미를 자연스럽게 전달함","translation":"더 깊이 들어갈수록 압력은 더욱 빠르게 상승한다","enText":""},{"text":"pressure tends to level off and remain relatively unchanged regardless of how far below the surface one descends","isCorrect":true,"explanation":"잘못됨: 원문은 깊이에 따라 압력이 '빠르게 증가한다'는 의미인데, 'level off and remain unchanged(평준화되어 변하지 않는다)'는 정반대의 의미를 나타냄","translation":"압력은 표면 아래로 얼마나 깊이 내려가든 관계없이 평준화되어 비교적 변하지 않는 경향이 있다","enText":""},{"text":"as depth increases, there is a sharp and accelerating rise in the level of pressure","isCorrect":false,"explanation":"올바름: with depth→as depth increases, increase rapidly→sharp and accelerating rise로 의미를 정확히 유지함","translation":"깊이가 증가함에 따라 압력 수준이 급격하고 가속적으로 상승한다","enText":""},{"text":"pressure mounts at a steep rate as one moves further below the surface","isCorrect":false,"explanation":"올바름: increase→mounts, rapidly→at a steep rate, with depth→as one moves further below the surface로 적절히 환언함","translation":"표면 아래로 더 이동할수록 압력은 가파른 속도로 증가한다","enText":""}],"passage":"Since pressure is controlled by the weight of overlying material, pressures increase rapidly with depth.","passageTranslation":"압력은 위에 놓인 물질의 무게에 의해 결정되기 때문에, 깊이에 따라 압력은 빠르게 증가한다."},{"questionNumber":14,"sourceQuestion":"2번 지문","keyExpression":"a planet's pressure ranges are enormous — from essentially zero pressure in space to pressures of millions of atmospheres in planetary interiors","questionText":"'a planet's pressure ranges are enormous — from essentially zero pressure in space to pressures of millions of atmospheres in planetary interiors'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"planetary pressure varies across an immense scale, with one extreme being virtually pressureless space and the other being the extraordinarily high pressures found at a planet's core","isCorrect":false,"explanation":"올바름: enormous→immense scale, essentially zero→virtually pressureless, millions of atmospheres→extraordinarily high pressures at the core로 적절히 환언함","translation":"행성의 압력은 엄청난 규모에 걸쳐 변하며, 한쪽 극단은 사실상 압력이 없는 우주이고 다른 쪽은 행성 핵에서 발견되는 극도로 높은 압력이다","enText":""},{"text":"the pressure distribution within a planet spans an extreme range, from the absence of pressure in space to pressures measured in the millions of atmospheric units in the deep interior","isCorrect":false,"explanation":"올바름: essentially zero→absence of pressure, millions of atmospheres→millions of atmospheric units로 정확히 환언하며 의미를 유지함","translation":"행성 내의 압력 분포는 극단적인 범위에 걸쳐 있으며, 우주의 압력 부재에서 깊은 내부의 수백만 대기압 단위로 측정되는 압력에 이른다","enText":""},{"text":"the pressure gradient of a planet covers a staggering range, beginning with the near-zero pressure of space and culminating in pressures millions of times greater than atmospheric pressure at the planet's interior","isCorrect":false,"explanation":"올바름: enormous→staggering range, essentially zero→near-zero, millions of atmospheres→millions of times greater than atmospheric pressure로 의미를 정확히 유지함","translation":"행성의 압력 기울기는 엄청난 범위를 아우르며, 우주의 거의 0에 가까운 압력에서 시작하여 행성 내부에서 대기압보다 수백만 배 더 높은 압력으로 끝난다","enText":""},{"text":"the span of pressures across a planet is vast, stretching from near-vacuum conditions in outer space to crushing forces deep within the planet","isCorrect":false,"explanation":"올바름: enormous→vast, essentially zero pressure in space→near-vacuum conditions in outer space, millions of atmospheres in interiors→crushing forces deep within으로 의미를 충실히 전달함","translation":"행성 전반에 걸친 압력의 범위는 광대하며, 외부 우주의 거의 진공 상태에서 행성 깊은 내부의 엄청난 힘에 이르기까지 뻗어 있다","enText":""},{"text":"throughout a planet, pressure levels show remarkable uniformity, converging toward a moderate midpoint between the vacuum of space and the deep interior","isCorrect":true,"explanation":"잘못됨: 원문은 압력 범위가 '거대하다(enormous)'는 의미로 양 극단을 강조하는데, 'remarkable uniformity(놀라운 균일성)'와 'converging toward a moderate midpoint(중간 지점으로 수렴)'는 원문의 핵심인 극단적 범위를 완전히 부정함","translation":"행성 전체에 걸쳐 압력 수준은 놀라운 균일성을 보이며, 우주의 진공과 깊은 내부 사이의 적당한 중간 지점으로 수렴한다","enText":""}],"passage":"For this reason a planet's pressure ranges are enormous — from essentially zero pressure in space to pressures of millions of atmospheres in planetary interiors.","passageTranslation":"이러한 이유로 행성의 압력 범위는 엄청나며, 우주에서의 사실상 0에 가까운 압력에서 행성 내부의 수백만 기압에 이른다."},{"questionNumber":15,"sourceQuestion":"3번 지문","keyExpression":"resembles the difference between learning and showing","questionText":"'resembles the difference between learning and showing'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"echoes the difference between advancing one's understanding and verifying results for a wider audience","isCorrect":false,"explanation":"올바름: 'learning'을 자기 이해 증진으로, 'showing'을 더 넓은 청중을 위한 결과 검증으로 적절히 전환함","translation":"자신의 이해를 심화하는 것과 더 넓은 청중을 위해 결과를 검증하는 것 사이의 차이를 반영한다","enText":""},{"text":"captures the gap between teaching established concepts and questioning unproven assumptions","isCorrect":true,"explanation":"잘못됨: 원문의 'learning'은 발견·탐색을 뜻하고 'showing'은 타인을 설득하는 것을 뜻하는데, 이 보기는 'teaching established concepts'와 'questioning unproven assumptions'로 왜곡하여 원문의 논리적 대비를 완전히 벗어남","translation":"확립된 개념을 가르치는 것과 검증되지 않은 가정에 의문을 제기하는 것 사이의 간극을 포착한다","enText":""},{"text":"mirrors the contrast between personal exploration and public persuasion","isCorrect":false,"explanation":"올바름: 'learning'의 개인적·탐색적 성격과 'showing'의 공적·설득적 성격을 적절히 추상화함","translation":"개인적 탐색과 공적 설득 사이의 대조를 반영한다","enText":""},{"text":"is analogous to the gap between acquiring knowledge and demonstrating it to others","isCorrect":false,"explanation":"올바름: 'learning'을 'acquiring knowledge'로, 'showing'을 'demonstrating it to others'로 정확히 paraphrasing함","translation":"지식을 습득하는 것과 그것을 남에게 보여주는 것 사이의 간극과 유사하다","enText":""},{"text":"parallels the distinction between independently finding out and making others accept the finding","isCorrect":false,"explanation":"올바름: 'learning'을 스스로 발견하는 행위로, 'showing'을 타인을 납득시키는 행위로 구체화하여 문맥에 부합함","translation":"독자적으로 알아내는 것과 그 발견을 남에게 수용시키는 것 사이의 구분과 평행을 이룬다","enText":""}],"passage":"When self-experimentation and conventional experiments are both possible, the difference between them often resembles the difference between learning and showing.","passageTranslation":"자기 실험과 전통적 실험이 모두 가능할 때, 그 둘 사이의 차이는 흔히 배우는 것과 보여주는 것의 차이와 유사하다."},{"questionNumber":16,"sourceQuestion":"3번 지문","keyExpression":"better for discovery but worse for convincing others","questionText":"'better for discovery but worse for convincing others'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"superior for generating insights while falling short in gaining acceptance from the wider research community","isCorrect":false,"explanation":"올바름: 통찰 생성이라는 발견의 속성과, 연구 공동체의 수용이라는 설득의 속성을 적절히 구체화함","translation":"통찰을 만들어 내는 데는 우월하지만 더 넓은 연구 공동체의 수용을 얻는 데는 부족하다","enText":""},{"text":"highly productive for initial hypothesis formation yet insufficient for providing evidence to skeptical audiences","isCorrect":false,"explanation":"올바름: 발견을 가설 형성으로, 설득을 회의적 청중에 대한 증거 제시로 구체화하여 원문의 대조 구조를 유지함","translation":"초기 가설 형성에는 매우 생산적이지만 회의적인 청중에게 증거를 제공하는 데는 불충분하다","enText":""},{"text":"more advantageous in uncovering new findings yet less effective at persuading other people","isCorrect":false,"explanation":"올바름: 'discovery'를 'uncovering new findings'로, 'convincing others'를 'persuading other people'로 충실히 대응함","translation":"새로운 발견을 드러내는 데는 더 유리하지만 다른 사람들을 설득하는 데는 덜 효과적이다","enText":""},{"text":"more suited to exploring possibilities but limited in its capacity to build consensus among peers","isCorrect":false,"explanation":"올바름: 'discovery'의 탐색적 성격과 'convincing others'의 합의 구축 측면을 각각 정확히 반영함","translation":"가능성을 탐색하는 데는 더 적합하지만 동료들 사이에서 합의를 형성하는 능력은 제한적이다","enText":""},{"text":"more reliable for replicating prior results yet less capable of inspiring original research questions","isCorrect":true,"explanation":"잘못됨: 원문은 'discovery(새로운 발견)'에 강점이 있고 'convincing others(타인 설득)'에 약점이 있다고 했는데, 이 보기는 '기존 결과 재현'에 강점이 있고 '독창적 연구 질문 고취'에 약점이 있다고 하여 두 방향 모두 원문과 반대되거나 무관한 내용으로 대체함","translation":"이전 결과를 재현하는 데는 더 신뢰할 만하지만 독창적인 연구 질문을 촉발하는 데는 덜 유능하다","enText":""}],"passage":"Self-experiments are better for discovery but worse for convincing others that the solution is helpful or the answer is correct.","passageTranslation":"자기 실험은 발견에는 더 유리하지만 해결책이 유용하거나 답이 옳다는 것을 타인에게 납득시키는 데는 더 불리하다."},{"questionNumber":17,"sourceQuestion":"3번 지문","keyExpression":"generate and eliminate many hypotheses","questionText":"'generate and eliminate many hypotheses'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"produce a range of possible explanations while ruling out those that prove untenable","isCorrect":false,"explanation":"올바름: 'generate'를 'produce', 'hypotheses'를 'possible explanations', 'eliminate'를 'ruling out those that prove untenable'로 정확히 대응함","translation":"다양한 가능한 설명들을 만들어 내는 동시에 지지될 수 없는 것들을 제거한다","enText":""},{"text":"come up with multiple competing theories and weed out those that lack empirical support","isCorrect":false,"explanation":"올바름: 가설을 경쟁 이론으로, 제거를 경험적 지지가 없는 것을 솎아내는 행위로 구체화하여 원문의 의미를 유지함","translation":"여러 경쟁 이론들을 고안하고 경험적 뒷받침이 없는 것들을 솎아낸다","enText":""},{"text":"confirm the validity of existing theories by accumulating supporting evidence from multiple trials","isCorrect":true,"explanation":"잘못됨: 원문은 가설을 '생성하고 제거'하는 탐색적·역동적 과정인데, 이 보기는 '기존 이론의 타당성을 확인'하는 검증적 과정으로 바꾸어 원문의 의미와 정반대 방향을 제시함","translation":"여러 실험을 통해 뒷받침하는 증거를 축적함으로써 기존 이론의 타당성을 확인한다","enText":""},{"text":"devise and then discard a wide array of proposed explanations through iterative testing","isCorrect":false,"explanation":"올바름: 가설의 생성과 제거라는 두 과정을 'devise and discard'와 'iterative testing'으로 충실히 반영함","translation":"반복적 검증을 통해 광범위한 제안된 설명들을 고안한 다음 폐기한다","enText":""},{"text":"formulate numerous tentative ideas and systematically discard the ones that fail to hold up","isCorrect":false,"explanation":"올바름: 'generate'를 'formulate', 'hypotheses'를 'tentative ideas', 'eliminate'를 'discard the ones that fail to hold up'으로 적절히 paraphrasing함","translation":"수많은 잠정적 아이디어를 공식화하고 유지되지 않는 것들을 체계적으로 버린다","enText":""}],"passage":"The researcher begins with self-experiments that, if all goes well, find large effects and / or generate and eliminate many hypotheses.","passageTranslation":"연구자는 자기 실험으로 시작하는데, 모든 것이 잘 진행된다면 그 실험은 큰 효과를 발견하고/또는 많은 가설을 생성하고 제거한다."},{"questionNumber":18,"sourceQuestion":"3번 지문","keyExpression":"This exploratory and theory-building phase lasts until a convenient solution or large effect is found","questionText":"'This exploratory and theory-building phase lasts until a convenient solution or large effect is found'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"The investigative and hypothesis-refining stage is sustained until either an applicable solution or a substantial effect becomes apparent","isCorrect":false,"explanation":"올바름: 'exploratory'를 'investigative', 'theory-building'을 'hypothesis-refining', 'convenient'를 'applicable', 'large'를 'substantial'로 정밀하게 대응하여 의미를 유지함","translation":"탐구적이고 가설을 정교화하는 단계는 적용 가능한 해결책이나 실질적 효과가 분명해질 때까지 유지된다","enText":""},{"text":"The period of generating and testing ideas continues up to the point where a feasible outcome or a pronounced result is observed","isCorrect":false,"explanation":"올바름: 탐색과 이론 구축을 'generating and testing ideas'로, 발견을 'observed'로 표현하여 원문의 시간적 조건 구조를 그대로 반영함","translation":"아이디어를 생성하고 검증하는 시기는 실현 가능한 결과나 뚜렷한 결과가 관찰되는 시점까지 계속된다","enText":""},{"text":"The phase devoted to searching for patterns and developing theoretical accounts persists until a practical resolution or a notable result is identified","isCorrect":false,"explanation":"올바름: 탐색적 성격을 'searching for patterns'으로, 이론 구축을 'developing theoretical accounts'로, 결과 발견을 'identified'로 자연스럽게 구체화함","translation":"패턴을 탐색하고 이론적 설명을 발전시키는 단계는 실용적 해결책이나 주목할 만한 결과가 확인될 때까지 지속된다","enText":""},{"text":"The preliminary phase of reviewing past literature and comparing existing methodologies concludes once a consensus is reached among researchers","isCorrect":true,"explanation":"잘못됨: 원문의 '탐색적이고 이론 구축적인 단계'는 자기 실험을 통한 능동적 발견 과정인데, 이 보기는 '과거 문헌 검토와 기존 방법론 비교'라는 수동적 검토로 대체하고, 종료 조건도 '편리한 해결책·큰 효과 발견' 대신 '연구자들 간 합의 도달'로 왜곡함","translation":"과거 문헌을 검토하고 기존 방법론을 비교하는 예비 단계는 연구자들 사이에서 합의가 이루어지면 종료된다","enText":""},{"text":"The stage of open-ended investigation and framework construction continues until a workable answer or a significant outcome emerges","isCorrect":false,"explanation":"올바름: 'exploratory'를 'open-ended investigation', 'theory-building'을 'framework construction', 'convenient solution'을 'workable answer', 'large effect'를 'significant outcome'으로 정확히 대응함","translation":"개방적 탐구와 틀 구성의 단계는 실행 가능한 답이나 중요한 결과가 나타날 때까지 계속된다","enText":""}],"passage":"This exploratory and theory-building phase lasts until a convenient solution or large effect is found.","passageTranslation":"이 탐색적이고 이론 구축적인 단계는 편리한 해결책이나 큰 효과가 발견될 때까지 지속된다."},{"questionNumber":19,"sourceQuestion":"3번 지문","keyExpression":"find the procedural parameters that optimize the solution or maximize the effect","questionText":"'find the procedural parameters that optimize the solution or maximize the effect'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"identify the operational conditions under which the solution performs best or the outcome is greatest","isCorrect":false,"explanation":"올바름: 'procedural parameters'를 'operational conditions'으로, 'optimize'를 'performs best'로, 'maximize the effect'를 'outcome is greatest'로 정확히 대응함","translation":"해결책이 가장 잘 작동하거나 결과가 가장 커지는 운용 조건들을 파악한다","enText":""},{"text":"establish which procedural adjustments lead to the most favorable results or the strongest observed effects","isCorrect":false,"explanation":"올바름: 'parameters'를 'procedural adjustments'로, 'optimize'와 'maximize'를 'most favorable results'와 'strongest observed effects'로 충실히 대응함","translation":"어떤 절차적 조정이 가장 유리한 결과나 가장 강한 관찰된 효과로 이어지는지 확립한다","enText":""},{"text":"evaluate whether the theoretical assumptions underlying the study are sufficiently generalizable across different populations","isCorrect":true,"explanation":"잘못됨: 원문은 절차적 변수(시간, 강도 등)를 조정하여 효과를 극대화하는 실험적 최적화 과정인데, 이 보기는 이론적 가정의 일반화 가능성을 평가하는 것으로 완전히 다른 연구 활동으로 대체하여 원문의 의미를 왜곡함","translation":"연구의 기저를 이루는 이론적 가정들이 다양한 집단에 걸쳐 충분히 일반화 가능한지 평가한다","enText":""},{"text":"determine the specific methodological variables that bring about the most effective solution or the largest measurable result","isCorrect":false,"explanation":"올바름: 'parameters'를 'methodological variables'로, 'optimize'를 'most effective', 'maximize'를 'largest measurable result'로 자연스럽게 구체화함","translation":"가장 효과적인 해결책이나 가장 크게 측정 가능한 결과를 가져오는 특정 방법론적 변수들을 결정한다","enText":""},{"text":"pinpoint the practical settings, such as timing and intensity, that yield the highest-performing outcome","isCorrect":false,"explanation":"올바름: 지문의 예시(duration, time of day, intensity)를 'timing and intensity' 등으로 반영하면서 'optimize/maximize'를 'highest-performing'으로 적절히 paraphrasing함","translation":"가장 높은 성과를 내는 결과를 산출하는 시기와 강도 같은 실용적 설정들을 정확히 짚어낸다","enText":""}],"passage":"Then the researcher uses self-experiments to find the procedural parameters (e.g., duration, time of day, intensity) that optimize the solution or maximize the effect.","passageTranslation":"그런 다음 연구자는 자기 실험을 이용하여 해결책을 최적화하거나 효과를 극대화하는 절차적 변수들(예: 지속 시간, 하루 중 시각, 강도)을 찾는다."},{"questionNumber":20,"sourceQuestion":"3번 지문","keyExpression":"using the optimized parameters","questionText":"'using the optimized parameters'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"by independently selecting whichever variables seem intuitively reasonable without prior testing","isCorrect":true,"explanation":"잘못됨: 'optimized parameters'는 사전 자기 실험을 통해 이미 최적화된 변수들인데, 이 보기는 '사전 검증 없이 직관적으로 합리적으로 보이는 변수를 독립적으로 선택'한다고 하여 최적화라는 핵심 의미를 완전히 부정함","translation":"사전 검증 없이 직관적으로 합리적으로 보이는 변수들을 독립적으로 선택함으로써","enText":""},{"text":"employing the procedural variables that were already fine-tuned in the earlier stage","isCorrect":false,"explanation":"올바름: 'optimized'를 'fine-tuned in the earlier stage'로, 'parameters'를 'procedural variables'로 충실히 대응하여 순서적 맥락을 유지함","translation":"이전 단계에서 이미 미세 조정된 절차적 변수들을 사용하여","enText":""},{"text":"by making use of the experimental conditions identified as most effective in the self-experiment phase","isCorrect":false,"explanation":"올바름: 자기 실험 단계에서 최적화된 조건이라는 원문의 맥락을 'identified as most effective in the self-experiment phase'로 정확히 풀어냄","translation":"자기 실험 단계에서 가장 효과적인 것으로 확인된 실험 조건들을 활용함으로써","enText":""},{"text":"applying the conditions that have been refined through prior self-experimentation","isCorrect":false,"explanation":"올바름: 'optimized'를 'refined through prior self-experimentation'으로, 'parameters'를 'conditions'으로 정확히 paraphrasing하며 지문의 맥락을 반영함","translation":"이전 자기 실험을 통해 다듬어진 조건들을 적용하여","enText":""},{"text":"with the settings that were calibrated to achieve the best possible outcome beforehand","isCorrect":false,"explanation":"올바름: 'optimized'를 'calibrated to achieve the best possible outcome', 'parameters'를 'settings'으로 정밀하게 대응하고 사전 준비의 의미를 'beforehand'로 유지함","translation":"사전에 최선의 결과를 달성하도록 조정된 설정들로","enText":""}],"passage":"Only then would the researcher begin conventional experiments, using the optimized parameters.","passageTranslation":"그때서야 비로소 연구자는 최적화된 변수들을 사용하여 전통적 실험을 시작할 것이다."},{"questionNumber":21,"sourceQuestion":"3번 지문","keyExpression":"suited to exploration while conventional experiments provide validation","questionText":"'suited to exploration while conventional experiments provide validation'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"fitting for probing new possibilities, while traditional experiments function to verify and substantiate results","isCorrect":false,"explanation":"올바름: 'suited to exploration'을 'fitting for probing new possibilities'로, 'provide validation'을 'verify and substantiate results'로 충실히 풀어내어 의미를 보존함","translation":"새로운 가능성을 탐색하는 데 적합한 반면, 전통적 실험은 결과를 검증하고 입증하는 기능을 한다","enText":""},{"text":"appropriate for the phase of generating ideas and uncovering patterns, while controlled experiments deliver empirical proof","isCorrect":false,"explanation":"올바름: 'exploration'을 'generating ideas and uncovering patterns'으로, 'validation'을 'empirical proof'로, 'conventional'을 'controlled'로 정밀하게 대응함","translation":"아이디어를 생성하고 패턴을 발견하는 단계에 적합한 반면, 통제된 실험은 경험적 증거를 제공한다","enText":""},{"text":"well-matched to the investigative stage, whereas formal experiments are better at establishing credibility","isCorrect":false,"explanation":"올바름: 탐색적 단계와 자기 실험의 적합성을 'well-matched to the investigative stage'로, 검증을 'establishing credibility'로 자연스럽게 구체화함","translation":"탐구적 단계에 잘 맞는 반면, 공식 실험은 신뢰성을 확립하는 데 더 유리하다","enText":""},{"text":"limited to small-scale pilot studies, whereas conventional experiments are reserved for publishing final conclusions","isCorrect":true,"explanation":"잘못됨: 원문은 자기 실험이 탐색에 적합하고 전통 실험이 검증을 제공한다는 기능적 역할의 대비인데, 이 보기는 규모(소규모 예비 연구)와 발표 목적(최종 결론 출판)으로 대체하여 원문의 핵심인 탐색 대 검증의 역할 분담을 완전히 누락함","translation":"소규모 예비 연구에 국한된 반면, 전통적 실험은 최종 결론을 발표하기 위해 남겨둔다","enText":""},{"text":"designed for open-ended discovery, whereas standard experiments serve to confirm the findings","isCorrect":false,"explanation":"올바름: 'suited to exploration'을 'designed for open-ended discovery'로, 'provide validation'을 'serve to confirm the findings'로 정확히 대응하며 대조 구조를 유지함","translation":"개방적 발견을 위해 설계된 반면, 표준 실험은 그 발견을 확인하는 역할을 한다","enText":""}],"passage":"Since self-experiments are suited to exploration while conventional experiments provide validation, the most efficient strategy is for the former to precede the latter.","passageTranslation":"자기 실험은 탐색에 적합하고 전통적 실험은 검증을 제공하므로, 가장 효율적인 전략은 전자가 후자에 앞서는 것이다."},{"questionNumber":22,"sourceQuestion":"4번 지문","keyExpression":"shattered one record after another","questionText":"'shattered one record after another'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"broke sales records in rapid and repeated succession","isCorrect":false,"explanation":"올바름: 연속적으로 기록을 깼다는 의미를 정확히 전달함","translation":"빠르고 반복적인 연속으로 판매 기록을 깼다","enText":""},{"text":"surpassed previous price milestones repeatedly and dramatically","isCorrect":false,"explanation":"올바름: 이전 가격 이정표를 반복적이고 극적으로 뛰어넘었다는 의미로 적절함","translation":"이전의 가격 이정표를 반복적이고 극적으로 뛰어넘었다","enText":""},{"text":"kept exceeding the highest prices ever recorded in consecutive sales","isCorrect":false,"explanation":"올바름: 연속 판매에서 역대 최고가를 계속 초과했다는 의미로 적절함","translation":"연속 판매에서 역대 최고 가격을 계속해서 초과했다","enText":""},{"text":"struggled to maintain consistent pricing standards over time","isCorrect":true,"explanation":"잘못됨: '기록을 연달아 깼다'는 의미와 반대로, 가격 기준 유지에 어려움을 겪었다는 전혀 다른 의미를 나타냄","translation":"시간이 지남에 따라 일관된 가격 기준을 유지하는 데 어려움을 겪었다","enText":""},{"text":"set unprecedented new benchmarks in the auction market one after another","isCorrect":false,"explanation":"올바름: 경매 시장에서 전례 없는 새 기준을 연달아 세웠다는 의미로 적절함","translation":"경매 시장에서 전례 없는 새 기준을 차례차례 세웠다","enText":""}],"passage":"Over the past few years, auction houses have shattered one record after another.","passageTranslation":"지난 몇 년 동안 경매 회사들은 잇달아 기록을 경신해 왔다."},{"questionNumber":23,"sourceQuestion":"4번 지문","keyExpression":"That scarcity alone drives prices upward","questionText":"'That scarcity alone drives prices upward'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"high demand from competing collectors is the primary reason prices continue to climb","isCorrect":true,"explanation":"잘못됨: 원문은 '희소성만으로(scarcity alone)' 가격이 오른다고 했으나, 이 보기는 '경쟁하는 수집가들의 높은 수요'를 주요 원인으로 제시하여 핵심 논리를 왜곡함","translation":"경쟁하는 수집가들의 높은 수요가 가격이 계속 오르는 주된 이유이다","enText":""},{"text":"limited availability, without any other factor, is what causes prices to rise","isCorrect":false,"explanation":"올바름: 다른 요소 없이 희소성만으로 가격이 오른다는 의미를 충실히 반영함","translation":"다른 어떤 요소 없이도 제한된 공급 가능성 자체가 가격 상승을 유발한다","enText":""},{"text":"it is the one-of-a-kind nature of the work alone that accounts for its rising price","isCorrect":false,"explanation":"올바름: 작품의 유일무이한 성격만이 가격 상승을 설명한다는 의미로 정확함","translation":"작품의 유일무이한 성격만이 그것의 가격 상승을 설명한다","enText":""},{"text":"uniqueness by itself is sufficient to inflate the market price of a work","isCorrect":false,"explanation":"올바름: 유일성 그 자체만으로 시장 가격을 높이기에 충분하다는 의미로 적절함","translation":"유일성 그 자체만으로도 작품의 시장 가격을 높이기에 충분하다","enText":""},{"text":"the mere fact that there is only one such work is enough to push its value higher","isCorrect":false,"explanation":"올바름: 단 하나뿐이라는 사실만으로도 가치가 올라간다는 의미를 정확히 전달함","translation":"그런 작품이 단 하나뿐이라는 사실만으로도 그 가치를 높이기에 충분하다","enText":""}],"passage":"A masterpiece is, by definition, one of a kind. You cannot manufacture another Starry Night. That scarcity alone drives prices upward, and it always has.","passageTranslation":"걸작이란 정의상 단 하나뿐이다. 또 다른 '별이 빛나는 밤'을 만들어 낼 수는 없다. 그 희소성만으로도 가격은 오르며, 항상 그래왔다."},{"questionNumber":24,"sourceQuestion":"4번 지문","keyExpression":"Markets exist precisely to sort out what things are worth","questionText":"'Markets exist precisely to sort out what things are worth'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"establishing what something is worth is exactly the function markets are designed to serve","isCorrect":false,"explanation":"올바름: 무언가의 가치를 정하는 것이 시장이 수행하도록 설계된 기능이라는 의미로 적절함","translation":"무언가의 가치를 확립하는 것이 바로 시장이 수행하도록 설계된 기능이다","enText":""},{"text":"markets are fundamentally created to regulate how goods are produced and distributed","isCorrect":true,"explanation":"잘못됨: 원문은 시장이 '가치를 결정하는' 역할을 한다고 했으나, 이 보기는 '재화의 생산과 유통을 규제한다'는 전혀 다른 기능을 제시함","translation":"시장은 근본적으로 재화의 생산과 유통 방식을 규제하기 위해 만들어졌다","enText":""},{"text":"the very purpose of markets is to determine the value of goods through exchange","isCorrect":false,"explanation":"올바름: 시장의 목적이 교환을 통해 재화의 가치를 결정하는 것이라는 의미를 잘 전달함","translation":"시장의 바로 그 목적은 교환을 통해 재화의 가치를 결정하는 것이다","enText":""},{"text":"deciding what price something deserves is the specific role that markets are meant to fulfill","isCorrect":false,"explanation":"올바름: 어떤 것이 받을 만한 가격을 결정하는 것이 시장의 역할이라는 의미로 정확함","translation":"어떤 것이 받아야 할 가격을 결정하는 것이 시장이 수행하도록 의도된 특정한 역할이다","enText":""},{"text":"it is markets that are uniquely suited to figure out the true value of any given item","isCorrect":false,"explanation":"올바름: 어떤 물건의 진정한 가치를 파악하는 데 시장이 적합하다는 의미로 원문과 일치함","translation":"어떤 물건의 진정한 가치를 파악하는 데 적합한 것은 바로 시장이다","enText":""}],"passage":"There is also a straightforward libertarian argument here. If someone has the money and wants to spend it on a painting, that is their business. Markets exist precisely to sort out what things are worth, and art is no exception.","passageTranslation":"여기에는 또한 간단명료한 자유주의적 논거도 있다. 누군가 돈이 있어서 그림에 쓰고 싶다면 그것은 그 사람의 일이다. 시장은 정확히 사물의 가치를 가려내기 위해 존재하며, 예술도 예외가 아니다."},{"questionNumber":25,"sourceQuestion":"4번 지문","keyExpression":"these transactions are not just extravagant — they are a symptom of inequality","questionText":"'these transactions are not just extravagant — they are a symptom of inequality'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"the excess displayed in these transactions points to something more troubling than luxury alone — systemic imbalance","isCorrect":false,"explanation":"올바름: 거래에서 드러나는 과잉이 사치 이상의 더 불안한 것, 즉 구조적 불균형을 가리킨다는 의미로 정확함","translation":"이러한 거래에서 드러나는 과잉은 사치만이 아닌 더 불안한 것, 즉 구조적 불균형을 가리킨다","enText":""},{"text":"while these sales are admittedly lavish, they also help redistribute wealth among different social classes","isCorrect":true,"explanation":"잘못됨: 원문은 거래가 불평등의 '증상'이라고 비판하는데, 이 보기는 오히려 부를 재분배하는 데 도움이 된다고 반대 의미를 주장함","translation":"이러한 판매가 확실히 사치스럽기는 하지만, 서로 다른 사회 계층 간에 부를 재분배하는 데도 도움이 된다","enText":""},{"text":"such deals go beyond mere wastefulness; they signal a deeper problem of unequal wealth distribution","isCorrect":false,"explanation":"올바름: 단순한 낭비를 넘어 불평등한 부의 분배라는 더 깊은 문제를 신호한다는 의미로 정확함","translation":"그러한 거래는 단순한 낭비를 넘어서서 불평등한 부의 분배라는 더 깊은 문제를 신호한다","enText":""},{"text":"these purchases do more than reflect excess spending; they reveal the widening gap between rich and poor","isCorrect":false,"explanation":"올바름: 과도한 지출의 반영 이상으로 빈부 격차 심화를 드러낸다는 의미로 적절함","translation":"이러한 구매는 과도한 지출을 반영하는 것 이상으로 빈부 격차 심화를 드러낸다","enText":""},{"text":"far from being simple acts of excess, these sales are direct evidence of how unevenly wealth is shared","isCorrect":false,"explanation":"올바름: 단순한 과잉 행위가 아니라 부가 얼마나 불균등하게 분배되는지를 보여주는 직접적 증거라는 의미로 적절함","translation":"단순한 과잉 행위와는 거리가 멀게도, 이러한 판매는 부가 얼마나 불균등하게 분배되는지를 보여주는 직접적 증거이다","enText":""}],"passage":"Critics look at a 450-million-dollar painting and see something uncomfortable — a world where that kind of money changes hands for a single object while millions of people struggle to cover basic needs. To them, these transactions are not just extravagant. They are a symptom of inequality that has grown almost grotesque.","passageTranslation":"비평가들은 4억 5천만 달러짜리 그림을 보며 불편한 무언가를 발견한다. 수백만 명의 사람들이 기본적인 필요를 충당하려 고군분투하는 동안 그 정도의 돈이 단 하나의 물건을 위해 오가는 세계를 말이다. 그들에게 이러한 거래는 단순히 사치스러운 것이 아니다. 그것은 거의 기괴할 정도로 심화된 불평등의 증상이다."},{"questionNumber":26,"sourceQuestion":"4번 지문","keyExpression":"belong to everyone in some meaningful sense","questionText":"'belong to everyone in some meaningful sense'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"should legally be transferred to public institutions regardless of who currently owns them","isCorrect":true,"explanation":"잘못됨: 원문은 '의미 있는 의미에서 모두에게 속한다'는 도덕적·상징적 주장인데, 이 보기는 현 소유자와 무관하게 공공 기관에 '법적으로 이전되어야 한다'는 구체적 법적 주장으로 과도하게 구체화하여 원문의 뉘앙스를 왜곡함","translation":"현재 누가 소유하든 관계없이 공공 기관에 법적으로 이전되어야 한다","enText":""},{"text":"can be understood as something the public has a legitimate stake in, not just private collectors","isCorrect":false,"explanation":"올바름: 사적 수집가뿐만 아니라 대중이 정당한 이해관계를 갖는 것으로 이해될 수 있다는 의미로 정확함","translation":"사적 수집가뿐 아니라 대중이 정당한 이해관계를 갖는 것으로 이해될 수 있다","enText":""},{"text":"are in a real and significant way the shared property of society as a whole","isCorrect":false,"explanation":"올바름: 진정하고 중요한 방식으로 사회 전체의 공유 재산이라는 의미로 정확함","translation":"진정하고 중요한 방식으로 사회 전체의 공유 재산이다","enText":""},{"text":"have a genuine claim to being part of the collective heritage of all people","isCorrect":false,"explanation":"올바름: 모든 사람의 집단적 유산의 일부라는 진정한 주장이 있다는 의미로 적절함","translation":"모든 사람의 집단적 유산의 일부라는 진정한 주장이 있다","enText":""},{"text":"carry a kind of shared ownership that goes beyond any single individual's legal title","isCorrect":false,"explanation":"올바름: 어떤 개인의 법적 소유권을 넘어서는 공유 소유의 성격을 지닌다는 의미로 적절함","translation":"어떤 개인의 법적 소유권을 넘어서는 공유 소유의 성격을 지닌다","enText":""}],"passage":"There is a deeper objection, too, one that goes beyond the price tag. Works of major historical importance, the argument goes, belong to everyone in some meaningful sense.","passageTranslation":"가격표를 넘어서는 더 깊은 반론도 있다. 주요한 역사적 중요성을 지닌 작품들은 의미 있는 의미에서 모두에게 속한다는 것이 그 주장이다."},{"questionNumber":27,"sourceQuestion":"4번 지문","keyExpression":"locked away in a billionaire's living room","questionText":"'locked away in a billionaire's living room'을 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"kept hidden from the public in the private residence of an extremely wealthy individual","isCorrect":false,"explanation":"올바름: 극도로 부유한 개인의 사저에 대중으로부터 숨겨져 있다는 의미로 정확함","translation":"극도로 부유한 개인의 사저에 대중으로부터 숨겨져 있다","enText":""},{"text":"confined to the inaccessible private quarters of a person of extraordinary financial means","isCorrect":false,"explanation":"올바름: 막대한 재력을 가진 사람의 접근 불가능한 사적 공간에 갇혀 있다는 의미로 정확함","translation":"막대한 재력을 가진 사람의 접근 불가능한 사적 공간에 갇혀 있다","enText":""},{"text":"stored out of public reach within the private space of someone with immense wealth","isCorrect":false,"explanation":"올바름: 막대한 부를 가진 사람의 사적 공간 안에 대중의 손이 닿지 않게 보관되어 있다는 의미로 적절함","translation":"막대한 부를 가진 사람의 사적 공간 안에 대중의 손이 닿지 않게 보관되어 있다","enText":""},{"text":"placed beyond the reach of ordinary people inside a wealthy owner's private home","isCorrect":false,"explanation":"올바름: 부유한 소유자의 사저 안에서 일반인의 접근 밖에 놓여 있다는 의미로 적절함","translation":"부유한 소유자의 사저 안에서 일반인의 접근 밖에 놓여 있다","enText":""},{"text":"secured and displayed proudly to elite guests in the home of the ultra-rich","isCorrect":true,"explanation":"잘못됨: 원문의 핵심은 일반 대중이 접근할 수 없다는 '격리'의 의미인데, 이 보기는 엘리트 손님들에게 '자랑스럽게 전시된다'고 하여 선택적 공개의 긍정적 뉘앙스를 부여함으로써 원문의 비판적 의미를 왜곡함","translation":"초부유층의 집에서 엘리트 손님들에게 자랑스럽게 전시되고 안전하게 보관되어 있다","enText":""}],"passage":"If it is locked away in a billionaire's living room, the public loses the chance to see something that should probably be in a museum, where students, scholars, and ordinary visitors can all engage with it.","passageTranslation":"만약 그것이 억만장자의 거실에 갇혀 있다면, 대중은 아마도 박물관에 있어야 할 무언가를 볼 기회를 잃게 되며, 박물관에서는 학생, 학자, 일반 방문객 모두가 그것과 교류할 수 있다."},{"questionNumber":28,"sourceQuestion":"4번 지문","keyExpression":"access matters more than ownership — at least when the stakes are this high","questionText":"'access matters more than ownership — at least when the stakes are this high'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"ensuring that art remains available to the public should take priority over individual property rights in cases of great cultural importance","isCorrect":false,"explanation":"올바름: 위대한 문화적 중요성의 경우 예술을 대중이 이용 가능하게 유지하는 것이 개인의 재산권보다 우선시되어야 한다는 의미로 정확함","translation":"위대한 문화적 중요성의 경우에는 예술을 대중이 이용할 수 있게 유지하는 것이 개인의 재산권보다 우선시되어야 한다","enText":""},{"text":"as long as private owners take proper care of culturally significant works, their exclusive rights to those works remain fully justified","isCorrect":true,"explanation":"잘못됨: 원문은 '접근(access)이 소유(ownership)보다 중요하다'고 하여 사적 소유권에 도전하는 입장인데, 이 보기는 사적 소유자가 작품을 잘 관리하는 한 배타적 권리가 '완전히 정당화된다'고 반대 입장을 취함","translation":"사적 소유자들이 문화적으로 중요한 작품을 적절히 관리하는 한, 그 작품에 대한 그들의 배타적 권리는 완전히 정당화된다","enText":""},{"text":"the right of the public to view a work outweighs the rights of whoever holds its legal title, especially given the significance involved","isCorrect":false,"explanation":"올바름: 관련된 중요성을 감안할 때 대중의 감상 권리가 법적 소유자의 권리보다 중요하다는 의미로 정확함","translation":"관련된 중요성을 감안할 때 대중이 작품을 볼 권리가 법적 소유권자의 권리보다 크다","enText":""},{"text":"given the exceptional importance of certain works, the ability to experience them publicly must be valued above the exclusivity of private ownership","isCorrect":false,"explanation":"올바름: 특정 작품의 탁월한 중요성을 감안할 때 공적으로 경험할 수 있는 능력이 사적 소유의 독점성보다 소중히 여겨져야 한다는 의미로 적절함","translation":"특정 작품의 탁월한 중요성을 감안할 때, 그것을 공적으로 경험할 수 있는 능력이 사적 소유의 독점성보다 소중히 여겨져야 한다","enText":""},{"text":"when so much of cultural value is on the line, whether people can see a work is more important than who possesses it","isCorrect":false,"explanation":"올바름: 엄청난 문화적 가치가 걸려 있을 때 사람들이 작품을 볼 수 있는지가 누가 소유하는지보다 더 중요하다는 의미로 적절함","translation":"그토록 많은 문화적 가치가 걸려 있을 때, 사람들이 작품을 볼 수 있는지가 누가 소유하는지보다 더 중요하다","enText":""}],"passage":"For critics who think this way, access matters more than ownership — at least when the stakes are this high.","passageTranslation":"이런 방식으로 생각하는 비평가들에게는, 접근성이 소유권보다 더 중요하다. 적어도 이토록 중요한 것이 걸려 있을 때는."},{"questionNumber":29,"sourceQuestion":"5번 지문","keyExpression":"connect things that look separate","questionText":"'connect things that look separate'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"identify distinctions between seemingly disconnected ideas","isCorrect":true,"explanation":"잘못됨: 'identify distinctions'(차이를 찾아내다)는 원문의 'connect'(연결하다)와 반대 방향의 의미이므로 잘못된 paraphrase","translation":"겉보기에 단절된 아이디어들 사이의 차이점을 찾아내다","enText":""},{"text":"draw connections among things that seem to have no obvious relationship","isCorrect":false,"explanation":"올바름: 'draw connections'와 'seem to have no obvious relationship'이 원문 의미를 충실히 반영함","translation":"명백한 관계가 없어 보이는 것들 사이에 연결을 이끌어 내다","enText":""},{"text":"establish links between elements that appear unrelated","isCorrect":false,"explanation":"올바름: 'establish links'는 'connect'의, 'appear unrelated'는 'look separate'의 정확한 paraphrase","translation":"관련 없어 보이는 요소들 사이에 연결을 확립하다","enText":""},{"text":"find common ground between things that do not obviously belong together","isCorrect":false,"explanation":"올바름: 'find common ground'는 연결 행위를, 'do not obviously belong together'는 'look separate'를 적절히 paraphrase함","translation":"명백히 함께 속하지 않는 것들 사이에서 공통점을 찾다","enText":""},{"text":"bridge the gap between concepts that outwardly seem unconnected","isCorrect":false,"explanation":"올바름: 'bridge the gap'은 'connect'의 비유적 표현이며 'outwardly seem unconnected'는 'look separate'와 같은 의미","translation":"겉으로는 연결되지 않은 것처럼 보이는 개념들 사이의 간극을 잇다","enText":""}],"passage":"One of the ways to do this is to connect things that look separate. This can be incredibly pleasing as it helps us to see the world in a different light and gain a greater appreciation for the interrelation of all things.","passageTranslation":"이를 위한 방법 중 하나는 별개로 보이는 것들을 연결하는 것이다. 이는 세상을 다른 시각으로 보고 모든 것의 상호 연관성에 대한 더 깊은 이해를 얻도록 도와주기 때문에 매우 즐거운 일이 될 수 있다."},{"questionNumber":30,"sourceQuestion":"5번 지문","keyExpression":"see the world in a different light","questionText":"'see the world in a different light'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"gain an entirely new outlook on the surrounding world","isCorrect":false,"explanation":"올바름: 'entirely new outlook'이 'different light'의 핵심 의미를 충실히 전달함","translation":"주변 세계에 대한 완전히 새로운 시각을 얻다","enText":""},{"text":"perceive the world from a perspective that diverges from the conventional","isCorrect":false,"explanation":"올바름: 'perceive'는 'see'의, 'diverges from the conventional'은 '다른 시각'을 적절히 풀어냄","translation":"기존과 다른 관점에서 세상을 인식하다","enText":""},{"text":"approach the world through a fresh and unconventional lens","isCorrect":false,"explanation":"올바름: 'fresh and unconventional lens'가 'different light'의 비유적 의미를 자연스럽게 paraphrase함","translation":"신선하고 관습에 얽매이지 않는 렌즈를 통해 세상에 접근하다","enText":""},{"text":"illuminate the world more clearly by removing all ambiguity","isCorrect":true,"explanation":"잘못됨: 'illuminate'와 'removing all ambiguity'는 원문의 '다른 관점으로 보다'가 아닌 '더 명확히 밝히다'는 전혀 다른 의미를 나타냄","translation":"모든 모호함을 제거하여 세상을 더 명확하게 밝히다","enText":""},{"text":"examine the world with a renewed and altered viewpoint","isCorrect":false,"explanation":"올바름: 'renewed and altered viewpoint'가 'different light'의 의미를 정확히 반영함","translation":"새롭게 변화된 시각으로 세상을 바라보다","enText":""}],"passage":"This can be incredibly pleasing as it helps us to see the world in a different light and gain a greater appreciation for the interrelation of all things.","passageTranslation":"이는 세상을 다른 시각으로 보고 모든 것의 상호 연관성에 대한 더 깊은 이해를 얻도록 도와주기 때문에 매우 즐거운 일이 될 수 있다."},{"questionNumber":31,"sourceQuestion":"5번 지문","keyExpression":"all you need is your imaginative power","questionText":"'all you need is your imaginative power'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"what is truly essential is possessing the power to imagine new possibilities","isCorrect":false,"explanation":"올바름: 'truly essential'은 'all you need'를, 'power to imagine new possibilities'는 'imaginative power'를 적절히 paraphrase함","translation":"진정으로 필수적인 것은 새로운 가능성을 상상하는 힘을 갖는 것이다","enText":""},{"text":"the only prerequisite is the capacity to think creatively","isCorrect":false,"explanation":"올바름: 'only prerequisite'는 'all you need'의, 'capacity to think creatively'는 'imaginative power'의 정확한 paraphrase","translation":"유일한 전제 조건은 창의적으로 생각하는 능력이다","enText":""},{"text":"extensive training and specialized knowledge are the key factors for success","isCorrect":true,"explanation":"잘못됨: 원문은 상상력만으로 충분하다고 강조하는데, 'extensive training and specialized knowledge'(광범위한 훈련과 전문 지식)를 요구하는 것은 원문의 의미를 정반대로 왜곡함","translation":"광범위한 훈련과 전문 지식이 성공의 핵심 요인이다","enText":""},{"text":"the sole requirement is one's ability to envision beyond the obvious","isCorrect":false,"explanation":"올바름: 'sole requirement'와 'envision beyond the obvious'가 원문의 핵심 의미를 충실히 반영함","translation":"유일한 요건은 명백한 것 너머를 상상하는 능력이다","enText":""},{"text":"nothing more than creative imagination is required to make this happen","isCorrect":false,"explanation":"올바름: 'nothing more than creative imagination is required'가 'all you need is your imaginative power'를 자연스럽게 paraphrase함","translation":"이것을 실현하는 데 창의적 상상력 이상은 아무것도 필요하지 않다","enText":""}],"passage":"Connecting ideas that at first glance appear unrelated is a powerful tool for exploring the beauty of the world around us. To make such connections, all you need is your imaginative power.","passageTranslation":"언뜻 보기에 관련 없어 보이는 아이디어들을 연결하는 것은 우리 주변 세계의 아름다움을 탐구하는 강력한 도구이다. 그러한 연결을 만들어 내기 위해 필요한 것은 오직 여러분의 상상력이다."},{"questionNumber":32,"sourceQuestion":"5번 지문","keyExpression":"breathe life into well-known structures around the world","questionText":"'breathe life into well-known structures around the world'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"infuse vitality into globally recognized architectural landmarks","isCorrect":false,"explanation":"올바름: 'infuse vitality'는 'breathe life into'의, 'globally recognized architectural landmarks'는 'well-known structures around the world'의 정확한 paraphrase","translation":"전 세계적으로 알려진 건축 명소에 활기를 불어넣다","enText":""},{"text":"bring renewed energy and fresh appeal to widely recognized structures globally","isCorrect":false,"explanation":"올바름: 'renewed energy and fresh appeal'이 'breathe life into'를, 'widely recognized structures globally'가 'well-known structures around the world'를 정확히 전달함","translation":"널리 알려진 구조물들에 새로운 에너지와 신선한 매력을 부여하다","enText":""},{"text":"transform the perception of iconic buildings that people around the world recognize","isCorrect":false,"explanation":"올바름: 'transform the perception'이 'breathe life into'의 결과적 의미를, 'iconic buildings that people around the world recognize'가 'well-known structures'를 잘 paraphrase함","translation":"전 세계 사람들이 알고 있는 상징적인 건물들에 대한 인식을 변화시키다","enText":""},{"text":"document the physical deterioration of historically significant buildings worldwide","isCorrect":true,"explanation":"잘못됨: 'document the physical deterioration'(물리적 쇠퇴를 기록하다)는 'breathe life into'(생기를 불어넣다)와 반대되는 의미이므로 잘못된 paraphrase","translation":"전 세계 역사적으로 중요한 건물들의 물리적 쇠퇴를 기록하다","enText":""},{"text":"revitalize the image of famous monuments found across different countries","isCorrect":false,"explanation":"올바름: 'revitalize the image'가 'breathe life into'를, 'famous monuments across different countries'가 'well-known structures around the world'를 적절히 반영함","translation":"여러 나라에 걸쳐 존재하는 유명한 기념물의 이미지를 새롭게 살리다","enText":""}],"passage":"He draws illustrations on top of photos of landmarks or buildings and offers whole new ways to see them. To breathe life into well-known structures around the world, he often uses iconic pop culture characters.","passageTranslation":"그는 명소나 건물 사진 위에 삽화를 그려 그것들을 보는 완전히 새로운 방식을 제공한다. 전 세계의 잘 알려진 구조물에 생기를 불어넣기 위해 그는 종종 대중문화의 상징적인 캐릭터들을 활용한다."},{"questionNumber":33,"sourceQuestion":"5번 지문","keyExpression":"turn what we consider dull and boring into something delightful","questionText":"'turn what we consider dull and boring into something delightful'를 잘못 paraphrasing한 것은?","qmode":"","options":[{"text":"reinforce the established notion that ordinary things lack the capacity to entertain","isCorrect":true,"explanation":"잘못됨: 원문은 지루한 것을 즐거운 것으로 '변환'한다는 내용인데, 'reinforce the established notion that ordinary things lack the capacity to entertain'은 평범한 것이 즐거움을 줄 수 없다는 기존 관념을 '강화'한다는 반대 의미","translation":"평범한 것들이 즐거움을 줄 능력이 없다는 기존 관념을 강화하다","enText":""},{"text":"take what strikes us as unremarkable and give it an unexpectedly charming quality","isCorrect":false,"explanation":"올바름: 'unremarkable'이 'dull and boring'을, 'unexpectedly charming quality'가 'something
