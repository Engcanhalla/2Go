const P = {
P01: `How do we open ourselves up to new possibilities? One of the ways to do this is to connect things that look separate. This can be incredibly pleasing as it helps us to see the world in a different light and gain a greater appreciation for the interrelation of all things. Here are three artists who are willing to experiment with this approach.

Beyond the Scene (Robin Yayla)
Meet Robin Yayla, a visual storyteller living in Milan, Italy, who has been delighting his viewers with his unique artworks on social media. He draws illustrations on top of photos of landmarks or buildings and offers whole new ways to see them. To breathe life into well-known structures around the world, he often uses iconic pop culture characters. His unique twists sometimes turn what we consider dull and boring into something delightful. To him, a bridge is a net, and a road is a bowling lane. After finding whatever is common in two unrelated things, he connects them smoothly in his digital drawing.

Rob Gonsalves
Paintings of Rob Gonsalves, a Canadian magic realist artist, combine two different points of view. They give the viewer the visual illusion that they are looking at two unrelated realities flawlessly fused in one painting. An object is gradually changed through a series of similar shapes into something entirely different in a single scene. This kind of illusion has a fun way of twisting your perception. It makes you question what is real.

Fun Shadows (Vincent Bal)
When we look at shadows of objects in real life, most of us think nothing of them. Belgian artist and film-maker Vincent Bal, however, turns them into art forms. He keeps a very open mind and tries not to have an idea in advance about what the result should be. In fact, it was by accident that he started making his art pieces.`,
P02: `Would you rather receive $1,000 in a year or $1,100 in a year and a month? Most people will opt for the larger sum in thirteen months — where else will you find a monthly interest rate of 10 percent. A wise choice, since the interest will compensate you generously for any risks you face by waiting the extra few weeks. Second question: Would you prefer $1,000 today cash on the table or $1,100 in a month? If you think like most people, you'll take the $1,000 right away. In both cases, if you hold out for just a month longer, you get $100 more. The introduction of "now" causes us to make inconsistent decisions. Science calls this phenomenon hyperbolic discounting. The closer a reward is, the higher our "emotional interest rate" rises and the more we are willing to give up in exchange for it.`,
P03: `The writer and zoologist Desmond Morris observed that our feet communicate exactly what we think and feel more honestly than any other part of our bodies. Why are the feet and legs such accurate reflectors of our sentiments? For millions of years, long before humans spoke, our legs and feet reacted to environmental threats (e.g., hot sand, ill-tempered lions) instantaneously, without the need for conscious thought. Our limbic brains made sure that our feet and legs reacted as needed by either ceasing motion, running away, or kicking at a potential threat. This survival regimen, retained from our ancestral heritage, has served us well and continues to do so today. In fact, these age-old reactions are still so hardwired in us that when we are presented with something dangerous or even disagreeable, our feet and legs still react as they did in prehistoric times.`,
P04: `The word "migration" is almost always reported in the popular media and even in scientific literature as a problem or a crisis. For example, migrants are assumed to overcrowd cities, clog up labor markets, and increase poverty. The other questionable assumption is that most migration is involuntary—people fleeing natural or man-made disasters. The reality, however, is more complex, and many migrants are simply seeking greater economic opportunity. But migration can also be a solution for many preexisting problems. For example, out-migration generally redistributes workers from places of labor surplus to areas where there is greater demand or more opportunity. Migration is generally selective of persons who are younger, healthier, more flexible, and more willing to endure hardship. Most research that examines long-term outcomes of migration finds positive "long-term" effects on places of origin and destination.`,
P05: `Daylight Saving Time Sparks Debate

In March, Daylight Saving Time (DST) began in regions across North America and Europe. Millions of people set their clocks forward one hour to mark the arrival of spring.

Observed in about 70 countries, DST is a system that shifts the clock to extend evening daylight hours. A well-known phrase, "spring forward, fall back," helps people remember to set their clocks one hour forward in the spring and one hour back in the fall.

First proposed by scientist George Vernon Hudson in 1895, the idea was adopted by several countries to save energy during World Wars I and II. DST eventually became a common global practice in the 1970s.

Besides energy conservation, DST allows people more time to enjoy natural sunlight. In addition, DST offers other benefits, including increased work productivity, boosted consumer spending, and additional time for daily activities.

Despite its benefits, critics of DST argue that people often use more energy in the darker mornings. Furthermore, studies have shown that shifting the clock forward in spring causes people to suddenly lose an hour of sleep. This can reportedly disrupt the brain's circadian rhythms, increase the risk of heart attack, and cause people to get into more accidents.

The government of British Columbia, Canada, recently decided to permanently adopt DST. Supported by over 90 percent of the public, residents set their clocks one hour forward for the last time in March 2026.

While other regions will continue to change their clocks, some policymakers have proposed shifting them by 30 minutes, rather than a full hour.`,
P06: `In a thesis-based doctoral programme, students typically spend a significant amount of time and effort researching a specific topic. While this deep dive into a particular area allows for thorough exploration and understanding, it can also result in narrowing the focus. As students become deeply absorbed in their research, they may spend less time exploring related fields or acquiring skills outside their immediate area of study. Consequently, this singular focus may limit the breadth of knowledge and skills developed during the programme. Some universities in Europe have recognised the limitations of traditional thesis-based doctoral programmes and have started to implement more structured approaches. These structured programmes often combine research with coursework and training in transferable skills. By incorporating coursework, seminars, workshops and internships into the curriculum, they aim to provide students with a broader skill set and better prepare them for a variety of career paths beyond academia.`,
P07: `Perhaps the best-known development to emerge from the liberation and expansion of aesthetic experience is the aesthetics of everyday life. Although there is presently a flowering of work on everyday aesthetics, the possibility of aesthetic gratification in ordinary objects and events has long been recognized, even if degraded and dismissed by prevalent philosophical theory. Widely valued by poets, especially Romantic poets and those in Asian traditions, the aesthetic in everyday situations has also been recognized by novelists. It may be most convenient, though, to locate its contemporary intellectual origins in John Dewey's Art as Experience. In that book Dewey argued against the separation of art from life by basing aesthetic experience on the biological and cultural conditions of human life. He located the aesthetic, not in an internalized awareness of sensation and feeling but in "a complete interpenetration of self and the world of objects and events." Further, Dewey maintained that "the aesthetic is the clarified and intensified development of traits that belong to every normally complete experience."`,
P08: `One cannot validly argue that humans are morally superior beings on the ground that they possess, while others lack, the capacities of a moral agent. The reason is that, as far as moral standards are concerned, only beings that have the capacities of a moral agent can meaningfully be said to be either morally good or morally bad. Only moral agents can be judged to be morally better or worse than others. Judgments of moral superiority are based on the comparative merits or deficiencies of the entities being judged. One entity is correctly judged morally superior to another if it is the case that, when valid moral standards are applied to both entities, the first fulfills them to a greater degree than the second. Both entities, therefore, must fall within the range of application of moral standards. This would not be the case, however, if humans were being judged superior to animals and plants, since the latter are not moral agents.`,
P09: `Our intuition about states of matter comes from our experience on Earth's surface, where the pressure is uniformly low and variations in temperature cause changes in the state of matter from solid to liquid to gas. Therefore, when we think of melting or boiling or the creation of plasma, we intuitively assume it reflects an increase in temperature. This bias comes from the fact that we live in a very constant pressure environment. Even small changes in pressure, such as those we experience when under water or on high mountaintops, can have very large effects on our metabolism. But the pressure changes we experience are trivial compared to the pressure range of the overall planetary environment. Since pressure is controlled by the weight of overlying material, pressures increase rapidly with depth. For this reason a planet's pressure ranges are enormous — from essentially zero pressure in space to pressures of millions of atmospheres in planetary interiors.`,
P10: `When self-experimentation and conventional experiments are both possible, the difference between them often resembles the difference between learning and showing: Self-experiments are better for discovery but worse for convincing others that the solution is helpful or the answer is correct. Of course, most scientists want to do both — discover something and convince others of their discovery. Thus, psychologists should consider doing both self-experiments and conventional ones. The best use of resources may often be self-experiments followed by conventional ones. The researcher begins with self-experiments that, if all goes well, find large effects and / or generate and eliminate many hypotheses. This exploratory and theory-building phase lasts until a convenient solution or large effect is found. Then the researcher uses self-experiments to find the procedural parameters (e.g., duration, time of day, intensity) that optimize the solution. Only then would the researcher begin conventional experiments, using the optimized parameters. Since self-experiments are suited to exploration while conventional experiments provide validation, the most efficient strategy is for the former to precede the latter.`,
P11: `Over the past few years, auction houses have shattered one record after another. Van Gogh's work sold for more than 117 million dollars in 2022. Before that, Leonardo da Vinci's Salvator Mundi sold for a staggering 450 million dollars in 2017. Numbers like these inevitably raise a question: is any painting actually worth that much? People who say yes tend to point out what should be obvious — a masterpiece is, by definition, one of a kind. That scarcity alone drives prices upward, and it always has. There is also a straightforward libertarian argument here. If someone has the money and wants to spend it on a painting, that is their business. Markets exist precisely to sort out what things are worth, and art is no exception. But not everyone finds this convincing. Critics look at a 450-million-dollar painting and see something uncomfortable — a world where that kind of money changes hands for a single object while millions of people struggle to cover basic needs. They are a symptom of inequality that has grown almost grotesque. Works of major historical importance, the argument goes, belong to everyone in some meaningful sense. A painting by da Vinci is not just a decoration for someone's private collection; it is part of our shared cultural history. For critics who think this way, access matters more than ownership — at least when the stakes are this high.`

〈보기〉 These age-old reactions are still so hardwired in us that they appear long before we consciously assess a situation.`,
 passage:`For millions of years, long before humans spoke, our legs and feet reacted to environmental threats instantaneously, without the need for conscious thought. ( ① ) Our limbic brains made sure that our feet and legs reacted as needed by either ceasing motion, running away, or kicking at a potential threat. ( ② ) This survival regimen, retained from our ancestral heritage, has served us well and continues to do so today. ( ③ ) When we are presented with something dangerous or even disagreeable, our feet and legs still react as they did in prehistoric times. ( ④ ) For body language experts, observing the lower body therefore reveals more about a person's true reaction than facial expressions do. ( ⑤ )`,
 choices:["①","②","③","④","⑤"],
 answer:3,explanation:"'오늘날에도 작동함' → '의식적 판단 전에 반응(보기)' → '위험 상황 구체 사례'"},
{id:"q009",num:9,type:"ex-mismatch",cat:"obj",pts:2,
 stem:"다음 글의 내용과 일치하지 않는 것은?",passage:P.P03,
 choices:["Desmond Morris는 작가이자 동물학자이다.","발과 다리는 다른 신체 부위보다 우리의 감정을 더 정직하게 전달한다.","선사시대 인류는 의식적 사고를 통해 환경 위험에 즉각 대응했다.","변연계 뇌는 위험에 직면했을 때 우리의 발과 다리가 반응하도록 한다.","위험한 상황에서 발과 다리는 선사시대와 동일한 방식으로 반응한다."],
 answer:3,explanation:"본문은 'without the need for conscious thought' — 의식적 사고 없이 즉각 반응 (③은 본문과 반대)"},

// ===== P04 Q10-Q12 =====
{id:"q010",num:10,type:"29-어법",cat:"obj",pts:2,
 stem:"다음 글의 밑줄 친 부분 중, 어법상 틀린 것은?",
 passage:`For example, migrants are <b>ⓐ assumed</b> to overcrowd cities, clog up labor markets, and increase poverty. The reality, however, is more complex, and many migrants are simply <b>ⓑ seeking</b> greater economic opportunity. For example, out-migration generally redistributes workers from places of labor surplus to areas <b>ⓒ where</b> there is greater demand or more opportunity. Migration is generally <b>ⓓ selecting</b> of persons who are younger, healthier, more flexible. Most research that examines long-term outcomes of migration finds positive long-term effects on places of origin and destination <b>ⓔ alike</b>.`,
 choices:["ⓐ","ⓑ","ⓒ","ⓓ","ⓔ"],
 answer:4,explanation:"selecting → selective (형용사) — be selective of 형태"},
{id:"q011",num:11,type:"wrongword",cat:"obj",pts:2,
 stem:"다음 글에서 문맥상 낱말의 쓰임이 적절하지 않은 것은?",
 passage:`The other questionable assumption is that most migration is <b>① involuntary</b>—people fleeing natural or man-made disasters. The reality, however, is more <b>② complex</b>, and many migrants are simply seeking greater economic opportunity. Of course migration can and does create social and economic problems. But migration can also be a <b>③ problem</b> for many preexisting issues. Migration is generally selective of persons who are younger, healthier, more <b>④ flexible</b>, and more willing to endure hardship. Most research finds <b>⑤ positive</b> long-term effects on places of origin and destination.`,
 choices:["①","②","③","④","⑤"],
 answer:3,explanation:"problem → solution — 이주가 기존 문제의 '해결책'이 될 수 있다 (본문 명시)"},
{id:"q012",num:12,type:"31-빈칸 어구",cat:"obj",pts:2,
 stem:"다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?",
 passage:`For example, out-migration generally redistributes workers from places of labor surplus to areas where there is __________.`,

{id:"q013",num:13,type:"blank-빈칸 문장",cat:"obj",pts:2,
 stem:"다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?",
 passage:`Despite its benefits, critics of DST argue that people often use more energy in the darker mornings. Furthermore, studies have shown that __________.`,
 choices:["the practice has gained popularity across all continents","shifting the clock forward in spring causes people to suddenly lose an hour of sleep","traffic accidents decrease significantly after the time change","the European Parliament has consistently opposed timezone harmonization","longer evening daylight increases tourism revenue"],
 answer:2,explanation:"비판 맥락 — 봄철 시계 앞당김으로 인한 수면 부족 (본문 명시)"},
{id:"q014",num:14,type:"36-글의 순서",cat:"obj",pts:2,
 stem:"주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?",
 passage:`(주어진 글) In March, Daylight Saving Time (DST) began in regions across North America and Europe.

(A) Observed in about 70 countries, DST is a system that shifts the clock to extend evening daylight hours. A well-known phrase, "spring forward, fall back," helps people remember.

(B) First proposed by scientist George Vernon Hudson in 1895, the idea was adopted by several countries to save energy during World Wars I and II. DST eventually became a common global practice in the 1970s.

(C) Millions of people set their clocks forward one hour to mark the arrival of spring.`,
 choices:["(A)-(B)-(C)","(A)-(C)-(B)","(B)-(A)-(C)","(C)-(B)-(A)","(C)-(A)-(B)"],
 answer:5,explanation:"즉각 부연(C) → 시스템 정의(A) → 역사적 배경(B)"},
{id:"q015",num:15,type:"irr-무관한 문장",cat:"obj",pts:2,
 stem:"다음 글에서 전체 흐름과 관계 없는 문장은?",
 passage:`Besides energy conservation, DST allows people more time to enjoy natural sunlight. ① In addition, DST offers other benefits, including increased work productivity, boosted consumer spending, and additional time for daily activities. ② Despite its benefits, critics of DST argue that people often use more energy in the darker mornings. ③ Recent advancements in renewable solar panel technology have dramatically reduced household energy costs in sunny regions. ④ Furthermore, studies have shown that shifting the clock forward in spring causes people to suddenly lose an hour of sleep. ⑤ This can reportedly disrupt the brain's circadian rhythms, increase the risk of heart attack, and cause people to get into more accidents.`,
 choices:["①","②","③","④","⑤"],
 answer:3,explanation:"재생 솔라 패널 가격 인하는 DST 논의와 무관"},

{id:"q016",num:16,type:"topic-제목",cat:"obj",pts:2,
 stem:"다음 글의 제목으로 가장 적절한 것은?",passage:P.P06,
 choices:["The Future of Doctoral Research Funding in Europe","Beyond the Thesis: Rethinking Doctoral Programmes for Wider Skills","Why Interdisciplinary Studies Fail in Modern Academia","Career Paths for PhD Graduates Outside Universities","The Decline of Traditional Research Methods"],
 answer:2,explanation:"논문 중심 박사과정의 한계 + 구조화된 접근으로 폭넓은 역량 양성"},
{id:"q017",num:17,type:"irr-무관한 문장",cat:"obj",pts:2,
 stem:"다음 글에서 전체 흐름과 관계 없는 문장은?",
 passage:`In a thesis-based doctoral programme, students typically spend a significant amount of time researching a specific topic. ① While this deep dive allows for thorough exploration, it can also result in narrowing the focus. ② As students become deeply absorbed in their research, they may spend less time exploring related fields. ③ Many universities around the world have recently increased their tuition fees due to global inflation pressures. ④ Some universities in Europe have recognised the limitations of traditional programmes and have started to implement more structured approaches. ⑤ By incorporating coursework, seminars, workshops and internships, they aim to provide students with a broader skill set.`,
 choices:["①","②","③","④","⑤"],
 answer:3,explanation:"등록금 인상은 본문(연구 폭/구조화 접근) 흐름과 무관"},
{id:"q018",num:18,type:"sum-요약문 완성",cat:"obj",pts:2,
 stem:`다음 글의 내용을 한 문장으로 요약하고자 한다. 빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은?

[요약] To compensate for the (A)__________ focus of traditional thesis-based PhD programmes, European universities are now (B)__________ research with coursework and practical training.`,
 passage:P.P06,
 choices:["narrow — combining","broad — replacing","wide — separating","narrow — abandoning","traditional — eliminating"],

{id:"q019",num:19,type:"wrongword",cat:"obj",pts:2,
 stem:"다음 글에서 문맥상 낱말의 쓰임이 적절하지 않은 것은?",
 passage:`The possibility of aesthetic gratification in ordinary objects and events has long been <b>① recognized</b>, even if degraded and <b>② dismissed</b> by prevalent philosophical theory. Widely <b>③ valued</b> by poets, the aesthetic in everyday situations has also been recognized by novelists. In Art as Experience Dewey argued <b>④ for</b> the separation of art from life by basing aesthetic experience on the biological and cultural conditions of human life. Further, Dewey maintained that the aesthetic is the <b>⑤ clarified</b> and intensified development of traits that belong to every normally complete experience.`,
 choices:["①","②","③","④","⑤"],
 answer:4,explanation:"for → against (Dewey는 예술과 삶의 분리에 반대했음)"},
{id:"q020",num:20,type:"ins-문장 삽입",cat:"obj",pts:2,
 stem:`글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?

〈보기〉 It may be most convenient, though, to locate its contemporary intellectual origins in John Dewey's Art as Experience.`,
 passage:`Although there is presently a flowering of work on everyday aesthetics, the possibility of aesthetic gratification in ordinary objects has long been recognized, even if degraded by prevalent philosophical theory. ( ① ) Widely valued by poets, especially Romantic poets and those in Asian traditions, the aesthetic in everyday situations has also been recognized by novelists. ( ② ) In that book Dewey argued against the separation of art from life by basing aesthetic experience on the biological and cultural conditions of human life. ( ③ ) He located the aesthetic in "a complete interpenetration of self and the world of objects and events." ( ④ ) Further, Dewey maintained that "the aesthetic is the clarified and intensified development of traits..." ( ⑤ )`,
 choices:["①","②","③","④","⑤"],
 answer:2,explanation:"'In that book'가 Dewey의 Art as Experience를 지칭하려면 그 책이 먼저 도입되어야 함"},
{id:"q021",num:21,type:"ex-mismatch",cat:"obj",pts:2,
 stem:"다음 글의 내용과 일치하지 않는 것은?",passage:P.P07,
 choices:["일상의 미학은 미적 경험의 해방과 확장에서 가장 잘 알려진 발전이다.","평범한 사물과 사건에서 미적 만족이 가능하다는 견해는 오랫동안 인정되어 왔다.","Dewey는 예술이 삶과 완전히 분리되어야 한다고 주장했다.","낭만주의 시인들과 동양 전통 시인들도 일상의 미적 경험을 가치 있게 여겼다.","Dewey는 미적 경험을 자아와 객체 세계의 완전한 상호침투로 정의했다."],
 answer:3,explanation:"Dewey는 분리에 반대했음 (③은 본문과 반대)"},

{id:"q022",num:22,type:"topic-요지",cat:"obj",pts:2,
 stem:"다음 글의 요지로 가장 적절한 것은?",passage:P.P08,
 choices:["인간은 도덕적 행위자이므로 동식물보다 우월하다는 결론은 정당하다.","도덕적 행위자만이 도덕적 비교의 대상이 될 수 있어야 정의로운 사회가 가능하다.","동식물의 도덕적 권리를 보장하기 위한 법적 체계가 마련되어야 한다.","도덕적 기준은 시대와 문화에 따라 다르게 적용되어야 한다.","도덕적 우월성 판단은 양쪽 모두가 도덕 기준의 적용 범위에 있을 때만 성립한다."],

{id:"q023",num:23,type:"21-함축 의미",cat:"obj",pts:2,
 stem:'밑줄 친 "the latter are not moral agents"가 의미하는 바로 가장 적절한 것은?',
 passage:`This would not be the case, however, if humans were being judged superior to animals and plants, since <u>the latter are not moral agents</u>.`,
 choices:["동물과 식물은 인간의 도덕 기준에 종속될 수 없다는 의미","인간이 동식물보다 도덕적으로 발달했다는 사실의 강조","동물과 식물은 도덕 판단의 적용 대상이 될 수 없는 존재라는 의미","동물도 학습을 통해 도덕적 행위자가 될 수 있다는 가능성","인간만이 다른 종을 판단할 자격이 있다는 자명한 권위"],
 answer:3,explanation:"동식물은 도덕 행위자가 아니므로 도덕 우월성 판단 자체가 성립 불가"},
{id:"q024",num:24,type:"29-어법",cat:"obj",pts:2,
 stem:"다음 글의 밑줄 친 부분 중, 어법상 틀린 것은?",
 passage:`One cannot validly argue that humans are morally superior beings on the ground that they possess, while others <b>ⓐ lack</b>, the capacities of a moral agent. The reason is that only beings that have the capacities of a moral agent can <b>ⓑ meaningfully</b> be said to be either morally good or morally bad. Judgments of moral superiority <b>ⓒ are based</b> on the comparative merits or deficiencies of the entities being judged. One entity is correctly judged morally superior to another if it is the case that, when valid moral standards are applied to both entities, the first fulfills <b>ⓓ themselves</b> to a greater degree than the second. This would not be the case, however, if humans <b>ⓔ were being judged</b> superior to animals and plants.`,
 choices:["ⓐ","ⓑ","ⓒ","ⓓ","ⓔ"],
 answer:4,explanation:"themselves → them (the first가 도덕 기준을 충족시켜야 함; 재귀대명사 부적절)"},

{id:"q026",num:26,type:"31-빈칸 어구",cat:"obj",pts:2,
 stem:"다음 글의 빈칸에 들어갈 말로 가장 적절한 것은?",

{id:"q028",num:28,type:"topic-요지",cat:"obj",pts:2,
 stem:"다음 글의 요지로 가장 적절한 것은?",passage:P.P10,

{id:"q029",num:29,type:"21-함축 의미",cat:"obj",pts:2,
 stem:'밑줄 친 "the difference between learning and showing"이 의미하는 바로 가장 적절한 것은?',
 passage:`When self-experimentation and conventional experiments are both possible, the difference between them often resembles <u>the difference between learning and showing</u>: Self-experiments are better for discovery but worse for convincing others.`,
 choices:["학습과 시연이 본질적으로 동일한 인지 과정이라는 점","발견(탐구)에 적합한 방식과 입증(설득)에 적합한 방식의 구분","가르치는 자와 배우는 자가 같은 도구를 사용해야 한다는 의미","심리학에서는 학습 효과가 입증보다 더 중요하다는 결론","두 실험 방식이 학습 효율 면에서 동일하다는 평가"],

{id:"q030",num:30,type:"blank-빈칸 문장",cat:"obj",pts:2,

let state={screen:"start",currentQ:0,userAnswers:{},subGrades:{},score:0,wrongIds:[],retryMode:null,attempt:1};
const app=document.getElementById("app");
const totalPts=QUESTIONS.reduce((s,q)=>s+q.pts,0);
const objCount=QUESTIONS.filter(q=>q.cat==="obj").length;
const subCount=QUESTIONS.filter(q=>q.cat==="sub").length;
const objPts=QUESTIONS.filter(q=>q.cat==="obj").reduce((s,q)=>s+q.pts,0);
const subPts=QUESTIONS.filter(q=>q.cat==="sub").reduce((s,q)=>s+q.pts,0);

function getActiveQs(){
  if(state.retryMode==="wrong") return QUESTIONS.filter(q=>state.wrongIds.includes(q.id));
  return QUESTIONS;
}
function render(){
  switch(state.screen){
    case"start":renderStart();break;
    case"quiz":renderQuiz();break;
    case"selfgrade":renderSelfGrade();break;
    case"result":renderResult();break;
    case"review":renderReview();break;
  }
}
function renderStart(){
  app.innerHTML=`
  <div class="start-screen">
    <h1>고2 영어 기말고사 모의시험</h1>
    <p class="sub-title">finaltestG2_set4 · 11지문 40문제 · 100점</p>
    <div class="info-box">
      <strong>총 ${QUESTIONS.length}문제</strong> | 만점 <strong>${totalPts}점</strong><br><br>
      <strong>객관식</strong> ${objCount}문제 (${objPts}점) — 5지선다 자동 채점<br>
      <strong>주관식</strong> ${subCount}문제 (${subPts}점) — 자기 채점<br><br>
      <strong>채점 규칙:</strong><br>
      • 90점 이상 — 🎉 EXCELLENT! 축포!<br>
      • 80~89점 — 틀린 문제만 재도전 가능<br>
      • 79점 이하 — 전체 재도전 권장<br><br>
      <strong>주관식 유형:</strong> w-rel ★ / w-part ★ / w-all ★ / w2 / w3 / w9 / w4-passage
    </div>
    <button class="btn btn-primary" onclick="startQuiz()" style="font-size:1.05rem;padding:14px 44px">시작하기</button>
  </div>`;
}
function startQuiz(){state.screen="quiz";state.currentQ=0;state.userAnswers={};state.subGrades={};state.score=0;state.wrongIds=[];render();}
function renderQuiz(){
  const qs=getActiveQs();const q=qs[state.currentQ];const total=qs.length;
  const answered=Object.keys(state.userAnswers).filter(k=>{const v=state.userAnswers[k];return v!==undefined&&v!==""&&v!==null}).length;
  const pct=Math.round(((state.currentQ+1)/total)*100);
  const catLabel=q.cat==="obj"?"객관식":"주관식";
  let inputHtml="";
  if(q.cat==="obj"){
    const sel=state.userAnswers[q.id];
    inputHtml=`<ul class="choices">${q.choices.map((c,i)=>{
      const num=i+1;const checked=sel===num;
      return`<li class="choice${checked?" selected":""}" onclick="selectObj(${num})">
        <input type="radio" name="q${q.id}" ${checked?"checked":""}>
        <span>${"①②③④⑤"[i]} ${escapeHTML(c)}</span></li>`;
    }).join("")}</ul>`;
  } else {
    const val=state.userAnswers[q.id]||"";
    inputHtml=`<textarea class="sub-input" id="sub-${q.id}" placeholder="답안을 입력하세요..." oninput="updateSub('${q.id}',this.value)">${escapeHTML(val)}</textarea>`;
  }
  app.innerHTML=`
  <div class="progress-text"><span>${state.currentQ+1} / ${total}</span><span>${answered}/${total} 완료</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <div class="q-map">${qs.map((qq,i)=>{
    let cls="q-dot";
    if(i===state.currentQ) cls+=" current";
    else if(state.userAnswers[qq.id]!==undefined&&state.userAnswers[qq.id]!==""&&state.userAnswers[qq.id]!==null) cls+=qq.cat==="sub"?" sub-answered":" answered";
    return`<div class="${cls}" onclick="goTo(${i})" title="${qq.num}번">${qq.num}</div>`;
  }).join("")}</div>
  <div class="card">
    <div class="q-header">
      <div class="q-num ${q.cat==="sub"?"sub":""}">${q.num}</div>
      <span class="q-type ${q.cat==="sub"?"sub":""}">${escapeHTML(q.type)} · ${catLabel}</span>
      <span class="q-pts">${q.pts}점</span>
    </div>
    <div class="stem">${escapeHTML(q.stem)}</div>
    ${q.passage?`<div class="passage ${q.cat==="sub"?"sub":""}">${q.passage}</div>`:""}
    ${inputHtml}
  </div>
  <div class="nav-row">
    <button class="btn btn-outline btn-sm" ${state.currentQ===0?"disabled":""} onclick="goTo(${state.currentQ-1})">◀ 이전</button>
    ${state.currentQ===total-1?
      `<button class="btn btn-success btn-sm" onclick="submitQuiz()">제출하기 ✓</button>`
      :`<button class="btn btn-primary btn-sm" onclick="goTo(${state.currentQ+1})">다음 ▶</button>`}
  </div>`;
}
function selectObj(num){const qs=getActiveQs();state.userAnswers[qs[state.currentQ].id]=num;render();}
function updateSub(qid,text){state.userAnswers[qid]=text;}
function goTo(i){const qs=getActiveQs();if(i>=0&&i<qs.length){state.currentQ=i;render()}}
function submitQuiz(){
  const qs=getActiveQs();
  let objScore=0;const objWrong=[];
  qs.filter(q=>q.cat==="obj").forEach(q=>{
    if(state.userAnswers[q.id]===q.answer) objScore+=q.pts;
    else objWrong.push(q.id);
  });
  state.score=objScore;state.wrongIds=objWrong;
  const subQs=qs.filter(q=>q.cat==="sub");
  if(subQs.length>0){state.screen="selfgrade";state.currentQ=0;}
  else {state.screen="result";}
  render();
}
function renderSelfGrade(){
  const qs=getActiveQs();const subQs=qs.filter(q=>q.cat==="sub");
  app.innerHTML=`
  <div class="card">
    <h2 style="color:var(--sub);margin-bottom:6px">✍️ 주관식 자기 채점</h2>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:14px">${subQs.length}문제의 모범답안과 채점 기준을 확인하고, 본인 답안을 채점해 주세요.</p>
    ${subQs.map((q)=>{
      const myAns=state.userAnswers[q.id]||"(미응답)";
      const graded=state.subGrades[q.id];
      return `<div class="sg-section">
        <div class="sg-header">${q.num}번 · ${escapeHTML(q.type)} · ${q.pts}점</div>
        <div class="sg-block">${escapeHTML(q.stem)}
          ${q.passage?`<div style="background:#f1f5f9;border-radius:4px;padding:8px;margin-top:6px;font-size:.82rem;white-space:pre-line;font-family:'Times New Roman',serif">${q.passage}</div>`:""}
        </div>
        <div class="my-answer"><b>[내 답안]</b><br>${escapeHTML(myAns)}</div>
        <div class="model-answer"><b>[모범답안]</b><br>${escapeHTML(q.answer)}</div>
        <div class="rubric"><b>[채점 기준]</b><br><span style="white-space:pre-line">${escapeHTML(q.explanation)}</span></div>
        <div class="grade-btns">
          <button class="btn btn-success btn-sm" onclick="markSub('${q.id}',true)" ${graded===true?'style="outline:3px solid var(--success);outline-offset:2px"':""}>✓ 맞았어요 (+${q.pts}점)</button>
          <button class="btn btn-danger btn-sm" onclick="markSub('${q.id}',false)" ${graded===false?'style="outline:3px solid var(--danger);outline-offset:2px"':""}>✗ 틀렸어요 (0점)</button>
        </div>
      </div>`;
    }).join("")}
    <div style="text-align:center;margin-top:20px">
      <button class="btn btn-primary" onclick="finalizeSelfGrade()">채점 완료 → 결과 보기</button>
    </div>
  </div>`;
}
function markSub(qid,correct){state.subGrades[qid]=correct;renderSelfGrade();}
function finalizeSelfGrade(){
  const qs=getActiveQs();const subQs=qs.filter(q=>q.cat==="sub");
  const ungraded=subQs.filter(q=>state.subGrades[q.id]===undefined);
  if(ungraded.length>0){if(!confirm(`아직 ${ungraded.length}문제를 채점하지 않았습니다. 계속하시겠습니까?`)) return;}
  subQs.forEach(q=>{
    if(state.subGrades[q.id]===true) state.score+=q.pts;
    else state.wrongIds.push(q.id);
  });
  state.screen="result";render();
  if(state.score>=90) launchConfetti();
}
function renderResult(){
  const qs=getActiveQs();const maxPts=qs.reduce((s,q)=>s+q.pts,0);
  const pct=Math.round((state.score/maxPts)*100);
  const wrongCount=state.wrongIds.length;const correctCount=qs.length-wrongCount;
  let cls,msg,btns;
  if(state.score>=90){
    cls="perfect";msg=`<b>🎉 EXCELLENT!</b> ${state.score}점!<br>대단합니다, 정말 잘했어요!`;
    btns=`<button class="btn btn-outline" onclick="showReview()">오답 복습</button>
          <button class="btn btn-primary" onclick="resetAll()">처음부터 다시</button>`;
  }else if(pct>=80){
    cls="great";msg=`잘했어요! ${pct}점 (${state.score}/${maxPts}점)<br>틀린 ${wrongCount}문제만 다시 풀어보세요.`;
    btns=`<button class="btn btn-success" onclick="retryWrong()">틀린 문제 재도전</button>
          <button class="btn btn-outline" onclick="showReview()">오답 복습</button>
          <button class="btn btn-outline" onclick="resetAll()">처음부터 다시</button>`;
  }else{
    cls="retry";msg=`${pct}점 (${state.score}/${maxPts}점)<br>오답을 복습한 후 다시 도전해보세요!`;
    btns=`<button class="btn btn-danger" onclick="showReview()">오답 복습하기</button>
          <button class="btn btn-warning" onclick="resetAll()">전체 재도전</button>`;
  }
  app.innerHTML=`
  <div class="result-screen">
    <h2 style="margin-bottom:6px">${state.attempt>1?`${state.attempt}차 `:""}채점 결과</h2>
    <div class="score-circle ${cls}"><span>${state.score}</span><small>/ ${maxPts}점</small></div>
    <div class="result-msg">${msg}</div>
    <div class="result-detail">
      <b>정답:</b> ${correctCount}문제 / <b>오답:</b> ${wrongCount}문제<br>
      <b>정답률:</b> ${pct}%<br>
      ${wrongCount>0?`<b>틀린 문제 번호:</b> ${state.wrongIds.map(id=>QUESTIONS.find(x=>x.id===id)?.num).filter(Boolean).sort((a,b)=>a-b).join(", ")}번`:""}
    </div>
    <div class="result-btns">${btns}</div>
  </div>`;
}
function retryWrong(){state.retryMode="wrong";state.attempt++;state.screen="quiz";state.currentQ=0;state.userAnswers={};state.subGrades={};state.score=0;render();}
function resetAll(){state.retryMode=null;state.attempt=1;state.screen="start";state.userAnswers={};state.subGrades={};state.score=0;state.wrongIds=[];render();}
function showReview(){state.screen="review";render();}
function renderReview(){
  const qs=getActiveQs();
  app.innerHTML=`
  <div class="card">
    <h2 style="color:var(--primary);margin-bottom:14px">📖 오답 복습</h2>
    ${qs.filter(q=>state.wrongIds.includes(q.id)).map(q=>{
      const myAns=q.cat==="obj"?(state.userAnswers[q.id]?`${"①②③④⑤"[state.userAnswers[q.id]-1]}번`:"(미응답)"):(state.userAnswers[q.id]||"(미응답)");
      const correctAns=q.cat==="obj"?`${"①②③④⑤"[q.answer-1]}번 ${escapeHTML(q.choices[q.answer-1])}`:escapeHTML(q.answer);
      return `<div class="card review-card">
        <div class="q-header">
          <div class="q-num ${q.cat==="sub"?"sub":""}">${q.num}</div>
          <span class="q-type ${q.cat==="sub"?"sub":""}">${escapeHTML(q.type)}</span>
          <span class="q-pts">${q.pts}점</span>
        </div>
        <div class="stem">${escapeHTML(q.stem)}</div>
        ${q.passage?`<div class="passage ${q.cat==="sub"?"sub":""}">${q.passage}</div>`:""}
        <div class="my-answer"><b>[내 답안]</b> ${escapeHTML(String(myAns))}</div>
        <div class="model-answer"><b>[정답]</b> ${correctAns}</div>
        <div class="explanation"><b>해설:</b> <span style="white-space:pre-line">${escapeHTML(q.explanation)}</span></div>
      </div>`;
    }).join("")}
    <div style="text-align:center;margin-top:18px">
      <button class="btn btn-outline" onclick="state.screen='result';render()">결과로 돌아가기</button>
    </div>
  </div>`;
}
function escapeHTML(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/&lt;u&gt;/g,"<u>").replace(/&lt;\/u&gt;/g,"</u>")
    .replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>");
}
function launchConfetti(){
  const canvas=document.getElementById("confetti-canvas");const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=["#1e40af","#16a34a","#f59e0b","#dc2626","#7c3aed","#fbbf24"];
  const parts=[];
  for(let i=0;i<140;i++){
    parts.push({x:Math.random()*canvas.width,y:-20,vx:(Math.random()-0.5)*5,vy:Math.random()*4+3,size:Math.random()*8+4,color:colors[Math.floor(Math.random()*colors.length)],angle:Math.random()*Math.PI*2,spin:(Math.random()-0.5)*0.2});
  }
  let frame=0;
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.angle+=p.spin;p.vy+=0.05;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();});
    frame++;
    if(frame<260) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  tick();
}
render();
</script>
</body>
